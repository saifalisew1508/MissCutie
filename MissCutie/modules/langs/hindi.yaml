admin_help: |
    *कोई भी उपयोगकर्ता*
    ➥ /admins*:* चैट में एडमिन की सूची

    *केवल व्यवस्थापक*
    ➥ /pin*:* उत्तर दिए गए संदेश को चुपचाप पिन कर देता है - उपयोगकर्ताओं को सूचना देने के लिए `'जोर से'' या `'सूचित करें'' जोड़ें
    ➥ /unpin*:* वर्तमान में पिन किए गए संदेश को अनपिन करता है
    ➥ /unpinall*:* सभी पिन किए गए संदेश को अनपिन करता है, विषयों में भी काम करता है (केवल स्वामी ही ऐसा कर सकता है।)
    ➥ /del*:* आपके द्वारा उत्तर दिया गया संदेश हटा देता है
    ➥ /purge*:* इस और उत्तर दिए गए संदेश के बीच के सभी संदेशों को हटा देता है।
    ➥ /purge <integer X>*:* उत्तर दिए गए संदेश को हटा देता है, और यदि किसी संदेश का उत्तर दिया जाता है तो उसके बाद आने वाले X संदेशों को हटा देता है।
    ➥ /invitelink*:* को आमंत्रणलिंक मिलता है
    ➥ /promote*:* उपयोगकर्ता द्वारा उत्तर दिए जाने को बढ़ावा देता है
    ➥ /demote*:* उपयोगकर्ता द्वारा उत्तर दिए जाने पर उसे डिमोट करता है
    ➥ /title <शीर्षक यहां> *:* उस व्यवस्थापक के लिए एक कस्टम शीर्षक सेट करता है जिसे बॉट ने प्रचारित किया है
    ➥ /admincache*:* व्यवस्थापक सूची को बलपूर्वक ताज़ा करें

    *समूह में शामिल होने का अनुरोध*
    ➥ /approveall सभी लंबित शामिल होने के अनुरोध को मंजूरी दें *(अब और नहीं)*
    ➥ /joinrequest `<yes|on|true/no|off|false>` ज्वाइन रिक्वेस्ट एक्सेप्टेब बटन को सक्रिय करने के लिए
    ➥ /autoapprove `<yes|on|true/no|off|false>` शामिल होने के अनुरोध को सक्रिय करने के लिए बॉट द्वारा स्वत: स्वीकृति

    *मास एक्शन टूल*
    ➥ /unbanall*:* ग्रुप में सभी प्रतिबंधित सदस्यों को अनबैन करें
    ➥ /unmuteall*:* ग्रुप में सभी प्रतिबंधित सदस्यों को अनम्यूट करें
    ➥ /banall*:* समूह में सभी सदस्यों को प्रतिबंधित करें *(केवल समूह स्वामी इस आदेश का उपयोग करें)*
    ➥ /zombies*:* समूह में हटाए गए खातों की खोज शुरू करता है।
    ➥ /zombies clean*:* समूह से हटाए गए खातों को हटा देता है।
    ➥ /users*:* समूह उपयोगकर्ताओं की सूची प्राप्त करें



afk_help: |
    ➥ /afk <कारण>: अपने आप को AFK (कीबोर्ड से दूर) के रूप में चिह्नित करें।
    ➥ brb <कारण>: एएफके कमांड के समान - लेकिन कमांड नहीं।
    जब एएफके के रूप में चिह्नित किया जाता है, तो किसी भी उल्लेख का उत्तर एक संदेश के साथ दिया जाएगा कि आप उपलब्ध नहीं हैं!

anilist_help: |
     *एनीलिस्ट*
     इस मॉड्यूल की सहायता से एनीमे, मंगा या पात्रों के बारे में जानकारी प्राप्त करें! सारा डेटा [AniList](anilist.co) से लिया गया है।
     *उपलब्ध आदेश:*
      - /anime <एनीमे>: एनीमे के बारे में जानकारी देता है।
      - /character <चरित्र>: चरित्र के बारे में जानकारी देता है।
      - /manga <मंगा>: मंगा के बारे में जानकारी लौटाता है।

antiflood_help: |
      एंटीफ्लड आपको उन उपयोगकर्ताओं पर कार्रवाई करने की अनुमति देता है जो एक पंक्ति में x से अधिक संदेश भेजते हैं। निर्धारित बाढ़ से अधिक \
      परिणामस्वरूप उस उपयोगकर्ता को प्रतिबंधित कर दिया जाएगा।
      यदि उपयोगकर्ता एक पंक्ति में 10 से अधिक संदेश भेजते हैं तो यह उन्हें म्यूट कर देगा, बॉट्स को अनदेखा कर दिया जाता है।
       ➥ /flood*:* वर्तमान बाढ़ नियंत्रण सेटिंग प्राप्त करें
      • *केवल व्यवस्थापक:*
      ➥ /setflood <int/'no'/'off'>*:* बाढ़ नियंत्रण को सक्षम या अक्षम करता है
      *उदाहरण:* `/सेटफ़्लड 10`
      ➥ /setfloodmode <ban/kick/mute/tban/tmute> <value>*:* उपयोगकर्ता द्वारा बाढ़ सीमा पार कर जाने पर की जाने वाली कार्रवाई। प्रतिबंध/किक/म्यूट/tmute/tban
      • *टिप्पणी:*
      • tban और tmute के लिए मान भरना होगा!!
      यह हो सकता है:
      `5 m` = 5 मिनट
      `6 h` = 6 घंटे
      `3 d` = 3 दिन
      `1w` = 1 सप्ताह


approve_help: |
      कभी-कभी, आप किसी उपयोगकर्ता पर अवांछित सामग्री न भेजने का भरोसा कर सकते हैं।
      हो सकता है कि उन्हें व्यवस्थापक बनाने के लिए पर्याप्त न हो, लेकिन हो सकता है कि आप उन पर ताले, काली सूची और बाढ़रोधी लागू न होने से सहमत हों।
      स्वीकृतियां इसी के लिए होती हैं - भरोसेमंद उपयोगकर्ताओं को भेजने की अनुमति देने के लिए उन्हें मंजूरी देना
      *व्यवस्थापक आदेश:*
      ➥ /approval*:* वर्तमान चैट में उपयोगकर्ता की अनुमोदन स्थिति की जाँच करें।
      ➥ /approve*:* किसी उपयोगकर्ता का अनुमोदन। ताले, ब्लैकलिस्ट और बाढ़-रोधी अब उन पर लागू नहीं होंगे।
      ➥ /unapprove*:* किसी उपयोगकर्ता को अस्वीकृत करना। वे अब फिर से ताले, काली सूची और बाढ़ रोधी कार्रवाई के अधीन होंगे।
      ➥ /approved*:* सभी स्वीकृत उपयोगकर्ताओं की सूची बनाएं।
      ➥ /unapproveall*:* किसी चैट में *सभी* उपयोगकर्ताओं को अस्वीकृत करें। इसे असंपादित नहीं किया जा सकता है।

backup_help: |
     *केवल व्यवस्थापक:*
      ➥ /export: जितना संभव हो उतना आयात करने के लिए समूह बटलर बैकअप फ़ाइल का उत्तर दें, जिससे स्थानांतरण अत्यंत सरल हो जाता है! टिप्पणी \
        टेलीग्राम प्रतिबंधों के कारण फ़ाइलें/फ़ोटो आयात नहीं किए जा सकते।
      ➥ /import: निर्यात समूह डेटा, जो निर्यात किया जाएगा: नियम, नोट्स (दस्तावेज़, चित्र, संगीत, वीडियो, ऑडियो, आवाज, पाठ, पाठ बटन)

bans_help: |
    *कोई भी उपयोगकर्ता*
     ➥ /kickme: कमांड जारी करने वाले उपयोगकर्ता को लात मारता है

    *केवल व्यवस्थापक:*
     ➥ /ban <userhandle>: किसी उपयोगकर्ता को प्रतिबंधित करता है। (हैंडल या उत्तर के माध्यम से)
     ➥ /tban <userhandle> x(m/h/d): उपयोगकर्ता को x समय के लिए प्रतिबंधित करता है। (हैंडल, या उत्तर के माध्यम से)। एम = मिनट, एच = घंटे, डी = दिन।
     ➥ /unban <यूजरहैंडल>: किसी उपयोगकर्ता को अनबैन करता है। (हैंडल या उत्तर के माध्यम से)
     ➥ /kick <यूजरहैंडल>: किसी उपयोगकर्ता को समूह से बाहर निकाल दें, (हैंडल या रिप्लाई के माध्यम से)

blacklist_help: |
     ब्लैकलिस्ट का उपयोग किसी समूह में कुछ ट्रिगर्स को कहने से रोकने के लिए किया जाता है। जब भी ट्रिगर का उल्लेख किया जाएगा, संदेश तुरंत हटा दिया जाएगा। कभी-कभी इसे चेतावनी फ़िल्टर के साथ जोड़ना एक अच्छा कॉम्बो है!

     *नोट*: ब्लैकलिस्ट समूह व्यवस्थापकों को प्रभावित नहीं करते हैं।

      ➥ /blacklist*:* वर्तमान ब्लैकलिस्टेड शब्द देखें।

     केवल व्यवस्थापक:
      ➥ /addblacklist <triggers>*:* ब्लैकलिस्ट में एक ट्रिगर जोड़ें। प्रत्येक पंक्ति को एक ट्रिगर माना जाता है, इसलिए विभिन्न पंक्तियों का उपयोग करने से आप एकाधिक ट्रिगर जोड़ सकेंगे।
      ➥ /unblacklist <ट्रिगर्स>*:* ट्रिगर्स को ब्लैकलिस्ट से हटाएं। यहां समान न्यूलाइन तर्क लागू होता है, इसलिए आप एक साथ कई ट्रिगर हटा सकते हैं।
      ➥ /blacklistmode <off/del/warn/ban/kick/mute/tban/tmute>*:* जब कोई ब्लैकलिस्टेड शब्द भेजता है तो की जाने वाली कार्रवाई।

cleaner_help: |
     ➥ /cleanbluetext <on/off/yes/no> - भेजने के बाद कमांड साफ़ करें
     ➥ /ignorecleanbluetext <शब्द> - कमांड की ऑटो सफाई को रोकें
     ➥ /unignorecleanbluetext <शब्द> - कमांड की ऑटो सफाई को रोकें
     ➥ /listcleanbluetext - वर्तमान में श्वेतसूचीबद्ध आदेशों की सूची

connections_help: |
     ➥ /connect: चैट कनेक्ट करें (समूह में /कनेक्ट या /कनेक्ट <चैट आईडी> पीएम में किया जा सकता है)
     ➥ /connection: कनेक्टेड चैट की सूची बनाएं
     ➥ /disconnect: चैट से डिस्कनेक्ट करें
     ➥ /helpconnect: उपलब्ध आदेशों की सूची बनाएं जिन्हें दूर से किया जा सकता है

      *केवल व्यवस्थापक:*
     ➥ /allowconnect <yes/no>: उपयोगकर्ता को चैट से कनेक्ट होने की अनुमति दें



cust_filters_help: |
     ➥ /filters*:* चैट में सहेजे गए सभी सक्रिय फ़िल्टर सूचीबद्ध करें।

      *केवल व्यवस्थापक:*
     ➥ /filter <कीवर्ड> <उत्तर संदेश>*:* इस चैट में एक फ़िल्टर जोड़ें। बॉट अब 'कीवर्ड' होने पर उस संदेश का उत्तर देगा
       उल्लेखित है। यदि आप किसी स्टिकर का उत्तर किसी कीवर्ड के साथ देते हैं, तो बॉट उस स्टिकर के साथ उत्तर देगा। नोट: सभी फ़िल्टर
       कीवर्ड लोअरकेस में हैं. यदि आप चाहते हैं कि आपका कीवर्ड एक वाक्य हो, तो उद्धरण चिह्नों का उपयोग करें। उदाहरण के लिए: /फ़िल्टर "अरे वहाँ" आप कैसे हैं
       कर रहे हो?
     ➥ /stop <फ़िल्टर कीवर्ड>*:* उस फ़िल्टर को रोकें।

      *केवल चैट निर्माता:*
     ➥ /removeallfilters*:* सभी चैट फ़िल्टर एक साथ हटा दें।

       *ध्यान दें*: फ़िल्टर मार्कडाउन फ़ॉर्मेटर जैसे: {पहला}, {अंतिम} आदि.. और बटन का भी समर्थन करते हैं।
         अधिक जानने के लिए /markdownhelp जांचें!

disable_help: |
     हर कोई बॉट द्वारा प्रदान की जाने वाली हर सुविधा नहीं चाहता। कुछ आदेश सर्वोत्तम हैं
     अप्रयुक्त छोड़ दिया; स्पैम और दुरुपयोग से बचने के लिए.

     यह आपको आमतौर पर उपयोग किए जाने वाले कुछ कमांड को अक्षम करने की अनुमति देता है, ताकि कोई भी उनका उपयोग न कर सके।
     यह आपको लोगों को ब्लूटेक्स्टिंग करने से रोकते हुए, उन्हें स्वतः हटाने की भी अनुमति देगा।

      ➥ /cmds: अक्षम आदेशों की वर्तमान स्थिति की जाँच करें

      *केवल व्यवस्थापक:*
      ➥ /enable <cmd name>: उस आदेश को सक्षम करें
      ➥ /disable <cmd name>: उस आदेश को अक्षम करें
      ➥ /enablemodule <मॉड्यूल नाम>*:* उस मॉड्यूल में सभी कमांड को सक्षम करें
      ➥ /disablemodule <module name>*:* उस मॉड्यूल में सभी कमांड को अक्षम करें
      ➥ /listcmds: सभी संभावित अक्षम करने योग्य आदेशों की सूची बनाएं


extra_help: |
     *कार्बन*
     /carbon *:* दिए गए या उत्तर दिए गए पाठ को कार्बन बनाएं

     *जोड़े*
     ➥ /couples*:* 2 उपयोगकर्ताओं को चुनें और अपने चैट में जोड़ों के रूप में उनका नाम भेजें।

     *प्रतिध्वनि*
     ➥ /echo *:* किसी पाठ का उत्तर दें

     *इमोजी गेम*
     *इमोजी के साथ गेम खेलें:*
     ➥ /dice या /dice 1 से 6 कोई भी संख्या
     ➥ /ball या /ball 1 से 5 कोई भी संख्या
     ➥ /dart या /dart 1 से 6 कोई भी संख्या
      *उपयोग:* हाहाहा बस एक जादू।
      *चेतावनी:* यदि आप बताए गए मूल्य के अलावा कोई अन्य मूल्य इनपुट करते हैं तो आप परेशानी में पड़ जाएंगे।

     *मार्कडाउन:*
     ➥ /markdownhelp*:* टेलीग्राम में मार्कडाउन कैसे काम करता है इसका त्वरित सारांश - केवल निजी चैट में ही कॉल किया जा सकता है
 
     *मैमफाई*
     ➥ /mmf <TEXT>*:* रिप्लाई किए गए स्टिकर में टेक्स्ट जोड़ें

     *मज़ाक*
     ➥ /horny *:* अपनी वर्तमान हॉर्नीनेस की जाँच करें
     ➥ /gay*:* अपना वर्तमान पुरुषत्व जांचें
     ➥ /lezbian *:* अपने वर्तमान लेज़्बियन की जाँच करें
     ➥ /boob *:* अपने वर्तमान स्तन का आकार जांचें
     ➥ /cute *:* अपनी वर्तमान सुंदरता की जांच करें

     *प्रतिक्रिया:*
     ➥ /react*:* यादृच्छिक प्रतिक्रिया के साथ प्रतिक्रिया करता है

     *सभी को टैग/उल्लेख करें*
     ➥ /tagall या @all '(संदेश का उत्तर दें या कोई अन्य संदेश जोड़ें) बिना किसी अपवाद के अपने समूह के सभी सदस्यों का उल्लेख करने के लिए।

     *उद्धरणपूर्वक*
     ➥ /q - किसी संदेश को उद्धृत करने के लिए।
     ➥ /q [पूर्णांक] - 1 से अधिक संदेशों को उद्धृत करने के लिए।
     ➥ /q r - किसी संदेश को उसके उत्तर के साथ उद्धृत करना
     ➥ /q r [पूर्णांक] 1 से अधिक उत्तर संदेशों को उद्धृत करने के लिए



feds_help: |
     सब कुछ मज़ेदार है, जब तक कि कोई स्पैमर आपके समूह में प्रवेश न करने लगे और आपको उसे ब्लॉक न करना पड़े। फिर आपको और अधिक, और अधिक प्रतिबंध लगाना शुरू करना होगा, और इससे दुख होता है।
     लेकिन फिर आपके पास कई समूह हैं, और आप नहीं चाहते कि यह स्पैमर आपके किसी समूह में हो - आप कैसे निपट सकते हैं? क्या आपको इसे अपने सभी समूहों में मैन्युअल रूप से ब्लॉक करना होगा?
     *अब नहीं!* फ़ेडरेशन के साथ, आप एक चैट में अन्य सभी चैट के साथ ओवरलैप करके प्रतिबंध लगा सकते हैं।
     आप फ़ेडरेशन व्यवस्थापकों को भी नामित कर सकते हैं, ताकि आपका विश्वसनीय व्यवस्थापक उन सभी स्पैमर को चैट से प्रतिबंधित कर सके जिन्हें आप सुरक्षित रखना चाहते हैं।
    
     *आदेश:*
     आपकी सुविधा के लिए फेड को अब तीन खंडों में विभाजित किया गया है।
     ➥ /fedownerhelp*:* फेड निर्माण और मालिक के केवल आदेशों के लिए सहायता प्रदान करता है
     ➥ /fedadminhelp*:* फेड प्रशासन आदेशों के लिए सहायता प्रदान करता है
     ➥ /feduserhelp*:* उन आदेशों के लिए सहायता प्रदान करता है जिनका उपयोग कोई भी कर सकता है

FED_OWNER_HELP: |
     *केवल फेड मालिक:*
     ➥ /newfed <फेड_नाम>*:* एक फेडरेशन बनाता है, प्रति उपयोगकर्ता एक की अनुमति है
     ➥ /renamefed <fed_id> <new_fed_name>*:* फीड की गई आईडी का नाम बदलकर एक नया नाम रखता है
     ➥ /delfed <fed_id>*:* एक फ़ेडरेशन और उससे संबंधित कोई भी जानकारी हटाएं। अवरुद्ध उपयोगकर्ताओं को रद्द नहीं किया जाएगा
     ➥ /fpromote <user>*:* उपयोगकर्ता को फ़ेडरेशन व्यवस्थापक के रूप में निर्दिष्ट करता है। `फेड एडमिन्स` के अंतर्गत उपयोगकर्ता के लिए सभी कमांड सक्षम करता है
     ➥ /fdemote <user>*:* उपयोगकर्ता को एडमिन फ़ेडरेशन से सामान्य उपयोगकर्ता में छोड़ देता है
     ➥ /subfed <fed_id>*:* किसी दिए गए फेड आईडी की सदस्यता लेता है, उस सब्सक्राइब्ड फेड से प्रतिबंध आपके फेड में भी होगा
     ➥ /unsubfed <fed_id>*:* किसी दिए गए फेड आईडी की सदस्यता समाप्त करता है
     ➥ /setfedlog <fed_id>*:* समूह को फेडरेशन के लिए फेड लॉग रिपोर्ट आधार के रूप में सेट करता है
     ➥ /unsetfedlog <fed_id>*:* फेडरेशन के लिए फेड लॉग रिपोर्ट आधार के रूप में समूह को हटा दिया गया
     ➥ /fbroadcast <संदेश>*:* उन सभी समूहों को संदेश प्रसारित करता है जो आपके फ़ीड में शामिल हुए हैं
     ➥ /fedsubs*:* उन फेड को दिखाता है जिनके लिए आपका समूह `(टूटा हुआ आरएन)` का सदस्य है

FED_ADMIN_HELP: |
     *फेड व्यवस्थापक:*
     ➥ /fban <उपयोगकर्ता> <कारण>*:* फेड एक उपयोगकर्ता पर प्रतिबंध लगाता है
     ➥ /unfban <उपयोगकर्ता> <कारण>*:* एक उपयोगकर्ता को फेड प्रतिबंध से हटा देता है
     ➥ /fedinfo <fed_id>*:* निर्दिष्ट फेडरेशन के बारे में जानकारी
     ➥ /joinfed <fed_id>*:* फेडरेशन में वर्तमान चैट में शामिल हों। केवल चैट स्वामी ही ऐसा कर सकते हैं. प्रत्येक चैट केवल एक फ़ेडरेशन में हो सकती है
     ➥ /leavefed <fed_id>*:* दिए गए फेडरेशन को छोड़ दें। केवल चैट स्वामी ही ऐसा कर सकते हैं
     ➥ /setfrules <नियम>*:* फेडरेशन नियमों को व्यवस्थित करें
     ➥ /feadmins*:* फ़ेडरेशन एडमिन दिखाएँ
     ➥ /fbanlist*:* उन सभी उपयोगकर्ताओं को प्रदर्शित करता है जो इस समय फेडरेशन में पीड़ित हैं
     ➥ /fedchats*:* फेडरेशन से जुड़ी सभी चैट प्राप्त करें
     ➥ /chatfed *:* वर्तमान चैट में फेडरेशन देखें

FED_USER_HELP: |
     *कोई भी उपयोगकर्ता:*
     ➥ /fbanstat*:* दिखाता है कि आप/या जिस उपयोगकर्ता को आप उत्तर दे रहे हैं या उनका उपयोगकर्ता नाम कहीं fbanned है या नहीं
     ➥ /fednotif <on/off>*:* जब ऐसे उपयोगकर्ता होते हैं जो fbaned/unfbanned होते हैं तो फेडरेशन सेटिंग्स PM में नहीं होती हैं
     ➥ /frules*:* फेडरेशन के नियम देखें

formt_help_bse: |
     क्यूटी आपके संदेशों को अधिक अभिव्यंजक बनाने के लिए बड़ी संख्या में फ़ॉर्मेटिंग विकल्पों का समर्थन करता है। नज़र रखना!



force_subscribe: |
     - @MissCutieRobot उन सदस्यों को तब तक म्यूट कर सकता है, जिन्होंने आपके चैनल की सदस्यता नहीं ली है, जब तक कि वे सदस्यता न ले लें।
     - सक्षम होने पर, मैं सदस्यता समाप्त करने वाले सदस्यों को म्यूट कर दूंगा और उन्हें एक अनम्यूट बटन दिखाऊंगा। जब वे बटन दबाएंगे, तो मैं उन्हें अनम्यूट कर दूंगा।

     *स्थापित करना*
     1) सबसे पहले, मुझे बैन यूजर्स की अनुमति के साथ ग्रुप में एडमिन के रूप में जोड़ें और चैनल में भी एडमिन के रूप में जोड़ें।
     ध्यान दें: केवल समूह का निर्माता ही मुझे सेट कर सकता है, और यदि ऐसा नहीं किया गया तो मैं दोबारा सदस्यता लेने की अनुमति नहीं दूंगा।

     *आदेश*
     ➥ /forcesubscribe: वर्तमान सेटिंग्स प्राप्त करें।
     ➥ /forcesubscribe <no/off/disable>: ForceSubscribe बंद करें।
     ➥ /forcesubscribe <चैनल उपयोगकर्ता नाम>: चैनल चालू करें और सेट करें।
     ➥ /forcesubscribe clear: उन सभी सदस्यों को अनम्यूट करें जिन्हें मैंने म्यूट किया है।

     नोट /forcesub /forcesubscribe का उपनाम है।


google_search: |
     *गूगल खोज*
     ➥ /google <text>*:* Google पर खोज करें
     ➥ /img <text>*:* छवियों के लिए Google खोजें और उन्हें लौटाएं\nअधिक संख्या के लिए। परिणामों में लिम निर्दिष्ट करें, उदाहरण के लिए: `/img हैलो lim=10`
     ➥ /app <ऐपनाम>*:* प्ले स्टोर में एक ऐप खोजता है और उसका विवरण देता है।
     ➥ /reverse |पीपी |जीआरएस: जिस मीडिया को इसका उत्तर दिया गया था, उसकी रिवर्स इमेज सर्च करता है।

     *गूगल ट्रांसलेट*
     ➥ किसी लंबे संदेश के उत्तर के रूप में `/tr` या `/tl` (भाषा कोड)।
     *उदाहरण:*
     ➥ `/tr en`*:* किसी चीज़ का अंग्रेजी में अनुवाद करता है
     ➥ `/tr hi-en`*:* हिंदी से अंग्रेजी में अनुवाद करता है



md_help: |
     <b>मार्कडाउन फ़ॉर्मेटिंग</b>
       आप *बोल्ड*, _इटैलिक_, -अंडरलाइन-, और भी बहुत कुछ का उपयोग करके अपने संदेश को प्रारूपित कर सकते हैं। आगे बढ़ें और प्रयोग करें!
       <b>समर्थित मार्कडाउन</b>:
       - <कोड>`कोड शब्द`</कोड>: बैकटिक्स का उपयोग मोनोस्पेस फ़ॉन्ट के लिए किया जाता है। इस प्रकार दिखाता है: <कोड>कोड शब्द</कोड>।
       - <कोड>_इटैलिक शब्द_</कोड>: इटैलिक फ़ॉन्ट के लिए अंडरस्कोर का उपयोग किया जाता है। इस प्रकार दिखाता है: <i>इटैलिक शब्द</i>।
       - <कोड>*बोल्ड शब्द*</कोड>: तारांकन का उपयोग बोल्ड फ़ॉन्ट के लिए किया जाता है। इस प्रकार दिखाता है: <b>बोल्ड शब्द</b>।
       - <कोड>~स्ट्राइकथ्रू~</कोड>: स्ट्राइकथ्रू के लिए टिल्ड का उपयोग किया जाता है। इस प्रकार दिखाता है: <स्ट्राइक>स्ट्राइकथ्रू</स्ट्राइक>।
       - <कोड>[हाइपरलिंक](example.com)</code>: यह हाइपरलिंक के लिए उपयोग किया जाने वाला फ़ॉर्मेटिंग है। इस प्रकार दिखाता है: <a href='https://example.com/'>हाइपरलिंक</a>।
       - <code>[My Button](buttonurl://example.com)</code>: यह बटन बनाने के लिए उपयोग किया जाने वाला फ़ॉर्मेटिंग है। यह उदाहरण "माई बटन" नामक एक बटन बनाएगा जो क्लिक करने पर <code>example.com</code> खुलता है।
       यदि आप एक ही पंक्ति पर बटन भेजना चाहते हैं, तो <code>:same</code> फ़ॉर्मेटिंग का उपयोग करें।
       <b>उदाहरण:</b>
       <कोड>[बटन 1](बटनurl://example.com)</कोड>
       <कोड>[बटन 2](बटनurl://example.com:वही)</कोड>
       <कोड>[बटन 3](बटनurl://example.com)</कोड>
       यह बटन 1 और 2 को एक ही पंक्ति में दिखाएगा, जिसके नीचे 3 होगा।
filling_help: |
       <b>भराव</b>
       आप प्रासंगिक डेटा के साथ अपने संदेश की सामग्री को भी अनुकूलित कर सकते हैं। उदाहरण के लिए, आप स्वागत संदेश में किसी उपयोगकर्ता का नाम लेकर उल्लेख कर सकते हैं, या फ़िल्टर में उनका उल्लेख कर सकते हैं!
       आप नोट्स में किसी उपयोगकर्ता का उल्लेख करने के लिए भी इनका उपयोग कर सकते हैं!
       <b>समर्थित भरण:</b>
       - <कोड>{पहला}</कोड>: उपयोगकर्ता का पहला नाम।
       - <कोड>{अंतिम}</कोड>: उपयोगकर्ता का अंतिम नाम।
       - <कोड>{पूर्णनाम}</कोड>: उपयोगकर्ता का पूरा नाम।
       - <कोड>{उपयोगकर्ता नाम}</कोड>: उपयोगकर्ता का उपयोगकर्ता नाम. यदि उनके पास कोई नहीं है, तो इसके बजाय उपयोगकर्ता का उल्लेख करें।
       - <कोड>{उल्लेख}</कोड>: उपयोगकर्ता का उनके प्रथम नाम के साथ उल्लेख करता है।
       - <कोड>{आईडी}</कोड>: उपयोगकर्ता की आईडी।
       - <कोड>{चैटनाम}</कोड>: चैट का नाम.

fun_help: |
      ➥ /runs: उत्तरों की एक श्रृंखला से एक यादृच्छिक स्ट्रिंग का उत्तर दें।
      ➥ /pat: किसी व्यक्ति को थपथपाएं, प्यारे लोगों के लिए अच्छी चीज़:3
      ➥ /slap: किसी उपयोगकर्ता को थप्पड़ मारना, या जवाब न मिलने पर थप्पड़ खाना।
      ➥ /shrug उचकाना : कंधे उचकाना XD.
      ➥ /table : फ्लिप/अनफ्लिप करें :v.
      ➥ /decide : बेतरतीब ढंग से हां/नहीं/शायद उत्तर दें
      ➥ /toss : एक सिक्का उछालता है
      ➥ /roll : एक पासा पलटें।
      ➥ /rlg : कान, नाक, मुंह को जोड़ें और एक इमो बनाएं ;-;
      ➥ /shot <कीवर्ड>: कुछ भी लिखें जिसे आप ज़ोर से चिल्लाना चाहते हैं।
      ➥ /stickerid: स्टिकर की आईडी प्राप्त करने के लिए उसका उत्तर दें।
      ➥ /getsticker: कच्ची पीएनजी छवि प्राप्त करने के लिए स्टिकर का उत्तर दें।
      ➥ /steal: किसी स्टिकर या छवि को अपने पैक में जोड़ने के लिए उसका उत्तर दें।

antispam_help: |
      *केवल व्यवस्थापक:*
       ➥ /antispam <on/off/yes/no>*:* हमारी एंटीस्पैम तकनीक को टॉगल करेगा या आपकी वर्तमान सेटिंग्स लौटा देगा।

      एंटी-स्पैम, जिसका उपयोग बॉट डेवलपर्स द्वारा सभी समूहों में स्पैमर्स पर प्रतिबंध लगाने के लिए किया जाता है। इससे बचाव में मदद मिलती है
      आप और आपके समूह जितनी जल्दी हो सके स्पैम फ्लडर्स को हटा दें।
      *नोट:* उपयोगकर्ता @YorkTownEagleUnion पर GBans के खिलाफ अपील कर सकते हैं या स्पैमर्स की रिपोर्ट कर सकते हैं

      क्यूटी आपके चैट रूम से स्पैमर्स को यथासंभव हटाने के लिए @Spamwatch API को भी एकीकृत करता है!
      *स्पैमवॉच क्या है?*
      स्पैमवॉच स्पैमबॉट्स, ट्रॉल्स, बिटकॉइन स्पैमर और अप्रिय पात्रों की एक बड़ी लगातार अद्यतन प्रतिबंध-सूची बनाए रखता है।
      अपने समूह से स्पैमर्स को स्वचालित रूप से प्रतिबंधित करने में लगातार सहायता करें, इसलिए, आपको अपने समूह में स्पैमर्स के आक्रमण के बारे में चिंता करने की आवश्यकता नहीं होगी।
      *नोट:* उपयोगकर्ता @SpamwatchSupport पर स्पैमवॉच प्रतिबंध के खिलाफ अपील कर सकते हैं



locks_help: |
      क्या स्टिकर आपको परेशान करते हैं? या लोगों द्वारा लिंक साझा करने से बचना चाहते हैं? या तस्वीरें?
      आप सही जगह पर हैं!
      लॉक मॉड्यूल आपको कुछ सामान्य वस्तुओं को लॉक करने की अनुमति देता है
      टेलीग्राम वर्ल्ड; बॉट स्वचालित रूप से उन्हें हटा देगा!

       ➥ /locktypes*:* सभी संभावित लॉकटाइप सूचीबद्ध करता है

       *केवल व्यवस्थापक:*
       ➥ /lock <type>*:* एक निश्चित प्रकार की वस्तुओं को लॉक करें (निजी तौर पर उपलब्ध नहीं)
       ➥ /unlock <type>*:* एक निश्चित प्रकार की वस्तुओं को अनलॉक करें (निजी तौर पर उपलब्ध नहीं)
       ➥ /locks*:* इस चैट में लॉक की वर्तमान सूची।

      किसी समूह के उपयोगकर्ताओं को प्रतिबंधित करने के लिए ताले का उपयोग किया जा सकता है।
      उदाहरण:
      यूआरएल लॉक करने से यूआरएल वाले सभी संदेश अपने आप डिलीट हो जाएंगे, स्टिकर लॉक करने से सभी प्रतिबंधित हो जाएंगे
      गैर-व्यवस्थापक उपयोगकर्ताओं को स्टिकर आदि भेजने से रोकें।
      बॉट लॉक करने से गैर-एडमिनों को चैट में बॉट जोड़ने से रोक दिया जाएगा।

      *टिप्पणी:*
       • अनुमति *जानकारी* को अनलॉक करने से सदस्यों (गैर-व्यवस्थापकों) को समूह की जानकारी, जैसे विवरण या समूह का नाम बदलने की अनुमति मिल जाएगी
       • *पिन* अनुमति को अनलॉक करने से सदस्यों (गैर-एडमिन) को समूह में एक संदेश को पिन करने की अनुमति मिल जाएगी


log_help: |
       *केवल व्यवस्थापक:*
       ➥ /setlog*:* लॉग चैनल जानकारी प्राप्त करें
       ➥ /सेटलॉग*:* लॉग चैनल सेट करें।
       ➥ /unsetlog*:* लॉग चैनल को अनसेट करें।
       ➥ /announce*:* चैटरूम में व्यवस्थापक कार्यों की घोषणा करने के लिए सेटिंग टॉगल करें।

       लॉग चैनल सेट करना इसके द्वारा किया जाता है:
       • बॉट को वांछित चैनल में जोड़ना (एक व्यवस्थापक के रूप में!)
       • चैनल में `/setlog` भेजना
       • /setlog को समूह में अग्रेषित करना

markdown_help_text: |
       मार्कडाउन टेलीग्राम द्वारा समर्थित एक बहुत शक्तिशाली फ़ॉर्मेटिंग टूल है। यह सुनिश्चित करने के लिए, क्यूटी में कुछ संवर्द्धन हैं
       सहेजे गए संदेशों को सही ढंग से पार्स किया गया है, और आपको बटन बनाने की अनुमति दी गई है।

       - <कोड>_इटैलिक_</कोड>: टेक्स्ट को '_' से लपेटने से इटैलिक टेक्स्ट उत्पन्न होगा
       - <कोड>*बोल्ड*</कोड>: टेक्स्ट को '*' के साथ लपेटने से बोल्ड टेक्स्ट बनेगा
       - <कोड>`कोड`</कोड>: टेक्स्ट को '''' के साथ लपेटने से मोनोस्पेस्ड टेक्स्ट उत्पन्न होगा, जिसे 'कोड' भी कहा जाता है।
       - <code>[sometext](someURL)</code>: यह एक लिंक बनाएगा - संदेश केवल <code>sometext</code> दिखाएगा,
       और इस पर टैप करने पर <code>someURL</code> पर पेज खुल जाएगा।
       उदाहरण: <कोड>[परीक्षण](example.com)</कोड>

       - <कोड>[बटनटेक्स्ट](बटनयूआरएल:कुछयूआरएल)</कोड>: यह उपयोगकर्ताओं को टेलीग्राम की अनुमति देने के लिए एक विशेष संवर्द्धन है
       उनके मार्कडाउन में बटन। <कोड>बटनटेक्स्ट</कोड> वही होगा जो बटन पर प्रदर्शित होता है, और <कोड>कुछयूआरएल</कोड>
       वह यूआरएल होगा जो खोला गया है।
       उदाहरण: <कोड>[यह एक बटन है](बटनurl:example.com)</कोड>

       यदि आप एक ही लाइन पर एकाधिक बटन चाहते हैं, तो :same का उपयोग करें, जैसे:
       <कोड>[एक](बटनurl://example.com)
       [दो](buttonurl://google.com:same)</code>
       इससे प्रति पंक्ति एक बटन के बजाय एक ही पंक्ति में दो बटन बनेंगे।

       ध्यान रखें कि आपके संदेश में केवल एक बटन के अलावा कुछ पाठ <b>ज़रूर</b> होना चाहिए!


muting_help: |
        *केवल व्यवस्थापक:*
        • `/mute <यूजरहैंडल>`*:* उपयोगकर्ता को चुप करा देता है। उपयोगकर्ता को दिए गए उत्तर को म्यूट करके उत्तर के रूप में भी उपयोग किया जा सकता है।
        • `/tmute <userhandle> x(m/h/d)`*:* उपयोगकर्ता को x समय के लिए म्यूट करता है। (हैंडल, या उत्तर के माध्यम से)। `एम` = `मिनट`, `एच` = `घंटे`, `डी` = `दिन`।
        • `/unmute <userhandle>`*:* किसी उपयोगकर्ता को अनम्यूट करता है। उपयोगकर्ता को दिए गए उत्तर को म्यूट करके उत्तर के रूप में भी उपयोग किया जा सकता है।



moderators_help: |
        कभी-कभी, आप भरोसा नहीं करते हैं लेकिन अपने ग्रुप का यूजर मैनेजर बनाना चाहते हैं तो आप उसे मॉडरेटर बना सकते हैं।
        हो सकता है कि उन्हें व्यवस्थापक बनाने के लिए पर्याप्त न हो, लेकिन आपको प्रतिबंध लगाने, म्यूट करने और चेतावनी न देने से कोई आपत्ति नहीं होगी।
        मॉडचेक इसी के लिए है - विश्वसनीय उपयोगकर्ताओं का मॉड जो आपके समूह को प्रबंधित करने की अनुमति देता है।

        *आदेश*
        ➥ /addmod *:* उपयोगकर्ता का मॉडरेटर।
        ➥ /rmmod *:* उपयोगकर्ता का अनमॉडरेटर।
        ➥ /modcheck *:* उपयोगकर्ता का मॉडरेशन चेक।
        ➥ /modlist *:* मॉडरेशन उपयोगकर्ता सूची।


nightmode_help: |
        *केवल व्यवस्थापक*
        ➥ /nightmode: ग्रुप को नाइट मोड चैट में जोड़ता है।
        ➥ /rmnight: ग्रुप को नाइट मोड चैट से हटा देता है।

        *ध्यान दें:* नाइट स्पैम को रोकने के लिए नाइट मोड चैट स्वचालित रूप से 12 AM (IST) पर बंद हो जाती हैं और 6 AM (IST) पर स्वचालित रूप से खुल जाती हैं।


notes_help: |
        • `/get <notename>`*:* इस नोटनाम के साथ नोट प्राप्त करें
        • `#<नोटनाम>`*:* /प्राप्त के समान
        • `/नोट्स` या `/सेव्ड`*:* इस चैट में सभी सहेजे गए नोट्स सूचीबद्ध करें
        • `/नंबर` *:* सूची में उस नंबर का नोट खींच लेगा।
         यदि आप किसी नोट की सामग्री को बिना किसी फ़ॉर्मेटिंग के पुनः प्राप्त करना चाहते हैं, तो `/get <notename> noformat` का उपयोग करें। ये हो सकता है
         मौजूदा नोट को अद्यतन करते समय उपयोगी हो।

         *केवल व्यवस्थापक:*
        • `/save <notename> <notedata>`*:* नोटडेटा को नोटनाम नाम के साथ नोट के रूप में सहेजता है
         मानक मार्कडाउन लिंक सिंटैक्स का उपयोग करके नोट में एक बटन जोड़ा जा सकता है - लिंक को बस एक के साथ जोड़ा जाना चाहिए
          `बटनयूआरएल:` अनुभाग, जैसे: `[somelink](बटनयूआरएल:example.com)`। अधिक जानकारी के लिए `/markdownhelp` जांचें।
        • `/save <notename>`*:* उत्तर दिए गए संदेश को नोटनाम नाम के साथ नोट के रूप में सहेजें
        • `/clear <notename>`*:* इस नाम से नोट साफ़ करें
        • `/removeallnotes`*:* समूह से सभी नोट्स हटा देता है
        *नोट:* नोट नाम केस-असंवेदनशील होते हैं, और सहेजे जाने से पहले वे स्वचालित रूप से लोअरकेस में परिवर्तित हो जाते हैं।

purge_help: |
        *केवल व्यवस्थापक:*
         • /del: आपके द्वारा उत्तर दिया गया संदेश हटा देता है
         • /purge: इस और उत्तर दिए गए संदेश के बीच के सभी संदेशों को हटा देता है।
         • /purge <integer X>: उत्तर दिए गए संदेश को हटा देता है, और यदि किसी संदेश का उत्तर दिया जाता है तो उसके बाद आने वाले X संदेशों को हटा देता है।

reports_help: |
         • /report <reason>*:* व्यवस्थापकों को रिपोर्ट करने के लिए किसी संदेश का उत्तर दें।
         • @admin*:* एडमिन को रिपोर्ट करने के लिए किसी संदेश का उत्तर दें।
          *ध्यान दें:* व्यवस्थापकों द्वारा उपयोग किए जाने पर इनमें से कोई भी ट्रिगर नहीं होगा।

          *केवल व्यवस्थापक:*
           • /reports <on/off>*:* रिपोर्ट सेटिंग बदलें, या वर्तमान स्थिति देखें।
           • यदि अपराह्न में किया जाता है, तो आपकी स्थिति टॉगल हो जाती है।
           • यदि समूह में है, तो उस समूह की स्थिति को टॉगल करें।


rules_help: |
       ➥ /rules*:* इस चैट के लिए नियम प्राप्त करें।
        *केवल व्यवस्थापक:*
       ➥ /setrules <आपके नियम यहां>*:* इस चैट के लिए नियम निर्धारित करें।
       ➥ /clearrules*:* इस चैट के लिए नियम साफ़ करें।

userinfo_help: |
       - /setbio <text>: उत्तर देते समय, किसी अन्य उपयोगकर्ता का बायो सहेजा जाएगा
       - /bio: आपका या किसी अन्य उपयोगकर्ता का बायो प्राप्त करेगा। इसे आपके द्वारा सेट नहीं किया जा सकता.
       - /setme <text>: आपकी जानकारी सेट करेगा
       - /me: आपकी या किसी अन्य उपयोगकर्ता की जानकारी प्राप्त करेगा

warns_help: |
       ➥ /warns <userhandle>*:* उपयोगकर्ता का नंबर और चेतावनी का कारण प्राप्त करें।
       ➥ /warnlist*:* सभी मौजूदा चेतावनी फ़िल्टर की सूची

       *केवल व्यवस्थापक:*
       ➥ /warn <userhandle>*:* उपयोगकर्ता को चेतावनी दें। 3 चेतावनियों के बाद, उपयोगकर्ता को समूह से प्रतिबंधित कर दिया जाएगा। उत्तर के रूप में भी उपयोग किया जा सकता है.
       ➥ /resetwarn <userhandle>*:* उपयोगकर्ता के लिए चेतावनियाँ रीसेट करें। उत्तर के रूप में भी उपयोग किया जा सकता है.
       ➥ /addwarn <कीवर्ड> <उत्तर संदेश>*:* एक निश्चित कीवर्ड पर एक चेतावनी फ़िल्टर सेट करें। यदि आप चाहते हैं कि आपका कीवर्ड
       एक वाक्य बनें, इसे उद्धरण चिह्नों के साथ शामिल करें, जैसे: `/ चेतावनी दें "बहुत क्रोधित" यह एक क्रोधित उपयोगकर्ता है`।
       ➥ /nowarn <keyword>*:* एक चेतावनी फ़िल्टर बंद करें
       ➥ /warnlimit <num>*:* चेतावनी सीमा निर्धारित करें
       ➥ /strongwarn <on/yes/off/no>*:* यदि चालू पर सेट किया जाता है, तो चेतावनी सीमा से अधिक होने पर प्रतिबंध लगाया जाएगा। नहीं तो लात ही मार देंगे.

greetings_help: |
        *केवल व्यवस्थापक:*
        ➥ /welcome <on/off>*:* स्वागत संदेशों को सक्षम/अक्षम करें।
        ➥ /welcome*:* वर्तमान स्वागत सेटिंग्स दिखाता है।
        ➥ /welcome noformat*:* वर्तमान स्वागत सेटिंग्स दिखाता है, बिना फ़ॉर्मेटिंग के - आपके स्वागत संदेशों को रीसायकल करने के लिए उपयोगी!
        ➥ /goodbye*:* `/welcome` के समान उपयोग और तर्क।
        ➥ /setwelcome <sometext>*:* एक कस्टम स्वागत संदेश सेट करें। यदि मीडिया को उत्तर देने के लिए उपयोग किया जाता है, तो उस मीडिया का उपयोग करता है।
        ➥ /setgoodbye <sometext>*:* एक कस्टम अलविदा संदेश सेट करें। यदि मीडिया को उत्तर देने के लिए उपयोग किया जाता है, तो उस मीडिया का उपयोग करता है।
        ➥ /resetwelcome*:* डिफ़ॉल्ट स्वागत संदेश पर रीसेट करें।
        ➥ /resetgoodbye*:* डिफ़ॉल्ट अलविदा संदेश पर रीसेट करें।
        ➥ /cleanwelcome <on/off>*:* नए सदस्य पर, चैट को स्पैमिंग से बचने के लिए पिछले स्वागत संदेश को हटाने का प्रयास करें।
        ➥ /welcomemutehelp*:* वेलकम म्यूट के बारे में जानकारी देता है।
        ➥ /cleanservice <चालू/बंद*:* टेलीग्राम के स्वागत/बाएं सेवा संदेशों को हटा देता है।
        *उदाहरण:*
        उपयोगकर्ता चैट में शामिल हुआ, उपयोगकर्ता ने चैट छोड़ दी।

        *स्वागत है मार्कडाउन:*
        ➥ /welcomehelp*:* कस्टम स्वागत/अलविदा संदेशों के लिए अधिक स्वरूपण जानकारी देखें।

nation_help: |
       - /eagle - ईगल यूनियन के सभी सदस्यों की सूची।
       - /royals - सभी शाही राष्ट्रों की सूची।
       - /sakuras - सभी सकुरा राष्ट्रों की सूची।
       - /sardegnas - सभी सार्डेग्नास राष्ट्रों की सूची।
       - /neptunians - सभी नेप्च्यूनिया राष्ट्रों की सूची।
       ध्यान दें: ये आदेश विशेष बॉट विशेषाधिकार वाले उपयोगकर्ताओं को सूचीबद्ध करते हैं और केवल उनके द्वारा ही उपयोग किए जा सकते हैं।
       इनके बारे में अधिक जानकारी के लिए आप @PublicSource_Chat पर जा सकते हैं।


sticker_blacklist_help: |
        **केवल व्यवस्थापक:**
          ➥ /addblsticker <स्टिकर लिंक>**:** स्टिकर ट्रिगर को काली सूची में जोड़ें। उत्तर स्टीकर के माध्यम से जोड़ा जा सकता है
          ➥ /unblsticker <स्टिकर लिंक>**:** ट्रिगर्स को ब्लैकलिस्ट से हटाएं। वही न्यूलाइन तर्क यहां लागू होता है, इसलिए आप एक साथ कई ट्रिगर हटा सकते हैं
          ➥ /rmblsticker <स्टीकर लिंक>**:** उपरोक्त के समान
          ➥ /blstickermode <delete/ban/tban/mute/tmute>**:** यदि उपयोगकर्ता ब्लैकलिस्टेड स्टिकर का उपयोग करते हैं तो क्या करना है, इस पर एक डिफ़ॉल्ट कार्रवाई सेट करता है
        टिप्पणी:
          ➥ `<sticker link>` `https://t.me/addstickers/<sticker>` या केवल `<स्टिकर>` हो सकता है या स्टिकर संदेश का उत्तर दे सकता है


stickers_help: |
          ➥ /stickerid*:* किसी स्टिकर का उत्तर देकर मुझे उसकी फ़ाइल आईडी बताएं।
          ➥ /getsticker*:* एक स्टिकर का जवाब दें और मुझे इसकी कच्ची पीएनजी फ़ाइल अपलोड करने के लिए कहें।
          ➥ /delstcker*:* स्टिकर को पैक से हटाने के लिए उत्तर दें, मैं केवल वही हटा सकता हूं जो मैंने बनाया है।
          ➥ /kang*:* स्टिकर (एनिमेटेड/स्थैतिक/वीडियो) या छवि या GIF का जवाब अपने पैक में डालें।
          ➥ /stickers*:* कॉम्बो स्टिकर कैटलॉग पर दिए गए शब्द के लिए स्टिकर ढूंढें

topics_help: |
   टेलीग्राम ने आपके चैट को प्रबंधित करने का नया तरीका प्रस्तुत किया है जिसे फ़ोरम (विषय) कहा जाता है

   एक समूह प्रबंधन बॉट के रूप में मेरे पास आपकी सहायता के लिए कुछ उपयोगी कमांड हैं
   अपनी चैट में विषय बनाएं, हटाएं, बंद करें और दोबारा खोलें।
   ➥ /topicnew*:* नया विषय बनाएं, बनाने के लिए विषय नाम की आवश्यकता है।
   ➥ /topicdel*:* किसी मौजूदा विषय को हटाएं, हटाने के लिए विषय आईडी की आवश्यकता है।
   ➥ /topicclose*:* किसी मौजूदा विषय को बंद करें, बंद करने के लिए विषय आईडी की आवश्यकता है।
   ➥ /topicopen*:* पहले से बंद विषय को खोलें, खोलने के लिए विषय आईडी की आवश्यकता है।
   ➥ /setactiontopic*:* स्वागत, अलविदा, चेतावनी, प्रतिबंध, आदि जैसे कार्रवाई संदेशों के लिए जारी करने का विषय सेट करें
   ➥ /delactiontopic*:* कार्रवाई संदेशों के लिए डिफ़ॉल्ट विषय हटाएं।



tools_help: |
   *देश*
   ➥ /country <देश का नाम>*:* दिए गए देश के बारे में जानकारी एकत्र करना

   *मुद्रा परिवर्तक:*
   ➥ /cash*:* मुद्रा परिवर्तक
   *उदाहरण:*
   ➥ /cash 1 USD INR
   ➥ /cash 1 USD INR
   *आउटपुट:* 1.0 USD = 75.505 INR

   *अंग्रेजी उपकरण*
   ➥ /define <text>*:* वह शब्द या अभिव्यक्ति टाइप करें जिसे आप खोजना चाहते हैं\nउदाहरण के लिए /definekill
   ➥ /spell*:* किसी संदेश का उत्तर देते समय, व्याकरण सुधारित संस्करण के साथ उत्तर दिया जाएगा
   ➥ /synonyms <word>*:* किसी शब्द के समानार्थी शब्द खोजें
   ➥ /antonyms <word>*:* किसी शब्द का विलोम शब्द खोजें

   *एन्क्रिप्शन और डिक्रिप्शन*
   ➥ /encrypt *:* दिए गए टेक्स्ट को एन्क्रिप्ट करता है
   ➥ /decrypt *:* पहले से एन्क्रिप्ट किए गए टेक्स्ट को डिक्रिप्ट करता है
 
   *गिटहब*
   ➥ /github <उपयोगकर्ता नाम>*:* एक github उपयोगकर्ता के बारे में जानकारी प्राप्त करें।

   *जीपीएस और स्थान*
   ➥ /gps <स्थान>*:* जीपीएस स्थान प्राप्त करें।

   *चिपकाएं*
   ➥ /paste *:* उत्तर दी गई सामग्री को nekobin.com पर सहेजता है और एक यूआरएल के साथ उत्तर देता है
 
   *पीडीएफ टूल*
   /pdf *:* उत्तर दी गई छवि का पीडीएफ बनाएं

   *क्यू आर संहिता*
   ➥ /getqr *:* उत्तर दिए गए फोटो से QR कोड सामग्री प्राप्त करें।
   ➥ /makeqr <text> *:* दिए गए टेक्स्ट वाला एक QR कोड बनाएं।

   ➥ /time <query>*:* किसी समयक्षेत्र के बारे में जानकारी देता है।
   *उपलब्ध प्रश्न:* देश कोड/देश का नाम/समयक्षेत्र नाम 🕐 [समयक्षेत्र सूची](https://en.wikipedia.org/wiki/List_of_tz_database_time_zones)

   *शहरी तानाशाही:*
   ➥ /ud <word>*:* वह शब्द या अभिव्यक्ति टाइप करें जिसे आप खोजना चाहते हैं
 
   *विकिपीडिया:*
   ➥ /wiki <query>*:* विकिपीडिया आपकी क्वेरी

   *वॉलपेपर*
   ➥ /wall <query>*:*wall.alphacoders.com से वॉलपेपर प्राप्त करें
  
   *मौसम*
   ➥ /weather <town name>*:* उन्नत मौसम मॉड्यूल, उपयोग /मौसम के समान
   ➥ /weather moon*:* चंद्रमा की वर्तमान स्थिति प्राप्त करें
  
   *वेबसाइट स्क्रीनशॉट*
   ➥ /webss <URL Link>*;* दिए गए यूआरएल का स्क्रीनशॉट भेजता है।
  
   *लिखने का उपकरण*
   ➥ /write <text>*:* दिए गए टेक्स्ट को लिखता है।
  
   *ज़िप*
   ➥ /zip *:* किसी टेलीग्राम फ़ाइल को .zip प्रारूप में संपीड़ित करने के लिए उसका उत्तर दें
   ➥ /unzip *:* किसी टेलीग्राम फ़ाइल को .zip प्रारूप से डीकंप्रेस करने के लिए उसका उत्तर दें
