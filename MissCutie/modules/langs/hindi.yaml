curr_chat_lang: "आपकी वर्तमान भाषा {} है, नीचे दिए गए बटनों में से जो भाषा आप चाहते हैं उसे चुनें :)"
set_chat_lang: "बहुत बढ़िया, {} यह अब से आपकी भाषा है!"


pm_start_text: |
    नमस्ते मैं हूँ {},
    मैं कुछ मजेदार और अतिरिक्त सुविधाओं के साथ एक एनीमे थीम वाला समूह प्रबंधन बॉट हूं;)
   
    मैं कई तरह की चीजें कर सकता हूं, उनमें से सबसे आम हैं:
    - *प्रतिबंध अनुमतियों* के साथ उपयोगकर्ताओं को प्रतिबंधित करें।
    - उचित फ़ॉर्मेटिंग के साथ, मीडिया + टेक्स्ट और बटन के साथ उपयोगकर्ताओं का स्वागत करें।
    - मेरे *एंटी-फ्लड* मॉड्यूल का उपयोग करके आपकी चैट में बाढ़ लाने वाले उपयोगकर्ताओं को प्रतिबंधित करें।
    - सेट किए गए विकल्पों के अनुसार उपयोगकर्ताओं को *चेतावनी* दें और तदनुसार उन्हें प्रतिबंधित करें।
    - उचित फ़ॉर्मेटिंग और उत्तर मार्कअप के साथ नोट्स और फ़िल्टर सहेजें।
   
    और भी बहुत कुछ है! यह केवल एक ऊपरी हिस्सा है। ध्यान दें मुझे चाहिए
    ठीक से काम करने के लिए उचित व्यवस्थापक अनुमतियों के साथ प्रचारित किया जाना चाहिए।
    अन्यथा मैं बताए अनुसार कार्य नहीं कर पाऊंगा।
   
    *अधिक जानने के लिए सहायता पर क्लिक करें!*
   
grp_start_text: "नमस्ते, मैं प्यारी हूँ।"

pm_help_text: |
    नमस्ते! मेरा नाम *प्यारी* है. *ईगल यूनियन* का एक हिस्सा।
    मैं कुछ मज़ेदार अतिरिक्त सुविधाओं वाला एक मॉड्यूलर समूह प्रबंधन बॉट हूँ! इनमें से कुछ के विचार के लिए निम्नलिखित पर एक नजर डालें
    जिन चीजों में मैं आपकी मदद कर सकता हूं।
    *मुख्य* आदेश उपलब्ध:
     • /start: मुझे प्रारंभ करता है, इसका उपयोग यह जांचने के लिए किया जा सकता है कि मैं जीवित हूं या नहीं।
     • /help: यह संदेश प्रधानमंत्री जी का है।
     • /language: बॉट भाषा बदलें।
     • /settings:
       - पीएम में: आपको सभी समर्थित मॉड्यूल के लिए आपकी सेटिंग्स भेज दी जाएंगी।
       - एक समूह में: आपको चैट की सभी सेटिंग्स के साथ अपराह्न पर रीडायरेक्ट कर दिया जाएगा।
     विशिष्ट मॉड्यूल के बारे में दस्तावेज़ प्राप्त करने के लिए नीचे दिए गए बटन पर क्लिक करें!


