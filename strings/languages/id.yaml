admin_help: |
   *Semua Pengguna*
   - /admins*:* daftar admin dalam obrolan

   *Hanya Admin*
   - /pin*:* pin pesan secara diam-diam yang dijawab - tambahkan `'loud'` atau `'notify'` untuk memberi notifikasi kepada pengguna
   - /unpin*:* batalkan pengepinan pesan yang sedang dipin
   - /unpinall*:* batalkan pengepinan semua pesan yang dipin, berfungsi di topik juga (hanya PEMILIK yang dapat melakukannya.)
   - /del*:* hapus pesan yang Anda jawab
   - /purge*:* hapus semua pesan antara ini dan pesan yang dijawab
   - /purge <integer X>*:* hapus pesan yang dijawab dan X pesan setelahnya jika dijawab pada pesan
   - /invitelink*:* dapatkan tautan undangan
   - /promote*:* promosikan pengguna yang dijawab
   - /demote*:* demote pengguna yang dijawab
   - /title <judul di sini> *:* atur judul kustom untuk admin yang dipromosikan oleh bot
   - /admincache*:* memaksa refresh daftar admin

   *Permintaan Bergabung Grup*
   - /approveall menyetujui semua permintaan bergabung yang tertunda *(TIDAK LAGI)*
   - /joinrequest `<yes|on|true/no|off|false>` Untuk mengaktifkan tombol penerimaan permintaan bergabung
   - /autoapprove `<yes|on|true/no|off|false>` Untuk mengaktifkan penerimaan otomatis permintaan bergabung

   *Alat Aksi Massal*
   - /unbanall*:* Unban semua anggota yang diblokir dalam Grup 
   - /unmuteall*:* Unmute semua anggota yang diblokir dalam Grup
   - /banall*:* Blokir semua anggota dalam Grup *(Hanya Pemilik Grup yang Dapat Menggunakan Perintah Ini)*
   - /zombies*:* Mulai mencari akun yang dihapus dalam grup.
   - /zombies clean*:* Hapus akun yang dihapus dari grup.
   - /users*:* dapatkan daftar pengguna grup

afk_help: |
   - /afk <alasan>: tandai diri Anda sebagai AFK (jauh dari keyboard).
   - brb <alasan>: sama seperti perintah afk - tapi bukan perintah.
   Ketika ditandai sebagai AFK, setiap mention akan dijawab dengan pesan yang mengatakan Anda tidak tersedia!

anilist_help: |
    *AniList*
    Dapatkan informasi tentang anime, manga, atau karakter dengan bantuan modul ini! Semua data diambil dari [AniList](anilist.co).
    *Perintah yang Tersedia:*
     - /anime <anime>: mengembalikan informasi tentang anime tersebut.
     - /character <character>: mengembalikan informasi tentang karakter tersebut.
     - /manga <manga>: mengembalikan informasi tentang manga tersebut.

antiflood_help: |
     Antiflood memungkinkan Anda mengambil tindakan terhadap pengguna yang mengirim lebih dari x pesan berturut-turut. Melampaui banjir yang diatur akan mengakibatkan pembatasan pengguna tersebut.
     Ini akan memute pengguna jika mereka mengirim lebih dari 10 pesan berturut-turut, bot diabaikan.
      - /flood*:* Dapatkan pengaturan kontrol banjir saat ini
     - *Hanya Admin:*
     - /setflood <int/'no'/'off'>*:* mengaktifkan atau menonaktifkan kontrol banjir
     *Contoh:* `/setflood 10`
     - /setfloodmode <ban/kick/mute/tban/tmute> <nilai>*:* Tindakan yang akan dilakukan ketika pengguna melebihi batas banjir. ban/kick/mute/tmute/tban
     - *Catatan:*
     - Nilai harus diisi untuk tban dan tmute!!
     Ini bisa menjadi:
     `5m` = 5 menit
     `6h` = 6 jam
     `3d` = 3 hari
     `1w` = 1 minggu


approve_help: |
     Terkadang, Anda mungkin mempercayai seorang pengguna untuk tidak mengirim konten yang tidak diinginkan.
     Mungkin tidak cukup untuk menjadikannya admin, tetapi Anda mungkin setuju dengan kunci, daftar hitam, dan antiflood tidak berlaku untuk mereka.
     Itulah yang dimaksud dengan persetujuan - menyetujui pengguna yang dapat dipercaya untuk memungkinkan mereka mengirim
     *Perintah Admin:*
     - /approval*:* Periksa status persetujuan pengguna dalam obrolan saat ini.
     - /approve*:* Menyetujui pengguna. Kunci, daftar hitam, dan antiflood tidak akan berlaku lagi untuk mereka.
     - /unapprove*:* Membatalkan persetujuan pengguna. Mereka sekarang akan tunduk pada kunci, daftar hitam, dan antiflood lagi.
     - /approved*:* Daftar semua pengguna yang disetujui.
     - /unapproveall*:* Batalkan persetujuan *SEMUA* pengguna dalam obrolan. Ini tidak dapat dibatalkan.

backup_help: |
    *Hanya Admin:*
     - /import: balas ke file cadangan group butler untuk mengimpor sebanyak mungkin, membuat transfer menjadi sangat sederhana! Perhatikan \
       bahwa file/foto tidak dapat diimpor karena pembatasan telegram.
     - /export: Ekspor data grup, yang akan diekspor adalah: aturan, catatan (dokumen, gambar, musik, video, audio, suara, teks, tombol teks)

bans_help: |
   *Semua Pengguna*
    - /kickme: menendang pengguna yang mengeluarkan perintah

   *Admin saja:*
    - /ban <userhandle>: melarang pengguna. (melalui handle, atau balasan)
    - /tban <userhandle> x(m/j/h): melarang pengguna selama x waktu. (melalui handle, atau balasan). m = menit, j = jam, h = hari.
    - /unban <userhandle>: membuka larangan pengguna. (melalui handle, atau balasan)
    - /kick <userhandle>: menendang pengguna keluar dari grup, (melalui handle, atau balasan)

blacklist_help: |
    Blacklist digunakan untuk menghentikan pemicu tertentu dari dinyatakan dalam grup. Setiap kali pemicu tersebut disebutkan, pesan akan segera dihapus. Kombinasi yang baik adalah kadang-kadang menggabungkannya dengan filter peringatan!

    *CATATAN*: Blacklist tidak mempengaruhi admin grup.

     - /blacklist*:* Lihat kata-kata yang masuk dalam daftar hitam saat ini.

    Hanya Admin:
     - /addblacklist <pemicu>*:* Tambahkan pemicu ke daftar hitam. Setiap baris dianggap sebagai satu pemicu, sehingga menggunakan baris yang berbeda akan memungkinkan Anda menambahkan beberapa pemicu.
     - /unblacklist <pemicu>*:* Hapus pemicu dari daftar hitam. Logika baris yang sama berlaku di sini, sehingga Anda dapat menghapus beberapa pemicu sekaligus.
     - /blacklistmode <off/del/warn/ban/kick/mute/tban/tmute>*:* Tindakan yang akan dilakukan ketika seseorang mengirim kata-kata yang masuk dalam daftar hitam.

cleaner_help: |
    - /cleanbluetext <on/off/yes/no> - membersihkan perintah setelah dikirimkan
    - /ignorecleanbluetext <kata> - mencegah pembersihan otomatis dari perintah
    - /unignorecleanbluetext <kata> - menghapus pencegahan pembersihan otomatis dari perintah
    - /listcleanbluetext - daftar perintah yang saat ini diberikan izin untuk tidak dibersihkan secara otomatis

connections_help: |
    - /connect: menghubungkan obrolan (Dapat dilakukan di grup dengan /connect atau /connect <chat id> di PM)
    - /connection: daftar obrolan yang terhubung
    - /disconnect: memutuskan hubungan dari obrolan
    - /helpconnect: daftar perintah yang tersedia yang dapat dilakukan dari jarak jauh

     *Hanya Admin:*
    - /allowconnect <yes/no>: izinkan pengguna untuk terhubung ke obrolan

cust_filters_help: |
    - /filters*:* Daftar semua filter aktif yang disimpan dalam obrolan.

     *Admin saja:*
    - /filter <kata kunci> <pesan balasan>*:* Tambahkan filter ke obrolan ini. Bot akan menjawab pesan tersebut setiap kali 'kata kunci'
      disebutkan. Jika Anda membalas stiker dengan kata kunci, bot akan menjawab dengan stiker tersebut. CATATAN: semua kata kunci filter
      dalam huruf kecil. Jika Anda ingin kata kunci Anda menjadi kalimat, gunakan tanda kutip. contoh: /filter "hai" Bagaimana kamu
      melakukannya?
    - /stop <kata kunci filter>*:* Hentikan filter tersebut.

     *Hanya Pencipta Obrolan:*
    - /removeallfilters*:* Hapus semua filter obrolan sekaligus.

      *Catatan*: Filter juga mendukung pemformatan markdown seperti: {first}, {last} dll.. dan tombol.
        Periksa /markdownhelp untuk mengetahui lebih lanjut!

disable_help: |
    Tidak semua orang ingin menggunakan setiap fitur yang ditawarkan oleh bot. Beberapa perintah sebaiknya
    tidak digunakan; untuk menghindari spam dan penyalahgunaan.

    Ini memungkinkan Anda menonaktifkan beberapa perintah yang sering digunakan, sehingga tidak ada yang dapat menggunakannya.
    Ini juga akan memungkinkan Anda menghapusnya secara otomatis, menghentikan orang dari bluetexting.

     - /cmds: Periksa status saat ini dari perintah yang dinonaktifkan

     *Hanya Admin:*
     - /enable <nama cmd>: Aktifkan perintah tersebut
     - /disable <nama cmd>: Nonaktifkan perintah tersebut
     - /enablemodule <nama modul>*:* aktifkan semua perintah dalam modul tersebut
     - /disablemodule <nama modul>*:* nonaktifkan semua perintah dalam modul tersebut
     - /listcmds: Daftar semua perintah yang dapat dinonaktifkan

download_help: |
     Memudahkan pengunduhan file dari sebagian besar situs!

     *PENGGUNAAN:*
     - /download [url] - Unduh file dari URL (Sudo Hanya)
     - /download [reply_to_TG_File] - Unduh File TG
     - /telegraph [reply_to_TG_File] - Unduh File TG
     - /tiktokdl [link] - Unduh Video TikTok, coba gunakan perintah ytdown jika terjadi kesalahan.
     - /fbdl [link] - Unduh Video Facebook.
     - /anon [link] - Unggah file ke Anonfiles.
     - /ytdl [URL yang Didukung YT-DLP] - Mengunduh Video dan Audio yang Didukung YT-DLP.
     - /song [URL atau Pertanyaan] Unduh lagu dari YouTube
     - /video [URL atau Pertanyaan] Unduh video dari YouTube


