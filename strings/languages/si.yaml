   /skip : සවුන් සුරක්ෂිතයේ ප්‍රවර්ගය එරෙහි එහාට නිර්මාන කිරීම.
   /end or /stop : ප්‍රවර්ගය සුරක්ෂිතයේ සොයා ගත් ප්‍රවර්ගය නැවත ආරම්භ කරයි.
   /player : අනුමැතියට පාලක් පැනයක් ලබාගන්න.
   /queue : අනුමැතියට ප්‍රවර්ග ලැයිස්තුව පෙන්වන්න.

