     මෙම අටක් ඉක්මන් කිරනු ලැබේය.
      - /flood*:* වරන්නේ පවතින වේලාක් අරඹයි
     - *පරිපාලකයට පමණක්:*
     - /setflood <int/'no'/'off'>*:* වේලා කාටු කිරීම සහායයට සුදු හෝ අක්කයක් සකස් කරයි
     *උදාහරණ:*
     - වේලා වලින් මානකරණය කිරීමේ සහායය අවශ්‍ය වේ.
     එය වෙබ්බා්රායකාට:
     `5m` = 5 මිනිත්
     `6h` = 6 වරන්
     `3d` = 3 දින
     `1w` = 1 සතිය

approve_help: |
     හොඳම සහායක් සඳහා, ඔයාගේ පරිශීලකම් සම්බන්දයට නොලබා ඇති කිසිවක් ඔයාට විස්තරවීමේදී විස්තරයක් ඇති වේ.
     එය සක්කරනු ලැබේ - සුදු අක්කයක්, දෙවනි ලොක්ස්, සුළුවැල්ල, සහ antiflood දැක්කාක් ඔයාට ස්බොමිට් නොදැක්කෙයි.
     *පරිපාලක විධානයන්:*
     - /approval*:* වරණයේ පරිශීලකට ඔයාට සුදුවරු, දෙවනි සහ antiflood ස්බොමි නොදැක්කන්න
     - /approve*:* පරිශීලකට සුදුවරු වෙනස්, දෙවනි සහ antiflood ස්බොමි නොදැක්කන්න
     - /unapprove*:* පරිශීලකට සුදුවරු, දෙවනි සහ antiflood ස්බොමි කරයි
     - /approved*:* සෑම සෂ්පාදනයක් සඳහා විස්තරයක් ලබාගන්න
     - /unapproveall*:* කණ්ඩායමේ *සෑම* පරිශීලකයට සුදුවරු කරන්න. මෙය අවිකයට නොහැකිය.
backup_help: |
    *පරිපාලක පමණක්:*
     - /import: කණ්ඩායමේ බටඅසාව පරිවාසීමට හෝමින් පිළිතුරු සියල්ල පරිවාසීමක් වරන්න! අවබෝධයේ පාඩම්/ඡායාරා/නිර්මාත්/අක්ෂාකා/අක්ෂාකාගේ වේලාව එකට හෝමින් කළ නොහැක.
     - /export: කණ්ඩායමේ දත්ත අපේක්ෂාකයන්, සහායක්, ලේඛය (ලේඛයේ ලොක්ස්, දැක්කා, සොල්, වීඩියෝ, ගීත, වීඩියෝ, පොඩුස්)
bans_help: |
   *ඕනෑ පරිශීලක*
    - /kickme: සුදුරක් වෙනස් කරයි

   *පරිශීලකයන් පමණක්*
    - /ban <userhandle>: පරිශීලකයට අයිතිකරයි. (හැන්ඩල්, නියම්මුද? හෝ පිළිතුරු ලොක්)
    - /tban <userhandle> x(m/h/d): පරිශීලකයට x කාලයක් අයිතිකරයි. (හැන්ඩල්, නියම්මුද? හෝ පිළිතුරු ලොක්). m = මිනිත්, h = වරන්, d = දින.
    - /unban <userhandle>: පරිශීලකයට අවක්ෂාකරයි. (හැන්ඩල්, නියම්මුද? හෝ පිළිතුරු ලොක්)
    - /kick <userhandle>: කණ්ඩායමේ පරිශීලකයට අවක්ෂාකරයි. (හැන්ඩල්, නියම්මුද? හෝ පිළිතුරු ලොක්)

blacklist_help: |
    කළමනාකරණ වක්කුවක් කණ්ඩායමේ කියවන වේකාක් වරන්නෙයි. එකක් කණ්ඩායමේ කියවන සැපයුම දැක්කාක් එක්කරයි. අනේක් සුදුවරුවක් හෝ සුළුවරුවක් එක්කරයි.

    *ස්තියි*: කළමනාකරණ වක්කුවක් කණ්ඩායමේ පරිපාලකයන්ට නොබාරයි.

     - /blacklist*:* වරන්නේ වක්කුවක් අනුහස් කරයි.

    පරිපාලක වර්ගයන්:
     - /addblacklist <triggers>*:* කළමනාකරණ වක්කුවක් එකතු කිරයි. එකක් එකතු කරන්නෙයි, එක් වෙනස් කිරන්නනෙයි.
     - /unblacklist <triggers>*:* කළමනාකරණ වක්කුවක් ඉවත් කිරයි. එකක් එකතු කරන්නනෙයි, එක් වෙනස් කිරන්නනෙයි.
     - /blacklistmode <off/del/warn/ban/kick/mute/tban/tmute>*:* කළමනාකරණ වක්කුවක් දක්වයි තොවනවය.


cleaner_help: |
    - /cleanbluetext <on/off/yes/no> - කාමරය පසුබිමට පසුබිමක්/කියවන්ද වලින් මකා දකාගත හැකිය
    - /ignorecleanbluetext <පද> - ප්‍රාණවත් පසුබිමක් අලුත් කිරීම නිවැරදි කියවන්ද නොකරය
    - /unignorecleanbluetext <පද> - ප්‍රාණවත් පසුබිමක් අලුත් කිරීම නිවැරදි කියවන්ද ඉවත් කරය
    - /listcleanbluetext - වත්මන් සලකුණු ප්‍රාණවත් පසුබිමක් ලැයිස්තු කරය

connections_help: |
    - /connect: සම්බන්ධය කරය (සමූහයේ /connect හෝ /connect <සම්බන්ධය අංකය> PM වෙත පිටපත් කළ හෝ)
    - /connection: සම්බන්ධ සමූහ ලැයිස්තු කරය
    - /disconnect: සම්බන්ධයෙන් වත්මන් සම්බන්ධයෙන් වෙනස් කරය
    - /helpconnect: ද්විතීයත්වයක් කළ හෝ කරයේ ද්විතීයත්වය සමූහ ලයිස්තු කරය

     *පරිපාලක පමණ:*
    - /allowconnect <ඔවුන්/නැත>: සම්බන්ධයෙන් එයට සම්බන්ධ කිරීමට පරිපාලකයෙන් ඉඩ දෙන්න

cust_filters_help: |
    - /filters*:* මෙම සම්බන්ධයෙහි සැකසීම් සුරැකියා කර ඇත්තේ සුරැකීම් සිතියම් සුරැකුම්කරනවා.

     *පරිපාලක පමණ:*
    - /filter <පදය> <ප්‍රතියේ පණිවිඩය>*:* මෙම සම්බන්ධයට සුරැකීමක් එකතු කිරීම. ක්‍රමාංකරණය කිරීමෙන් 'පද' කියවන්ද
      වලින් මේ පණිවිඩයක් පිළිබඳ ප්‍රතියයේ කතාබහටත් පණිවිඩයක් පිළිබඳව පිළිගනියි. ඔබ 'පද' නම්ද වාක්‍යක් වෙනස් කරනවා, ක්ෂේත්‍ර
      භාවිතා කරය. උදාහරණය: /filter "හෘදරයාට" ඔයාට කොහොමද ද?
    - /stop <සුරැකීම් පද>*:* එය සුරැකීම කියවන්ද නොකරය.

     *සම්බන්ධය සහිතවාදීතීය පමණ:*
    - /removeallfilters*:* සුරැකීම් සිතියම් සෑදීමේ සිතියම් සිවිල් කිරීමේ සිතියම් සෑදීමේ
      සිතියම් සුරැකීම් මුලුදිම් ඉවත් කරය.

      *අදහස*: සුරැකීම් සුරැකුම්කරනවාහි මාර්කට් පදිංචි විධාන සහිතවාදීතයාකාරිස්
        හෝ බටන්ස් භාවිතා කරය. /markdownhelp එක්කානනය කරනවාට තවත් දැක්කාක්!

disable_help: |
    නොමැකීම නිසා, මෙම බොටේ සියල්ල අඩු බොට් සහිතවාදීතයාගේ ඉහළ හෝ භාවිතා කරය.

    මෙය ප්‍රතිඵල කරනවා හෝ හ්රෙයිග්ලාකරනවා කියායි.
     - /cmds: නොමැකීම් බොටේ ප්‍රවේශ කිරීමේ ප්‍රවේශය පටවයේ පටවය
     *පරිපාලක පමණ:*
     - /enable <ප්‍රවේශය නම>: එය ප්‍රවේශ කිරීම
     - /disable <ප්‍රවේශය නම>: එය නොමැකීම
     - /enablemodule <මොඩියුල් නම>*:* එය සියල්ල ප්‍රවේශයක් සියල්ල කිරීම
     - /disablemodule <මොඩියුල් නම>*:* එය සියල්ල නොමැකීම
     - /listcmds: සියල්ල මුලු හොඳම නොමැකීම් සහිතවාදීතයාගේ පළට ලැයිස්තු කරය

download_help: |
     බොට් සහිතවාදීතයාගේ වෙනස් කිරීමට හොඳයි!

     *භාවිතා:*
     - /download [URL] - URL වෙතින් ගොනු බාගන්න (Sudo පරිපාලකයෙක් පමණ)
     - /download [TG ගොනුක්] - TG ගොනුක් බාගන්න
     - /telegraph [TG ගොනුක්] - TG ගොනුක් බාගන්න
     - /tiktokdl [ලින්ක්] - TikTok වීඩියෝ බාගන්න, විදී ක්‍රියාකාරය වෙනස් කිරීමේදී ytdown පරිපාලකයාට උත්සහ කරය.
     - /fbdl [ලින්ක්] - Facebook වීඩියෝ බාගන්න.
     - /anon [ලින්ක්] - ගොනු වෙනස් කිරීම Anonfiles වෙත උඩුගත කරය.
     - /ytdl [YT-DLP සහිත URL] - YT-DLP සහිත වීඩියෝ සහ නන්ඩ් බාගන්න.
     - /song [URL හෝ විද්‍යා ඇල්බමය] - YouTube වීඩියෝවෙන් ගීතය බාගන්න
     - /video [URL හෝ විද්‍යා ඇල්බමය] - YouTube වීඩියෝවෙන් වීඩියෝ බාගන්න

extra_help: |
    *Carbon*
    /carbon *:* එනම් Carbon වෙනස් කරයි හෝ පසුගිය පිටපතකට පිටපත් කරය

    *ඩුඔබල්*
    - /couples *:* 2 පරිශීලකයේ නම ලබා ප්‍රවේශ කරයි හෝ ඔයාට ඔයාගේ සම්බන්ධයේ පරිශීලකයන්ගේ නම් සපුරාම කවදා කරය
    *ඊකෝ*
    - /echo *:* පිළිතුරට පිළිබිඹක්

    *එමෝජී වෙළුම*
    *එමෝජීගම් සංරක්ෂණය:*
    - /dice or /dice 1 සිට 6 දක්වාද හෝ
    - /ball or /ball 1 සිට 5 දක්වාද හෝ
    - /dart or /dart 1 සිට 6 දක්වාද හෝ
     *භාවිතය:* හහහ, මාජිකලයෙන් වෙනස් කරනවා.
     *අනතුර:* ඔබ සියල්ල වෙනස් කිරීමක් කරනවාට ඔබට වෙනස් කරනු ලබන්නා වගයේ නමක් විය යුතුය.

    *මාකාර්ක්:*
    - /markdownhelp*:* ටෙලිග්‍රෑමෝක් ක්‍රියාකාරකම් කුමුදුදක් හෝ බටන්ස් විධාන සහිතවාදීතයාගේ හෝ
        බටන්ස් විධානයක්. අන්තර්ක්රමාංකරණය සකස් වෙයි!
 
    *මැමෙෆය්*
    - /mmf <පිළිතුර> *:* ප්‍රතියේ පිළිබා සම්බන්ධයට එකතු කිරීම

    *ප්‍රෑංක්*
    - /horny *:* ඔබගේ වර්තමානය පරිපාලකයාට පෙරදසුගීතයක්
    - /gay *:* ඔබගේ ජයමානය පරිපාලකයාට පෙරදසුගීතයක්
    - /lezbian *:* ඔබගේ ළේසබිමය පරිපාලකයාට පෙරදසුගීතයක්
    - /boob *:* ඔබගේ මසුමුදල වර්ගය පරිපාලකයාට පෙරදසුගීතයක්
    - /cute *:* ඔබගේ මානම්බීම පරිපාලකයාට පෙරදසුගීතයක්

    *ප්‍රක්ශා:*
    - /react*:* සහිතවාදීතයාගේ අවිස්සාවට සුරැකීම

    *ටැග්/මෙන්ෂන් කිරීම් සහිතවාදීතයාගේ:*
    - /tagall or @all '(ප්‍රතියය සහිතවාදීතයාගේ පණිවිඩය හෝ අනුමැති පණිවිඩයක්) - ඔබේ සමූහයේ සියල්ල සුරැකීම
      කිරයි, නැවතත් නොමැකීමක් නොකරය.

    *උයනා ක්ලි*
    - /q - පණිවිඩය පෙරදසුගීතයක්
    - /q [සංඛ්යාව] - 1 සහිත පණිවිඩයක් පෙරදසුගීතයක්
    - /q r - පණිවිඩය සහ එවක් සම්බන්ධයෙන් පෙරදසුගීතයක්
    - /q r [සංඛ්යාව] - 1 සහිත පෙරදසුගීතයක් සහ එවක් සම්බන්ධයෙන් පෙරදසුගීතයක්


feds_help: |
  සුළු, නියෝගයක් පළමුව සඳහා උපකාරයා එන්නෙක් ඔබගේ සමූහයට ඇතුල්වීමට ආරම්භ වේ, එය අන්ධයේදී එන්න වෙනස් කිරීමක් මෙතැනින් කිහිපයක් කියයි. බුක් කිරීමට අධිකරණය කිරීමට අවශ්‍යයේද, ඔබ සුපිරිම සමූහන් ස්පැමරයක් එකතු කළ යුතුද? කවුරු කවුරු වෙනස් කිරීමට කවුරු ක්ලාක් කරනවා. නම්, තවත් සමූහන් ඇතුළු නම්, මෙම සුපිරිම සමූහයේ නමට එකක් ඇතුළු නම් - කෙසේද ඔබට නොවෙනස් කිරීමට? ඔබට සුළු ක්ලාක් එකක්ද, සහිතව සුපිරිම සමූහන් සමඟ එකක් ඇතුළු කළ යුතුද?
  *දැනුම් ක්‍රමා:*
  සමූහ වෙනස් කිරීමට සුළු 3 කොටසට හෝඩියේ දැක්කාක් තිබෙනවා.
  - /fedownerhelp*:* සමූහ නිර්මාණය හා අයිතමය සමූහයට අදාල විධාන සමූහයක් සමඟ උත්සාහ කිරීමට හෝඩි
  - /fedadminhelp*:* සමූහ කළමනාකරණ විධාන සමූහයක් සමඟ උත්සාහ කිරීමට හෝඩි
  - /feduserhelp*:* සුළු වෙනස් කිරීමට එක් ක්රමයක්

FED_OWNER_HELP: | 
  *සමූහ අයිතමයට පමණ:*
  - /newfed <fed_name>*:* සමූහයක් නිර්මාණය කරයි, පරික්ෂකයාට එක් සමඟ එකකට සීරුදු කියනු ඇත
  - /renamefed <fed_id> <new_fed_name>*:* සීරුදු id එකට නව නමට සමූහ නිර්මාණය කිරීම
  - /delfed <fed_id>*:* සීරුදු id එක මකා දැමීම, සහ එකට අයිතමය මාරු කිරීම. සීරුදු පරික්ෂකයාට හෝඩි නොතිබෙනවා
  - /fpromote <user>*:* පරික්ෂකයාට අයිතමය නිර්මාණය කරයි. `Fed Admins` යට සිටීමට නියම විධාන
  - /fdemote <user>*:* පරික්ෂකයාට අයිතමයෙන් පොදුකරනවා
  - /subfed <fed_id>*:* වෙනස් කළ fed id එකට ලියාපදිංචි වන්න, එකට ලියාපදිංචි කළ නම් ඔබගේ fed වෙනස් ක්ලාක් එකටත් වෙනස් කිරීමේ හෝඩියක්
  - /unsubfed <fed_id>*:* වෙනස් කළ fed id එකට ලියාපදිංචි වන්න
  - /setfedlog <fed_id>*:* සමූහයට අදාල fed සමූහයක් ලොග් පෙට් සලකුනු කරයි
  - /unsetfedlog <fed_id>*:* සමූහයට අදාල fed සමූහයක් ලොග් පෙට් සලකුනු කරයි
  - /fbroadcast <message>*:* සුපිරිම සමූහන් සීරුදුකරන්න
  - /fedsubs*:* ඔබගේ සමූහය ලියාපදිංචිකව සුපිරිම fed වෙනස් ක්ලාක්එක් එකකට හෝඩි විය `(දියුණු rn)`

FED_ADMIN_HELP: |
  *සමූහ කළමනාකරණ:*
  - /fban <user> <reason>*:* සමූහ අයිතමය පරීක්ෂා කිරීම
  - /unfban <user> <reason>*:* සමූහ අයිතමය පරීක්ෂා කිරීම ඉවත් කිරීම
  - /fedinfo <fed_id>*:* වෙනස් කරන සමූහය ගැන විස්තර
  - /joinfed <fed_id>*:* වතාවෙනස් කිරයිද මෙම හෝඩිට එක්කරයි. සුප් අයිතමයක් පමණක් මෙමට සුපිරිම සමූහයක් වෙනස් කරනවා
  - /leavefed <fed_id>*:* වතාවෙනස් කිරයිද මෙම හෝඩිට එක්කරයිද
  - /setfrules <rules>*:* සමූහ රහුල් සැකසීම
  - /fedadmins*:* සමූහන් කළමනාකරණ
  - /fbanlist*:* මෙම සමූහය වෙනස් කරන්නේවාත් සීරුදුකරන්න් සියල්ල
  - /fedchats*:* දක්වන සුපිරිම සමූහන්
  - /chatfed *:* මෙම සාකච්ඡාවෙන් නම් සමූහය

FED_USER_HELP: | 
