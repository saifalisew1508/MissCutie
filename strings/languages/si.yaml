  - /fbanstat*:* ඔබට / හෝ ඔබ පිළිතුරු මත පරීක්ෂා කිරීමේදී හෝ ඔබගේ පරිච්ඡේදී සමූහයේ පරීක්ෂා කළහැකියි හෝ වෙනස් කිරීමක් කියාය
  - /fednotif <on/off>*:* PM සහිතව ප්‍රවේශ වන සුපිරිම පරික්ෂා සැකසීම
  - /frules*:* සමූහන් නියම සැකසීම

