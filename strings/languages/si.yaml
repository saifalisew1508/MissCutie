   /broadcast [පනස්වෙනි පනස්/පනස්ට් පිටවක්] : බොටේ සේව් කරයිදී පනස් කරයි.
   
   *එක්සත් ක්‍රමෙට්:*
   -pin : ඔබගේ පනස් ක්‍රමෙට් නිරවුල් කරයි.
   -pinloud : ඔබගේ පනස් ක්‍රමෙට් නිරවුල් කරයි සහ සාමාන්ඩ් දැක්කාක් පිටවන්ය.
   -user : ඔබගේ පනස් ක්‍රමෙට් පනස්කරයි බොටේ ආරම්භ කළ පරිශීලකයන්ට.
   -assistant : ඔබගේ බොටේ සහාය පරිශීලකවරුන්ගේ අනුමැතියේදී ඔබගේ පනස් ක්‍රමෙට් කරයි.
   -nobot : බොට්ටාට පනස් ක්‍රමෙට් කිරීම නොමැතියි.
    
   *උදාහරණය:* /broadcast -user -assistant -pin පරීක්ෂාකළ පණිවුඩය

BLACKCHAT_MUSIC: |
   *කට් සාක්තු සේව් [සදුරාජයකින්]:*
   
   අපගේ සේව් කට් සාක්තු සහාය භාවිතා කිරීමට තීරණය කරයි.
   
   /blacklistchat [නිහාල්ප්රයේ ජනපදය] : කට් සාක්තුයේ නිහාල්ප්රය කට් සාක්තුට එකෙයි.
   /whitelistchat [නිහාල්ප්රයේ ජනපදය] : කට් සාක්තුයේ නිහාල්ප්රය කට් සාක්තුට කරයි.
   /blacklistedchat : කට් සාක්තුයේ කට් සාක්තුට සුරක්ෂිතයේදීම් ලැයිස්තුව පෙන්වන්න.

BLACKUSER_MUSIC: |
   *බ්ලොක් පරිශීලකයාන් [සදුරාජයකින්]:*
   
   කට් සාක්තුය භාවිතා කිරීමට උත්සාහ වන්ද බොට් ක්‍රමෙට් සහායක් බාගන්න.
   
   /block [පරිශීලකයාවේ නමයාක් හෝ පිටවක්] : බොට් ක්‍රමෙට් සහායේදීම සීමා කරයි.
   /unblock [පරිශීලකයාවේ නමයාක් හෝ පිටවක්] : සීමා කරන බවට සීමා කිරීම ඉවත් කරයි.
   /blockedusers : සීමා කළ බොට් ක්‍රමෙට් පරිශීලකයාගේ ලැයිස්තුව පෙන්වන්න.

CPLAY_MUSIC: |
   *චැනල් ප්‍රවර්ග:*
   
   ඔබට චැනල්ට් හෝ වීඩියෝ/රෙදියෝ ස්ට්‍රීම් කරන්න.
   
   /cplay : චැනල්වෙනි ඉල්ලීමේ ඉරිඟු ගීතය ආරම්භ කරයි.
   /cvplay : චැනල්වෙනි වීඩියෝ ඉරිඟු ගීතය ආරම්භ කරයි.
   /cplayforce or /cvplayforce : සුළු වීඩියෝ/රෙදියෝ ස්ට්‍රීම් සුඛු විය හැකිය.
   /channelplay [ජනපදයේ නම හෝ හවස්] : චැනල් සහාය කට් සාක්තුට සහායක් සම්බන්ධ කරයි හෝ එයාගේ ආරම්භකයාගේ මට්ටම් පනස්කරයි.

