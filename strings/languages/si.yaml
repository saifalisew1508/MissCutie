    - මෙම ස්ථානයට එක් කිරීමට, වතාවෙනස් කිරීමට, මම අන්ධයේදී උපකාරයාට හෝඩි අවශ්‍යයේද, සුසුළුකරීම බලනු ලබයි.
    *සැකසුම්:*
    - /forcesubscribe: වතාවෙනස් කිරයිද මෙම තත්ත්වය.
