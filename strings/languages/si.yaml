anilist_help: |
    *AniList*
    මංගා, නම්බර, හෝ අකුරු ගැන තොරතුරු ලබාදෙන්නෙයි! මොදර්ල් කිරීමේදි සෑම දත්තයක් [AniList](anilist.co) වෙතින් ලබාගත හැක.
    *ලබාදේවීම් සහාය:*
     - /anime <anime>: අනිමොසේ ගැන තොරතුරු ලබාදෙන්න.
     - /character <character>: කරකතාගේ ගැන තොරතුරු ලබාදෙන්න.
     - /manga <manga>: මංගා ගැන තොරතුරු ලබාදෙන්න.

