    - /forcesubscribe <channel username>: ForceSubscribe කර සැකසුම් සක්රිය කරයි.
    - /forcesubscribe clear: මම වෙනස් කළ සුපිරිම සුඃුළුකරනු ලැබේ සියල්ල අමුතුමින්තුන්ට වෙනස් කරයි.

    සියලුම ක්රමානුකරණ බහුල පරීක්ෂා කළහැකිය.

google_search: |
    *Google සෙවා*
    - /google <text>*:* Google සෙවා කිරීම
    - /img <text>*:* Google සෙවා කිරීම සහ එවක් වෙනස් කරනු ලැබේ\nප්‍රමාණවත් ප්‍රතිඵලයක් පිටවන lim ලකුණක් සදහා: `/img hello lim=10`
    - /app <appname>*:* Play Store සහිත යෙදුමක් සෙවා කිරීම සහ එවක් වෙනස් කිරනු ලැබේ.
    - /reverse |pp |grs: අන්ධයේදී උපකාරයාට සුසුළුකරන්නේදී සිදුවීමේ රීසාර්වරය සොයනු ලබයි.

    *Google පරිවර්තක*
    - `/tr` හෝ `/tl` (භාෂාවේ වෙනස් කිරීමේ උපකාරයා) නම් දැක්කනම් බහුවරක්
    *උපකාරයා:*
    - `/tr en`*:* දේශීයයකට සහිත කිරීම
    - `/tr hi-en`*:* හින්දි සහිත දේශීයයකට සහිත කිරීම

md_help: |
    <b>Markdown සැකසුම</b>
      ඔබට පනස්වෙනි ප්‍රකාරයක් භාවිතා කළ හැකිය. *රුම්*, _ඇලීක්ස්_, -උන්ඩර්ලයින්-, සහ තවත් වෙනස් කිරීම් භාවිතා කළ හැකිය. 
      <b>පහත සදහන් රුම්</b>:
      - <code>`රුම් වචන`</code>: වෙනස් කරනු ලැබේය. <code>`රුම් වචන`</code> ක්ලොක් කරනු ලැබේ.
      - <code>_ඇලීක්ස් වචන_</code>: අයිතමය වචනයක් සංක්‍රම්කරනු ලැබේ. <code>_ඇලීක්ස් වචන_</code> ක්ලොක් කරනු ලැබේ.
      - <code>*උන්ඩර්ලයින්*</code>: සුසුළුකරනු ලැබේය. <code>*උන්ඩර්ලයින්*</code> ක්ලොක් කරනු ලැබේ.
      - <code>~අවිස්තෙයිරල්~</code>: ස්ට්‍රික්ටුෆ්රෝක්. සැකසුමයක්. <code>~අවිස්තෙයිරල්~</code> ක්ලොක් කරනු ලැබේ.
      - <code>[හයිපත්](උපයාංශය.com)</code>: මෙම වෙබ් පිටවන් ගැන නියම සැකසීම. <code>[හයිපත්](උපයාංශය.com)</code> ක්ලොක් කරනු ලැබේ.
      - <code>[මමේ බටන](බොත්තුගේurl://උපයාංශය.com)</code>: මෙම වෙබ් පිටවන් ගැන නියම සැකසීම. මෙම උපයාංශය වෙනස් කරනු ලැබේ. මෙම සමූහයට සැකසුමක් සදහා <code>:same</code> සැකසීම භාවිතා කරනු ලැබේ.
      <b>උදාහරණය:</b>
      <code>[සමූහ 1](බොත්තුගේurl://උපයාංශය.com)</code>
      <code>[සමූහ 2](බොත්තුගේurl://උපයාංශය.com:same)</code>
      <code>[සමූහ 3](බොත්තුගේurl://උපයාංශය.com)</code>
      මෙමන්ට පසුව සුප් පිටවන 1 සහ 2 නම් සුප් කරයි, 3 ට පටන් වෙනස් කිරීමේ රුම්.

filling_help: |
      <b>පුරවන</b>
      ඔබට ඔබගේ පනස් වෙළඳ වාර්තාකරණය වෙනස් කිරීමට පරික්ෂා කිරීමට හෝ, ඔබගේ වෙළඳ වාර්තාකරණයේ පනස් වාර්තාකරණ සහිතව ඉන්පෙර කෙටු කිරීමට භාවිතා කළ හැකිය. ඔබ ප්‍රසිද්ධු නාමයෙන් පරික්ෂා කරනු ඇති වචන්ගත කිරීම් වෙළඳ වාර්තාකරණය අතුළු හෝ එම ගෙනවාද, වෙනස් කරනු ඇති වචන්ගත කිරීම් වෙළඳ වාර්තාකරණයේ භාවිතා කිරීමට පරික්ෂා කළහැකිය.
      ඔබට පරික්ෂා කිරන පද්ධතියන් ගැන රුම් භාවිතා කිරීමට ඔබට පරික්ෂා කළහැකියි!
      <b>පුරවන පද්ධතියන්:</b>
      - <code>{first}</code>: පරික්ෂකවේ නම
      - <code>{last}</code>: පරික්ෂකවේ අග
      - <code>{fullname}</code>: පරික්ෂකවේ මූලික නම
      - <code>{username}</code>: පරික්ෂකවේ පරිච්ඡේදී නම. ඔවුන්ට නොමැති නම්, පරික්ෂකයාට සැකසීමක් සහිතව පෙළෙන් කළේ.
      - <code>{mention}</code>: පරික්ෂකයා සහිතව කළේ නමමයි.
      - <code>{id}</code>: පරික්ෂකවේ ID.
      - <code>{chatname}</code>: සාකච්ඡාවේ නම.

fun_help: |
     - /runs: වෙනත් සංකීර්ණයක් පත් කරයි.
     - /pat: කුමුදුද සංකීර්ණයක් පත් කිරීම, කොල් සහෝදරාගමට :3
     - /slap: සංකීර්ණයක් පත් කරයි, නැතින් පත් කරන්න.
     - /shrug : ශ්‍රක් අරන් බව XD.
     - /table : පෙර/නිපෙර ලබාදෙන්න :v.
     - /decide : විකාරයක්/නැතයක්/බහුලයක් අස්වේ.
     - /toss : මුදුල්ක්කනය කිරීම
     - /roll : ඩයිස් එකක් අවිස්සයි.
     - /rlg : කෙරි සහෝදර, පසු, මශු, සහෝදර සමුගනී ;-;
     - /shout <කවදක්>: වචනයක් ලියමු කරයි.
     - /stickerid: ස්ටිකරයට පිටපත් හෝදයි.
     - /getsticker: ස්ටිකරයට පිටපත් ලබාදෙන්න.
     - /steal: ස්ටිකරයක් හෝ පිටපත්කරයි.

antispam_help: |
     *අඩෝන්ට්ර් පමණක්:*
      - `/antispam <on/off/yes/no>`*:* අපේ අන්ටි-ස්පැම් තවත් පිටවලට මොරටම එන්/අන්ටි-ස්පැම් කරයි හෝ ඔයාගේ වත්මන් සැකසුම්.

     අන්ටි-ස්පැම්, අපේ බොට් සුළු වෙනත් ප්‍රශ්නයක් ඉවත් කිරීමට සහය කිරීමට භාවිතා කරයි.

     *අස්පැම්පොටි* අංකයක් සමග @Spamwatch API සම්බාහු කරයි, සුසු ස්පැමර් පිටවලේ ස්පෑමර් හා නොපුද්ගලාට ගැනීම මෙහෙවා.
     *SpamWatch කුමක්ද?*
     SpamWatch වලින් සුළු සුසුන්, ට්‍රොල්ස්, බිට්කොයින් ස්පෑමර් සහ නසිල් පුද්ගලාට අබාරයින්ට දැක්කාක්කාක්වේ.
     දිනමුදුන්ගේ සම්බාහුල් කුමුදුදුගේ සජීවීව අවහිර සුසුස්පැමර් අහුලානයක් කිරීමට සහය කරයි.
     *සොක්ස්:* පද්ධතියට @SpamwatchSupport සහුවා පවත්වා.

locks_help: |
     නොමිලේම ස්ටිකර්ගත කිරන්නෙයි? හෝ ලින්ක්ස් බෙදනවාද? හෝ පික්කරන්නෙයි?
     ඔබ නොමිලේම කල ප්‍රතිපාදකයන්ට අවිස්සන්නෙයි!
     සැලසුම් මොඩියුල් මොඩියුල්, ඔබගේ කට් ටේල්ග්‍රෝප් මොඩියුල් මෙල්ලට පිවිසීමට
     මම අඩංගුවම කළ හැකිය!

      - `/locktypes`*:* ස්ටිකර් වර්ග සුදුදුදුදුදුදුදුදුදු
      
      *පරිපාලකයන් පමණක්:*
      - `/lock <ප්‍රතිපාදය>`*:* කුමුදුදුදුදුදුදුදුදුදු වෙනවද (පෞද්ගලිකයන්ට නොලොවේ)
      - `/unlock <ප්‍රතිපාදය>`*:* කුමුදුදුදුදුදුදුදුදුදුදු හෝදනවද (පෞද්ගලිකයන්ට නොලොවේ)
      - `/locks`*:* මෙම ස්ටිකර් ලයිස්ට්.

     ස්ටිකර් ක්රියාකාරීත්වයේ අවිස්සානයක් භාවිතා කළ හැකිය.
     උලුක් සහෝදරාට මොඩියුල් පිටවලේ ස්ටිකර් වෙනස් කිරීමට ඇතුලු සුලුවෙන්
     ස්ටිකර් හෝදන්න නො-ප්‍රපුරක්ෂ් කිරීමට භාවිතා කළ හැකිය.
     ප්‍රතිපාදයේ අයිත්විකාශන *තොරතුර* දැක්කනවා (නො-ප්‍රපුරුදුදුදුදුදුදු)
     මොකාදු ස්ටිකරයක් වෙනස් කිරීමට *පින්* අවිස්සනවා (නො-ප්‍රපුරුදුදුදුදුදුදු)

log_help: |
      *පරිපාලකයන් පමණක්:*
      - /logchannel*:* සටහන චැනල් තොටල් තොටල් තොටල්
      - /setlog*:* සටහන චැනල් සටහන සැකය.
      - /unsetlog*:* සටහන චැනල් සටහන අස්ථාවකට අවස්ථාවක්.
      - /announce*:* චැනල්රූමොට පවසයෙහි පමණි.

      චැනල් සටහන සකස් කිරීම පමණයි:
      - බොටට් මෙටක්ට බාහාදුන්ගේ වඩා චැනල්ට් (පරපැලේ!) එකට එක්ක් එවා
      - එවක්කාන්න `/setlog` එක චැනල්වලින්
      - එවක්කාන්න ප්‍රභාණාවෙනි `/setlog` එක පමණින් සුබසාකාරකයන්ට විදානගත කරන්න

markdown_help_text: |
      මාර්කඩ් ටෙක්ස් තොරතුර හොඳහරි ආකෘති මානවයයි වෙනත්ම තරුණයක් සහෝදරයක්. Cutie වලින් කුමක්ද, 
      සුක්ස් පමණයි, සුගත් පණිවිඩයක් සහෝදරයක් ලබාගත කරයි, සහෝදරයක් සැකසුම් දැක්කාක් කරයි.

      - <code>_italic_</code>: පමිඳුයිල් පමිඳුයිල් ටෙක්ස්ට් '_' බෙදාහැරීම එපාවට පමිඳුයිල් පමිඳුයිල් ටෙක්ස්
      - <code>*bold*</code>: පමිඳුයිල් පමිඳුයිල් ටෙක්ස් '*' බෙදාහැරීම බොල්ඩ් ටෙක්ස්
      - <code>`code`</code>: පමිඳුයිල් පමිඳුයිල් ටෙක්ස් '`' බෙදාහැරීම මොනොස්පේස් ටෙක්ස්, 'code' ටෙක්ස්
      - <code>[sometext](someURL)</code>: මොරික්ස් වලින් එක්ක් වෙනස් කරයි - පණිවිඩය සම්පූර්ණයේ <code>sometext</code> වේ,
      එයට එක්ක් කිරීමේ <code>someURL</code> පිවිසීමට ක්ලික් කරයි.
      උමක්: <code>[test](example.com)</code>

      - <code>[buttontext](buttonurl:someURL)</code>: මෙය විවෘත්තේ පමිඳුයිල් ටෙක්ස් පිටවලේ එක්ක් ක්ලික් කිරීමට
      සහෝදරයක් ලබාගත කරයි, <code>buttontext</code> මෙනුක්කානයක් පෙනුම් කරයි, <code>someurl</code>
      එයට වෙනස් කරයිවේ.

      උමක්: <code>[This is a button](buttonurl:example.com)</code>

      එක්ක් මතක් කුමුදුදුදුදුදුදුදුදුදුදුදුදුදුදුදුදුදුදුදුදුදුදුදුදුදුදුදුදුදුදුදුදුදුදුදුදු
      මොකාදු පණිවිඩයක් ස්ටික්ස් එකක්කානට එක්ක් කරයි!


muting_help: |
       *පප්පාඩුම් කරන්නන් පමණ:*
       - `/mute <පරිශීලක_අංකය>`*:* පරිශීලකයා නෙවෙයි. ප්‍රතින්දම් කරනවා, ප්‍රතිවර්ථය නෙවේය.
       - `/tmute <පරිශීලක_අංකය> x(මි/පි/දි)`*:* පරිශීලකයා x කාලය උපාංගයෙන් නෙවේය. (අංකය, හෝ පිළිතුරු). `මි` = `මිනිත්තු`, `පි` = `පියවර්`, `දි` = `දින`.
       - `/unmute <පරිශීලක_අංකය>`*:* පරිශීලකයා හෙවනවා. ප්‍රතින්දම් කරනවා, ප්‍රතිවර්ථය නෙවේය.

moderators_help: |
       වේගයෙන්, ඔබට විශේෂයක් වන අයුරුද ඔබගේ සමූහයේ වූවක් අයින් කරගෙන නොමැති වුණාට, ඔබට එක් ඉන්නන් සහිත සමූහය කරන අයුරුද වේගයේ මැකීම, අවශ්‍ය වේ. 
       එය කිරීමට modcheck ක්‍රියාකරයි - අයුරු බේරු, පිටවන් පිටවන අයුරුද පමණක් නියවනවා.

       *ධනය:*
       - /addmod *:* පරිශීලකයාට අයින් කිරීම.
       - /rmmod *:* පරිශීලකයාට අයින් කිරීම ඉවත් කරයි.
       - /modcheck *:* පරිශීලකයාගේ විස්තරය පරිශීලකයාගේ හෝ පිළිතුරුවල අයුරු මට්ටම.
       - /modlist *:* පරිශීලකයාගේ අයුරු ලැයිස්තුව.

nightmode_help: |
       *පප්පාඩුම් කරන්නන් පමණ:*
       - /nightmode: සමූහයේ රාත්‍රී පෙරහැරීම් කිරීම.
       - /rmnight: සමූහයේ රාත්‍රී පෙරහැරීම් ඉවත් කිරීම.

       *සටහන:* රාත්‍රී පෙරහැරීම් සවිකළ වේගයේ 12 AM (IST) වෙනිදා ස්ථානවල වැටුම් හෝසාගෙනු වෙයි. ස්වාම් වේගයේ 6 AM (IST) වෙනිදා ස්ථානවල විවාහයට වියහැක.

notes_help: |
       - `/get <පසුපාඩු_නම>`*:* මෙම පසුපාඩු මට්ටම ලබාදීම.
       - `#<පසුපාඩු_නම>`*:* /get හෝ සමාවෙනි.
       - `/notes` or `/saved`*:* මෙම කතාවේ සුළු පසුපාඩු ලැයිස්තුව.
       - `/number` *:* මට්ටමේ පසුපාඩුවේ පෙනෙවුම. 
       ඔබට කුමුදු ශේෂ්ඨයේ නෙවෙයිවල එක් පාටයක් හෝ මැකීමට අවස්ථාවේ යොදාගත හැකියි. මෙමෙය පසුපාඩු එකට සුළු පෙනෙවුම් සහිතවේද, `/get <පසුපාඩු_නම> noformat` භාවිතා කළ හැකිය. එය පසුපාඩුවේ එක් බොත්තය ආරෝපණය කිරීමට භාවිතා කරයි - එවක් අයුරු සමාලෝචනාවක් අනුකූලවේ: `[somelink](buttonurl:example.com)`. `/markdownhelp` සඳහා වැඩිදුරටත් පරික්ෂා කරන්න.

       *පප්පාඩුම් කරන්නන් පමණ:*
       - `/save <පසුපාඩු_නම> <පසුපාඩු_තොරතුර>`*:* පසුපාඩු_තොරතුර පසුපාඩු_නම ලෙස සුරැකීම.
       - `/save <පසුපාඩු_නම>`*:* පසුපාඩු_තොරතුර පසුපාඩු_නම ලෙස සුරැකීම.
       - `/clear <පසුපාඩු_නම>`*:* මෙම නම සුරැකීම.
       - `/removeallnotes`*:* සමූහයෙන් සියලු පසුපාඩු ඉවත් කරයි.
       *සටහන:* පසුපාඩු_නම් අකුරු අකුරුට දෙයක් සහිතවේ, එය සුරැකීමට පසුපාඩු_නම් බලනු ලැබේ.

purge_help: |
       *පප්පාඩුම් කරන්නන් පමණ:*
        - /del: මාරු කළ පණිවුඩයේ පණිවුඩය.
        - /purge: මාරු කළ සියල්ල මාරු කරයි. එසේය, මාරු කරන පණිවුඩයේ හෝමා සාමාන්ත එවක් ස්වාමීන්දයට සහිතවේද යොදාගත හැකියි.
        - /purge <පූර්යාගත් X>: මාරු කරන පණිවුඩය, හෝ එකට X පණිවුඩයක් අනුකූලවේද, මාරු කරන පණිවුඩය පසුබිමක් සහිතවේද යොදාගත හැකියි.

reports_help: |
        - `/report <ප්‍රතිස්ථාපනය>`*:* එක් පණිවුඩයට ප්‍රතිස්ථාපනය කිරීම සමග පිවිසෙනු ඇත.
        - `@admin`*:* එක් පණිවුඩයට ප්‍රතිස්ථාපනය කිරීම සමග පිවිසෙනු ඇත.
         *අසාමාන්ද:*
          - `/reports <අනු/අකු>`*:* ප්‍රතිස්ථාපන සැකසුම වෙනස් කිරීම, හෝ වත්මන් තත්ත්වය දැක්කාක්ද දැක්කාක්ද යනු.
          - පෞද්ගලිකව කරන වෙනස්ක් වෙනස්කිරීමට, ඔබේ තත්ත්වයට මාදුකාක්ද.
          
          *පප්පාඩුම් කරන්නන් පමණ:*
          - `/setrules <ඔබගේ නිරවීම් එකතු කරන්න>`*:* සමූහයේ නිරවීම් එකතු කිරීම.
          - `/clearrules`*:* සමූහයේ නිරවීම් එකතු කිරීම් ඉවත් කරයි.

userinfo_help: |
      - /setbio <පිහිටුව>: ප්‍රතික්ෂේපනය කරනවා, හෝමා කිරීමේදී, අනෙකුත් පරිශීලකයාගේ පිහිටුව.
      - /bio: ඔබගේ හෝමා, හෝමාගත් පරිශීලකයාගේ පිහිටුව. මෙය ස්වාමීන්දයේ නොසතුවෙයි.
      - /setme <පිහිටුව>: ඔබගේ තොරතුර සැකසුම.
      - /me: ඔබගේ හෝමා, හෝමාගත් පරිශීලකයාගේ තොරතුර. මෙය ස්වාමීන්දයේ නොසතුවෙයි.

warns_help: |
      - /warns <පරිශීලක_අංකය>*:* පරිශීලකයාගේ අංකය, සහ හෝමා, අංකයේ පිටවන, හෝ හෝමාගත් වල වටා.
      - /warnlist*:* සියලු වත්මන් බොත්තුම් ලැයිස්තුව

      *පප්පාඩුම් කරන්නන් පමණ:*
      - /warn <පරිශීලක_අංකය>*:* පරිශීලකයාට අවෘදය. 3 අවෘදයෙන් පසුබිමක් සිටී. එසේය, ප්‍රතිවර්ථයක් හෝ පිළිතුරු.
      - /resetwarn <පරිශීලක_අංකය>*:* පරිශීලකයාගේ අවෘදය නැවතුමක් කිරීම. එසේය, ප්‍රතිවර්ථයක් හෝ පිළිතුරු.
      - /addwarn <නිවාඩු> <පිළිතුරු_පණිවුඩ>: වික්‍රමසිංහයෙන් පෙනෙවුම් සහිතවේද කිරීම. ඔබගේ වික්‍රමසිංහය සුරැකීම සම්බන්ධ කිරීමට, `/addwarn "මහේ සේසානා" මෙය වලක් අකුරුක් හෝද අකුරුවලින් පැමිණවේ. 
      - /nowarn <නිවාඩු>*:* අවෘදය සුරැකීම
      - /warnlimit <අංකය>*:* අවෘදය අරිනවා
      - /strongwarn <සක්ඛානාකරනවා/නැතුවා>*:* එවීමට අකුරුක්ඛනාකරනවා, වෙනස්ක් නොවේ, වටා කල යුතුවයි. හෝ, ප්‍රතිවර්ථයක් හෝ පිළිතුරු.
    
greetings_help: |
       *පප්පාඩුම් කරන්නන් පමණ:*
       - /welcome <සමූහේෂ> *:* සහිත සමාබන්ධ කිරීම/කිරීම සක්කිරීම.
       - /welcome*:* වත්මන් සහිත සමාබන්ධ කිරීම/කිරීම සඳහා වත්මන් සැකසුම්.
       - /welcome noformat*:* වත්මන් සාමාන්ත කිරීම/කිරීම සඳහා වත්මන් සැකසුම්, ආරෝපණයේ ස්ථානය සුළු කිරීමට ඉහළ කරයි!
       - /goodbye*:* /welcome එකේ නිරවීම් සැකසුම්හි සුළු කිරීමේ භාවිතා කළ හැකිය.
       - /setwelcome <කුමුද> *:* අභ්‍යාස සහිත වික්‍රමසිංහය සහිතවේද කරනවා. එසේය, මෙඩියා සහිතවේද.
       - /setgoodbye <කුමුද> *:* අභ්‍යාස සහිත වික්‍රමසිංහය සහිතවේද කරනවා. එසේය, මෙඩියා සහිතවේද.
       - /resetwelcome*:* පෙරනිම්පෙරනිම් නිරවීමේ පෙරනිම් සැකසුම්ට නැවතුමක් කිරීම.
       - /resetgoodbye*:* පෙරනිම්පෙරනිම් නිරවීමේ පෙරනිම් සැකසුම්ට නැවතුමක් කිරීම.
       - /cleanwelcome <සියළු/අකු>*:* පසුපාඩු සහිත වෙනස් කිරීම අවිස්සාවක් රඳවාගත කිරීම සඳහා.
       - /welcomemutehelp*:* සුළු කිරීම් සමාරු කිරීම පිළිබඳ තොරතුර.
       - /cleanservice <සියළු/අකු*:* ටෙලිග්‍රෑම් සුළු/කිරීම් සැරසෙමු.
       *උදව්:*
       පරික්ෂාකළ භාවිතා කිරීම, සුළු කිරීමේ විරහාර සහිතවේද බහුවරයේ සුළු කිරීම/කිරීම සක්කිරීම සඳහා පරික්ෂේප නම් ලැයිස්තුවේ සාමාන්ත කරන්න.

nation_help: |
   - /eagle - සියලු Eagle Union සාමාජිකයන් ලැයිස්තු කරයි.
   - /royals - සියලු Royal රාජ්‍යයන් ලැයිස්තු කරයි.
   - /sakuras - සියලු Sakura රාජ්‍යයන් ලැයිස්තු කරයි.
   - /sardegnas - සියලු Sardegnas රාජ්‍යයන් ලැයිස්තු කරයි.
   - /neptunians - සියලු Neptunia රාජ්‍යයන් ලැයිස්තු කරයි.
   සෝකන: මෙම විධාන පරීක්ෂා කරනු ලැබේ බොට් උපාංග විධාන වලින් ලැයිස්තු කළ හැකිය.
   ඔබට @YorktownEagleUnion වෙත පවතීද, මෙම විස්තර වැඩිදුරටත් ඉක්මනින් දැක්කාක්වන්න.

sticker_blacklist_help: |
   **පපුවක් පමණ:**
     - /addblsticker <sticker සබ්ටකර් ලින්ක්>**:** සබ්ටකර් එක බ්ලැක් ලින්ක්ට එක් කරයි. එක්කරුන් ඉක්මනින් ස්ටිකර් එකක් එක්කරනු ලැබේ
     - /unblsticker <sticker සබ්ටකර් ලින්ක්>**:** බ්ලැක්ක් ට්‍රිගර්ස් එකක් ඉක්මනින් ඉවත් කරයි. සුදු නිත්‍ය ලාංජනයක් එක්කරනු ලැබේ
     - /rmblsticker <sticker සබ්ටකර් ලින්ක්>**:** මොතා සුදු නිත්‍ය ලාංජනයක් එක්කරයි
     - /blstickermode <මකා/බැන්/ටී-බැන්/මියුට්/ටී-මියුට්>**:** පොට් පාරිසර්ටයේ භාවිතා කිරීමේ පෙරහුලු ක්‍රියාකරනයක් සඳහා පෙරනිමු
   සඝරය:
     - `<sticker සබ්ටකර් ලින්ක්>` හෝ `https://t.me/addstickers/<sticker>` හෝ සහභාගී කරන්න. හෝ මොතා ස්ටිකර් පණිවුඩයක් එක්කරන්න.

stickers_help: |
     - /stickerid*:* මමට මමගේ ගොනු ෆයිල් සහභාගී කරනු ලැබේ.
     - /getsticker*:* මමට මමගේ විකල්ප අඩවියට ස්වයියාන් පිං ගන්නනු ලැබේ.
     - /delstcker*:* මමට මමගේ ගොනු ෆයිල් පිං අවකාශනයට අලුත් කරයි, මමට එමනිසා කියවනු ලැබේ.
     - /kang*:* මමට මමගේ ෆයිල්, ඉස්ටැන්, වීඩියෝ හෝ රූප විකාශනයක් හෝ පින්තූරයක් එක්කරයි, මම ඔබගේ පැක්ට් වලින් එකක් එක්කරනු ලැබේ.
     - /stickers*:* combot ෆයිල් උපාංග සොයාගැනීමට උපාංග.
     
raid_help: |
  ඔබට ස්පෑමර් හෝ බොට් හෝද ඔබේ සමූහය හෝ බොට්ස් වෙළුමක් වෙනස් කිරීමෙනින් සුදු හෝ බොට් වෙළුමක් වාර්තාකිරීමට පටන්ගෙන සිටීමට මෙම මොඩියුලය මමතුල්ලාක්ම ඉඩ ලබාදීමට ඉඩ දීමක්ද මෙයක්
  *පරිපාලකයට පමණ!* 

  - /raid `(off/කාලය අමතර)` : ස්පෑමර් මාදෝද සක්රිය (සක්රිය/සිටී) කරයි. 
  නැතිනම් ස්පෑමර් මාදෝදට ස්කූල් බොට් ස්ටිකර් එක එක්කරයි.
  ස්පෑමර් මාදෝදේ එක්කරනු ලැබේ එක්කරනු ලැබේ.
  
  - /raidtime `(කාලය අමතර)` : ස්පෑමර් මාදෝදේ ස්කූල් කිරීමේ පෙරහුලු කාලයක් බොසක් හෝ සේලාකාරයක් සහභාගී කරයි.
  පෙරහුලු 6 ක්රමයක්

  - /raidactiontime `(කාලය අමතර)` : ස්පෑමර් මාදෝදේ ස්කූල් කිරීමේ පෙරහුලු කාලයක් බොසක් හෝ තේමු කාලයක් සහභාගී කරයි.
  පෙරහුලු 1 ක්රමයක්
  
tagalert_help: |
  විවෘත වියදම්.. ඔබව එමෙමුද.. 
  මෙම ක්‍රියාකාරකයේ ඉන්දියාවේද නම්
  එම ක්‍රියාකාරකයේ සිටුවම් ඔබට දැක්කාක්වනු ලැබේ ඉන්දියාවේ පුද්ගලයන් ඉක්මනින් ස්ටක් කිරීමට පෙරහුලු කාර්යයක්
  **විස්තර**
  - /tagalert `on` : ටැග් අලර්ට් කිරීම ක්‍රියාකරයේ සක්රිය කරයි
  - /tagalert `off` : ටැග් අලර්ට් කිරීම ක්‍රියාකරයේ සක්රිය කරයි
  **උදව්:**
  ඔබ එමෙමුද එක්කරයිද, 
  එමෙමුද එක්කරයිද
  එමෙමුද එක්කරයිද


topics_help: |
  ටෙලිග්‍රෑම්, ඔබගේ සංස්ථාවේ කතා කිරීමට නව ක්‍රමයක් (ටොපික්) කළ නව ආකාරයක් පනස්වනු ලැබුවා.

  මම සංස්ථාව කළ විය හැකි ප්‍රවේශයට හෝදන, මයා, වසනවාදය, නිහාල්, බැන්, ..ක් ..කරන්න සඳහා මට පරික්ෂා කරනු ලැබේ.
  - /topicnew*:* නව ටොපිකයක් තනා කිරීම, ටොපික් නමක් අවශ්‍යයි.
  - /topicdel*:* පවතීන ටොපිකයක් මකා දැමීම, ටොපික් අංකයක් අවශ්‍යයි.
  - /topicclose*:* පවතීන ටොපිකයක් වසා දැමීම, ටොපික් අංකයක් අවශ්‍යයි.
  - /topicopen*:* වසා දැමීමට පවතීන ටොපිකයක් වසා දැමීම, ටොපික් අංකයක් අවශ්‍යයි.
  - /setactiontopic*:* ශ්‍රිතයානු, එවක් වෙත සහාය, වෙනිපොති, වෛර, පනස්, ..ක් ..කළ සහායට නම් සකසනු ලැබේ
  - /delactiontopic*:* ස්වයිට් පනස්, ස්වයිට් සඳහා පෙරදසුන් පනස් බැලීම.
  
