ABOUT_TEXT: |
  *مقدمة:*

  مرحبًا هناك! أنا {context.bot.first_name}، بوت تيليجرام ودود قائم على Python. دعوني أقدم نفسي وأخبركم المزيد عن ما يمكنني القيام به من أجلكم.

  *عني:*

  - أنا بوت Python تم تطويره باستخدام Telethon و Pyrogram ومكتبة PTB.
  - أنا على الإنترنت منذ 9 يناير 2022 وأستلم تحديثات منتظمة لتحسين ميزاتي.
  - أساسي مبني بلغة Python، وأستخدم SQLalchemy و MongoDB كقواعد بياناتي.

  *ميزات البوت:*

  - أقدم ميزات متنوعة بما في ذلك إدارة المستخدمين والدردشات والمزيد.
  - يمكنني مساعدتك في المهام الإدارية في مجموعات أو قنوات تيليجرام الخاصة بك.
  - يمكنك التفاعل معي باستخدام الأوامر والأزرار.

  *عن نسخة البوت وزمن التشغيل:*

  - {context.bot.first_name} الإصدار: v{}
  - وقت التشغيل: {}

  *عن نسخ البوت وإصدار الإطارات:*

  - إصدار Python: v{}
  - إصدار Pyrogram: v{}
  - إصدار Telethon: v{}
  - إصدار مكتبة PTB: v{}
  - إصدار واجهة برمجة تطبيقات بوت تيليجرام: v{}

  *عن قاعدة بيانات البوت:*

  - إصدار MongoDB: v{}
  - إصدار SQLAlchemy: v{}
  - إجمالي عدد المستخدمين: NA
  - إجمالي الدردشات: NA

  *إدارة البوت:*

  - يتم إدارتي بواسطة @LostedPerson، مبتكر البوت والمطور الرئيسي. 
  - يُرجى ملاحظة أن موظفي البوت لا يمكنهم مساعدتك في قضايا تتعلق بالمجموعة الخاصة بك.

  *الدعم والشكر:*

  - [انقر هنا](http://t.me/BotXNews) لرؤية قائمة الداعمين الرسميين لهذا البوت.
  - شكرًا لأصحاب المنح الذين دعموا تكاليف الخادم والتطوير.
  - شكرًا خاصًا لجميع الجماعات التي تعتمد علي لدينا، نعمل دائمًا على تحسين تجربتك.
  
  *البدء:*

  للبدء، انقر على زر *الأوامر* أدناه للمساعدة الأساسية والمعلومات حول {context.bot.first_name}.


