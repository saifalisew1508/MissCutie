SAIF_DEVELOPERS: |
  مرحبًا هناك،

  اسمحوا لي أن أقدم نفسي. أنا {context.bot.first_name}، رفيقك الموثوق به على تيليجرام. في هذه الرسالة، ستجد معلومات شاملة حول فريقنا، التزامنا، وكيف يمكنك دعم مهمتنا.

  *تعرف على الفريق:*

  - 🤴🏻 **مالك البوت:** @LostedPerson
  - 👨🏻‍💻️ **مطور البوت (الرئيسي):** @DearSaif
  - 👨🏻‍💻️ **مطور البوت:** @SexySaif
  - 👮🏻‍♂️ **مدير الخادم:** @NA

  فريقنا ملتزم بتقديم أفضل خدمة لك. من التطوير إلى إدارة الخادم، هدفنا هو تقديم أفضل تجربة لمستخدمينا.

  *كيف يمكنك دعمنا:*

  إذا كنت تقدر عملنا وترغب في المساهمة في مهمتنا، فإليك بعض الطرق التي يمكنك بها دعمنا:

  - **PayPal:** [تبرع هنا](https://paypal.me/saifalisew1508)
  - **رعاية GitHub:** [دعمنا](https://github.com/sponsors/saifalisew1508)
  - **UPI (PhonePay، GooglePay، PayTM):** [قم بالدفع](https://pay.upilink.in/pay/md.saif2752@oksbi)

  تساعد مساهماتك في تغطية تكاليف الخادم والتطوير، مما يضمن لنا الاستمرار في تحسين وتوسيع خدماتنا.

  *للمطورين:*

  إذا كنت مطورًا وترغب في المساهمة في مشروعنا، فنحن نرحب بمهاراتك وأفكارك. يرجى التواصل مع مطورنا الرئيسي @DearSaif لمناقشة المساهمات المحتملة، والتحسينات، أو الميزات الجديدة.

  *طلبات الميزات:*

  نقدر ملاحظاتك وأفكارك لتحسين بوتنا. إذا كان لديك طلب ميزة أو اقتراح، فلا تتردد في مشاركته معنا. مدخلاتك تساعدنا في تعزيز تجربتك. لا تتردد في تقديم أفكارك في مجموعة الدعم الخاصة بنا @PublicSource\_Chat.

  *كلمة شكر:*

  نمد حبنا القلبي لمطورينا ومشرفينا الذين يديرون خوادمنا بجد ويعززون قاعدة الكود لتقديم أفضل تجربة ممكنة لمجموعات تيليجرام الخاصة بك.

  بالإضافة إلى ذلك، نود أن نشكر جميع الجماعات التي تثق في بوتنا لخدماتها. دعمكم يدفعنا لتحسين وتعزيز عروضنا باستمرار.

  شكرا لك على كونك جزءًا من رحلتنا. نحن ملتزمون بتقديم التميز ونتطلع إلى خدمتك بشكل أفضل مع مرور الأيام.


SAIF_SOURCE: |
  *تحية،*

  إذا كنت مهتمًا بشفرة المصدر لـ {context.bot.first_name}، فنحن نقدر حقًا فضولك وحماسك. على الرغم من أننا نأسف لإبلاغك أن شفرة المصدر الحالية لـ {context.bot.first_name} غير متاحة للجمهور، إلا أننا نود أن نشارك امتناننا مع المطورين الذين ساهموا في هذا المشروع ونعترف بمساهماتهم في مشاريع مفتوحة المصدر.

  *شكر خالص لمطورينا:*

  نمد حبنا القلبي للمطورين الموهوبين والمخلصين الذين وضعوا وقتهم وإبداعهم وخبرتهم في {context.bot.first_name}. إنهم الذين قدموا هذا المشروع بما هو عليه اليوم. لم نكن يمكننا أن نصل إلى هنا دونهم.

  *مبادرات مفتوحة المصدر:*

  من المهم أن نعترف بالأخلاقيات مفتوحة المصدر التي تدفع بالابتكار في مجتمع التكنولوجيا. نحن نقف على أكتاف عمالقة، مستفيدين من الحكمة والجهد الجماعي لعدد لا يحصى من مشاريع مفتوحة المصدر. نحن ممتنون لمجتمع المصدر المفتوح بأكمله على مساهماتهم وإلهامهم.

  *استكشاف مشاريع مفتوحة المصدر الأخرى:*

  بالرغم من عدم توفر الوصول إلى شفرة المصدر الحالية لـ {context.bot.first_name}، هناك العديد من مشاريع بوت تيليجرام مفتوحة المصدر يمكنك استكشافها والمساهمة فيها. إليك بعضها:

  - *Marie (BASE CODE):* [اضغط هنا](https://github.com/PaulSonOfLars/tgbot)
  - *MissCutie Old:* [اضغط هنا](https://github.com/saifalisew1508/MissCutieRobot)
  - *Kigyo Robot:* [اضغط هنا](https://github.com/AnimeKaizoku/EnterpriseALRobot)

  نحن دائما نحترم ونمنح الاعتراف الكامل للمطورين والمشاريع التي تلهم وتساهم في عملنا. إنها شهادة على روح التعاون في مجتمع التكنولوجيا.

  *انضم إلى حركة المصدر المفتوح:*

  إذا كنت متحمسًا لتطوير المصدر المفتوح، فنحن نشجعك على الانضمام إلى الحركة. ساهم في المشاريع الحالية، وأنشئ مشاريعك الخاصة، وشارك معرفتك مع العالم. المصدر المفتوح ليس فقط عن الشفرة، بل يتعلق ببناء مجتمع عالمي من الأشخاص الذين يبتكرون ويخلقون.

  مرة أخرى، شكرًا لاهتمامك بـ {context.bot.first_name}. نحن ملتزمون بتقديم تجربة مستخدم رائعة، ونشعر بالإلهام من دعم مجتمع المصدر المفتوح. معًا، يمكننا أن نستمر في دفع حدود ما هو ممكن في عالم التكنولوجيا.



admin_help: |
   *أي مستخدم*
   ➥ /admins*:* قائمة بالمشرفين في المجموعة

   *للمشرفين فقط*
   ➥ /pin*:* يثبت الرسالة المردودة بصمت - أضف 'loud' أو 'notify' لإرسال إشعارات إلى المستخدمين
   ➥ /unpin*:* يلغي تثبيت الرسالة المردودة حاليًا
   ➥ /unpinall*:* يلغي تثبيت جميع الرسائل المردودة، يعمل أيضًا في المواضيع (يمكن للمالك فقط القيام به.)
   ➥ /del*:* يحذف الرسالة التي قمت بالرد عليها
   ➥ /purge*:* يحذف جميع الرسائل بين هذه الرسالة والرسالة المردودة عليها
   ➥ /purge <عدد>*:* يحذف الرسالة المردودة وعدد X من الرسائل التي تليها إذا تم الرد على رسالة

afk_help: |
   - /afk <سبب>: قم بوضع نفسك على أنك بعيد عن الكمبيوتر.
   - brb <سبب>: نفس الأمر السابق - ولكنه ليس أمرًا.
   عند وضع نفسك على أنك بعيد عن الكمبيوتر، ستتم الرد على أي منشن برسالة تشير إلى أنك غير متاح!

anilist_help: |
    *AniList*
    احصل على معلومات حول الأنمي، المانغا أو الشخصيات باستخدام هذه الوحدة! تتم استرداد جميع البيانات من [AniList](anilist.co).
    *الأوامر المتاحة:*
     - /anime <اسم الأنمي>: يعيد معلومات عن الأنمي.
     - /character <اسم الشخصية>: يعيد معلومات عن الشخصية.
     - /manga <اسم المانغا>: يعيد معلومات عن المانغا.

antiflood_help: |
     تسمح وظيفة منع التدفق باتخاذ إجراءات ضد المستخدمين الذين يرسلون أكثر من x رسالة متتالية. تجاوز الحد المحدد للتدفق \
     سيؤدي إلى تقييد تلك المستخدم.
     سيتم كتم المستخدمين إذا قاموا بإرسال أكثر من 10 رسائل متتالية، والروبوتات تُتجاهل.
      ➥ /flood*:* احصل على إعداد منع التدفق الحالي
     • *للمشرفين فقط:*
     ➥ /setflood <عدد/'no'/'off'>*:* يمكن تمكين أو تعطيل منع التدفق
     *مثال:* `/setflood 10`
     ➥ /setfloodmode <ban/kick/mute/tban/tmute> <القيمة>*:* الإجراء الذي يتم اتخاذه عند تجاوز المستخدم الحد المسموح به للتدفق. حظر/طرد/كتم/كتم مؤقت/حظر مؤقت
     • *ملاحظة:*
     • يجب ملء القيمة للحظر المؤقت والكتم المؤقت!!
     يمكن أن تكون القيمة على سبيل المثال:
     `5m` = 5 دقائق
     `6h` = 6 ساعات
     `3d` = 3 أيام
     `1w` = 1 أسبوع

approve_help: |
     في بعض الأحيان، قد تثق في مستخدم بعينه بعدم إرسال محتوى غير مرغوب فيه.
     ربما ليس بما يكفي لجعله مشرفًا، ولكن قد تكون موافقًا على عدم تطبيق القفل، وقائمة الحظر، ومنع التدفق عليه.
     هذا هو الغرض من الموافقات - الموافقة على المستخدمين الموثوق بهم للسماح لهم بإرسال الرسائل
     *أوامر المشرفين:*
     ➥ /approval*:* تحقق من حالة الموافقة على مستخدم في المحادثة الحالية.
     ➥ /approve*:* الموافقة على مستخدم. لن تنطبق القفل، وقائمة الحظر، ومنع التدفق عليه بعد الآن.
     ➥ /unapprove*:* إلغاء الموافقة على مستخدم. سيكونون الآن عرضة للقفل، وقائمة الحظر، ومنع التدفق مرة أخرى.
     ➥ /approved*:* قائمة بجميع المستخدمين الموافق عليهم.
     ➥ /unapproveall*:* إلغاء الموافقة على *جميع* المستخدمين في المحادثة. لا يمكن التراجع عن هذا الإجراء.

backup_help: |
    *للمشرفين فقط:*
     ➥ /import: قم بالرد على ملف نسخة احتياطية للمساعد في المجموعة لاستيراد ما يمكن استيراده بقدر الإمكان، مما يجعل عملية النقل سهلة للغاية! يرجى ملاحظة أنه لا يمكن استيراد الملفات/الصور بسبب قيود تلغرام.
     ➥ /export: تصدير بيانات المجموعة، والبيانات التي سيتم تصديرها هي: القواعد، الملاحظات (وثائق، صور، موسيقى، فيديو، صوت، نص، أزرار نصية)

bans_help: |
   *أي مستخدم*
    ➥ /kickme: يطرد المستخدم الذي أصدر الأمر

   *للمشرفين فقط:*
    ➥ /ban <اسم المستخدم>: يحظر مستخدمًا. (عبر الاسم، أو الرد)
    ➥ /tban <اسم المستخدم> x(د/س/ساعة/دقيقة): يحظر مستخدمًا لمدة x زمنية. (عبر الاسم، أو الرد). د = دقائق، س = ساعات، ساعة = ساعات، دقيقة = دقائق.
    ➥ /unban <اسم المستخدم>: يلغي حظر مستخدم. (عبر الاسم، أو الرد)
    ➥ /kick <اسم المستخدم>: يطرد مستخدمًا من المجموعة، (عبر الاسم، أو الرد)

blacklist_help: |
    تُستخدم قوائم الحظر لمنع ظهور بعض الكلمات أو المصطلحات في المجموعة. في أي وقت يتم ذكر الكلمة أو المصطلح، سيتم حذف الرسالة على الفور. قد تكون فكرة جيدة هي أحيانًا مزامنة هذا مع تصفية التحذيرات!

    *ملاحظة*: قوائم الحظر لا تؤثر على مشرفي المجموعة.

     ➥ /blacklist*:* عرض الكلمات المحظورة حاليًا.

    *للمشرفين فقط:*
     ➥ /addblacklist <الكلمات المحظورة>*:* إضافة كلمة إلى قائمة الحظر. يعتبر كل سطر كلمة واحدة، لذا باستخدام أسطر مختلفة ستتيح لك إضافة عدة كلمات محظورة.
     ➥ /unblacklist <الكلمات المحظورة>*:* إزالة الكلمات من قائمة الحظر. نفس المنطق ينطبق هنا، لذا يمكنك إزالة عدة كلمات محظورة دفعة واحدة.
     ➥ /blacklistmode <إيقاف/حذف/تحذير/حظر/طرد/كتم/حظر مؤقت/كتم مؤقت>*:* الإجراء المطلوب عندما يرسل شخص كلمات محظورة.

cleaner_help: |
    ➥ /cleanbluetext <تشغيل/إيقاف/نعم/لا> - تنظيف الأوامر بعد الإرسال
    ➥ /ignorecleanbluetext <الكلمة> - منع التنظيف التلقائي للأمر
    ➥ /unignorecleanbluetext <الكلمة> - إزالة منع التنظيف التلقائي للأمر
    ➥ /listcleanbluetext - قائمة الأوامر التي تم إعفاؤها من التنظيف التلقائي

connections_help: |
    ➥ /connect: قم بربط محادثة (يمكن القيام به في المجموعة عبر /connect أو /connect <معرف المحادثة> في الرسائل الخاصة)
    ➥ /connection: قائمة المحادثات المتصلة
    ➥ /disconnect: قطع الاتصال من محادثة
    ➥ /helpconnect: قائمة الأوامر المتاحة التي يمكن القيام بها عن بُعد

     *للمشرفين فقط:*
    ➥ /allowconnect <نعم/لا>: السماح لمستخدم بالاتصال بمحادثة

cust_filters_help: |
    ➥ /filters*:* قائمة بجميع مرشحات المحادثة النشطة.

     *للمشرفين فقط:*
    ➥ /filter <الكلمة المفتاحية> <رسالة الرد>*:* إضافة مرشح إلى هذه المحادثة. سيقوم الروبوت الآن بالرد بهذه الرسالة عندما يتم ذكر 'الكلمة المفتاحية'.
      إذا قمت بالرد على ملصق بكلمة مفتاحية، سيقوم الروبوت بالرد بالملصق نفسه. ملاحظة: جميع كلمات المرشح
      هي بالأحرف الصغيرة. إذا كنت ترغب في أن تكون كلمتك المفتاحية عبارة، استخدم علامات اقتباس. مثال: /filter "مرحبًا هناك" كيف حالك؟
    ➥ /stop <كلمة المرشح>*:* قف هذا المرشح.

     *لمنشئ المحادثة فقط:*
    ➥ /removeallfilters*:* قم بإزالة جميع مرشحات المحادثة دفعة واحدة.

      *ملاحظة*: تدعم مرشحات الأيسر أيضًا مُنسقي العلامات مثل: {first}, {last} إلخ وأزرار.
        تحقق من /markdownhelp لمعرفة المزيد!


disable_help: |
    ليس الجميع يرغبون في استخدام كل ميزة يقدمه الروبوت. بعض الأوامر هي أفضل
    تركها غير مستخدمة؛ لتجنب البريد العشوائي وسوء الاستخدام.

    يتيح لك ذلك تعطيل بعض الأوامر المستخدمة بشكل شائع، حتى لا يمكن لأحد استخدامها.
    سيسمح لك أيضًا بحذفها تلقائيًا، مما يمنع الأشخاص من استخدام النصوص الزرقاء.

     ➥ /cmds: تحقق من الوضع الحالي للأوامر المعطلة

     *للمشرفين فقط:*
     ➥ /enable <اسم الأمر>: تمكين تلك الأمر
     ➥ /disable <اسم الأمر>: تعطيل تلك الأمر
     ➥ /enablemodule <اسم الوحدة>*:* تمكين جميع الأوامر في تلك الوحدة
     ➥ /disablemodule <اسم الوحدة>*:* تعطيل جميع الأوامر في تلك الوحدة
     ➥ /listcmds: قائمة بجميع الأوامر التي يمكن تعطيلها

download_help: |
     قم بتسهيل تنزيل الملفات من معظم المواقع!

     *الاستخدام:*
     ➥ /download [رابط] - تنزيل ملف من الرابط (للمسؤولين فقط)
     ➥ /download [رد على ملف تلغرام] - تنزيل ملف تلغرام
     ➥ /telegraph [رد على ملف تلغرام] - تنزيل ملف تلغرام
     ➥ /tiktokdl [رابط] - تنزيل فيديو TikTok، جرب استخدام أمر ytdown إذا حدث خطأ.
     ➥ /fbdl [رابط] - تنزيل فيديو Facebook.
     ➥ /anon [رابط] - تحميل الملفات إلى Anonfiles.
     ➥ /ytdl [رابط مدعوم بواسطة YT-DLP] - تنزيل فيديو وصوت مدعوم بواسطة YT-DLP.
     ➥ /song [رابط أو استعلام] - تنزيل أغنية من YouTube
     ➥ /video [رابط أو استعلام] - تنزيل فيديو من YouTube

extra_help: |
    *Carbon*
    /carbon *:* قم بإنشاء نص بأنماط مختلفة من الكربون للنص الذي تم تحديده أو الرد عليه

    *أزواج*
    ➥ /couples *:* اختر مستخدمين اثنين وقم بإرسال اسميهما كأزواج في مجموعتك.

    *صدى*
    ➥ /echo *:* الرد على نص

    *لعبة الرموز التعبيرية*
    *اللعب مع الرموز التعبيرية:*
    ➥ /dice أو /dice 1 إلى 6 أي قيمة
    ➥ /ball أو /ball 1 إلى 5 أي قيمة
    ➥ /dart أو /dart 1 إلى 6 أي قيمة
     *الاستخدام:* ههههه مجرد سحر.
     *تحذير:* قد تكون في ورطة إذا أدخلت قيمة أخرى غير المذكورة.

    *تنسيق النص:*
    ➥ /markdownhelp*:* ملخص سريع حول كيفية عمل تنسيق النص في تلغرام - يمكن استدعاؤه فقط في المحادثات الخاصة

    *Mamefy*
    ➥ /mmf <النص>*:* أضف نصًا إلى ملصق تم الرد عليه

    *مزحة*
    ➥ /horny *:* تحقق من مدى الرغبة الجنسية الحالية لديك
    ➥ /gay *:* تحقق من مدى رجولتك الحالية
    ➥ /lezbian *:* تحقق من مدى لزوجيتك الحالية
    ➥ /boob *:* تحقق من حجم ثديك الحالي
    ➥ /cute *:* تحقق من مدى لطافتك الحالية

    *ردود الفعل:*
    ➥ /react*:* رد عشوائي

    *وسم/تنبيه الجميع*
    ➥ /tagall أو @all '(رد على الرسالة أو أضف رسالة أخرى) للإشارة إلى جميع أعضاء مجموعتك، بدون استثناء.

    *QuoteLy*
    ➥ /q - لاقتباس رسالة.
    ➥ /q [عدد صحيح] - لاقتباس أكثر من رسائل واحدة.
    ➥ /q r - لاقتباس رسالة مع الرد عليها
    ➥ /q r [عدد صحيح] - لاقتباس أكثر من رسائل الرد.


feds_help: |
    كل شيء ممتع حتى يبدأ مزعج بإدخال نفسه إلى مجموعتك، وتضطر إلى حظره. ثم تحتاج إلى البدء في حظر المزيد والمزيد، وهذا يؤلم.
    لكن بعد ذلك لديك العديد من المجموعات، ولا تريد أن يكون هذا المزعج في إحدى مجموعاتك - كيف يمكنك التعامل؟ هل يجب عليك حظره يدويًا في جميع مجموعاتك؟
    *ليس بعد الآن!* باستخدام الاتحاد، يمكنك جعل الحظر في محادثة واحدة يمتد إلى جميع المحادثات الأخرى.
    يمكنك حتى تعيين مسؤولين للاتحاد، حتى يمكن لمسؤوليك الموثوق بهم حظر جميع المزعجين من المحادثات التي تريد حمايتها.

    *الأوامر:*
    تم تقسيم الاتحادات الآن إلى 3 أقسام لسهولتك.
    ➥ /fedownerhelp*:* يوفر مساعدة في إنشاء الاتحاد والأوامر للمالك فقط
    ➥ /fedadminhelp*:* يوفر مساعدة في أوامر إدارة الاتحاد
    ➥ /feduserhelp*:* يوفر مساعدة في الأوامر التي يمكن لأي شخص استخدامها

FED_OWNER_HELP: | 
    *لمالك الاتحاد فقط:*
    ➥ /newfed <اسم الاتحاد>*:* ينشئ اتحادًا، يُسمح بواحد فقط لكل مستخدم
    ➥ /renamefed <معرف الاتحاد> <اسم الاتحاد الجديد>*:* يغير اسم الاتحاد إلى اسم جديد
    ➥ /delfed <معرف الاتحاد>*:* يحذف اتحادًا، وأي معلومات متعلقة به. لن يتم إلغاء حظر المستخدمين
    ➥ /fpromote <مستخدم>*:* يُسند المستخدم كمسؤول اتحاد. يمكن للمستخدم استخدام جميع الأوامر تحت "مسؤولي الاتحاد"
    ➥ /fdemote <مستخدم>*:* يُنزل المستخدم من مسؤول الاتحاد إلى مستخدم عادي
    ➥ /subfed <معرف الاتحاد>*:* يشترك في الاتحاد المحدد، سيتم حظر المشتركين في الاتحاد المشترك أيضًا في اتحادك
    ➥ /unsubfed <معرف الاتحاد>*:* يلغي الاشتراك في الاتحاد المحدد
    ➥ /setfedlog <معرف الاتحاد>*:* يعين المجموعة كقاعدة لتقرير السجل للاتحاد
    ➥ /unsetfedlog <معرف الاتحاد>*:* يزيل المجموعة كقاعدة لتقرير السجل للاتحاد
    ➥ /fbroadcast <رسالة>*:* يبث رسالة إلى جميع المجموعات التي انضمت إلى اتحادك
    ➥ /fedsubs*:* يعرض الاتحادات التي اشتركت فيها مجموعتك `(معطل حاليًا)`

FED_ADMIN_HELP: |
    *مسؤولي الاتحاد:*
    ➥ /fban <مستخدم> <سبب>*:* يحظر مستخدمًا من قبل الاتحاد
    ➥ /unfban <مستخدم> <سبب>*:* يُزيل مستخدمًا من حظر الاتحاد
    ➥ /fedinfo <معرف الاتحاد>*:* معلومات عن الاتحاد المحدد
    ➥ /joinfed <معرف الاتحاد>*:* ينضم المجموعة الحالية إلى الاتحاد. يمكن لأصحاب المجموعات فقط القيام بذلك. يمكن لكل مجموعة الانضمام إلى اتحاد واحد فقط
    ➥ /leavefed <معرف الاتحاد>*:* يترك الاتحاد المحدد. يمكن لأصحاب المجموعات فقط القيام بذلك
    ➥ /setfrules <قواعد>*:* يرتب قواعد الاتحاد
    ➥ /fedadmins*:* يعرض مسؤولي الاتحاد
    ➥ /fbanlist*:* يعرض جميع المستخدمين الذين تعرضوا للحظر من قبل الاتحاد في الوقت الحالي
    ➥ /fedchats*:* يحصل على قائمة بجميع المحادثات المتصلة في الاتحاد
    ➥ /chatfed *:* يعرض الاتحاد في المحادثة الحالية

FED_USER_HELP: | 
    *أي مستخدم:*
    ➥ /fbanstat*:* يظهر ما إذا كنت/المستخدم الذي تقوم بالرد عليه أو اسم المستخدم الخاص به محظورًا في مكان ما أم لا
    ➥ /fednotif <تشغيل/إيقاف>*:* إعدادات الاتحاد ليست في الرسائل الخاصة عندما يكون هناك مستخدمون محظورون/ملغون الحظر
    ➥ /frules*:* اطلع على لوائح الاتحاد

formt_help_bse: |
    Cutie تدعم عددًا كبيرًا من خيارات التنسيق لجعل رسائلك أكثر تعبيرًا. تحقق!

force_subscribe: |
    - @MissCutieRobot يمكن أن تكتم الأعضاء الذين لم يشتركوا في قناتك حتى يشتركوا.
    - عند تمكينها، سأكتم الأعضاء غير المشتركين وأعرض لهم زرًا للغاء الكتم. عندما يضغطون على الزر، سأقوم بإلغاء الكتم عنهم.

    *الإعداد*
    1) أولًا وقبل كل شيء، قم بإضافتي إلى المجموعة كمسؤول بإذن حظر المستخدمين وقم بإضافتي كمسؤول أيضًا في القناة.
    ملاحظة: يمكن لإنشاء المجموعة فقط تهيئتي، ولن أسمح بالاشتراك الإلزامي مرة أخرى إذا لم يتم ذلك.

    *الأوامر*
    ➥ /forcesubscribe: احصل على الإعدادات الحالية.
    ➥ /forcesubscribe <لا/إيقاف/تعطيل>: قم بإيقاف تشغيل الاشتراك الإلزامي.
    ➥ /forcesubscribe <اسم القناة>: قم بتشغيله وإعداد القناة.
    ➥ /forcesubscribe clear: قم بإلغاء كتم جميع الأعضاء الذين تم كتمهم بواسطتي.

    ملاحظة /forcesub هو اختصار لـ /forcesubscribe.

google_search: |
    *بحث Google*
    ➥ /google <نص>*:* قم بعمل بحث في Google
    ➥ /img <نص>*:* ابحث في Google عن الصور واعرضها\nللحصول على عدد أكبر من النتائج، قم بتحديد "lim". على سبيل المثال: `/img hello lim=10`
    ➥ /app <اسم التطبيق>*:* ابحث عن تطبيق في متجر Play واعرض تفاصيله.
    ➥ /reverse |pp |grs: قم بعمل بحث عكسي عن الوسائط التي تم الرد عليها.

    *ترجمة Google*
    ➥ `/tr` أو `/tl` (رمز اللغة) كرد على رسالة طويلة
    *مثال:*
    ➥ `/tr en`*:* يترجم شيئًا إلى الإنجليزية
    ➥ `/tr hi-en`*:* يترجم الهندية إلى الإنجليزية

md_help: |
    <b>تنسيق Markdown</b>
    يمكنك تنسيق رسالتك باستخدام *الخط العريض*, _المائل_, -التسطير-, وغيرها الكثير. جرب واستمتع!
    <b>Markdown المدعومة</b>:
    - <code>`كلمات الكود`</code>: تُستخدم العلامات العكسية للخطوط ذات العرض الثابت. تظهر على هذا النحو: <code>كلمات الكود</code>.
    - <code>_كلمات مائلة_</code>: تُستخدم الشرطات السفلية للخطوط المائلة. تظهر على هذا النحو: <i>كلمات مائلة</i>.
    - <code>*كلمات عريضة*</code>: تُستخدم النجوم للخطوط العريضة. تظهر على هذا النحو: <b>كلمات عريضة</b>.
    - <code>~تسطير~</code>: تُستخدم الأمواج للتسطير. تظهر على هذا النحو: <strike>تسطير</strike>.
    - <code>[رابط هايبرلنك](example.com)</code>: هذا هو التنسيق المستخدم للروابط الهايبرلنك. تظهر على هذا النحو: <a href="https://example.com/">رابط هايبرلنك</a>.
    - <code>[زري](buttonurl://example.com)</code>: هذا هو التنسيق المستخدم لإنشاء أزرار. سيقوم هذا المثال بإنشاء زر يسمى "زري" الذي يفتح <code>example.com</code> عند النقر عليه.
    إذا كنت ترغب في إرسال أزرار على نفس الصف، استخدم التنسيق <code>:same</code>.
    <b>مثال:</b>
    <code>[زر 1](buttonurl://example.com)</code>
    <code>[زر 2](buttonurl://example.com:same)</code>
    <code>[زر 3](buttonurl://example.com)</code>
    سيظهر زر 1 و 2 على نفس الصف، مع 3 أسفله.


filling_help: |
  <b>الملء</b>
  يمكنك أيضًا تخصيص محتوى رسالتك باستخدام البيانات السياقية. على سبيل المثال، يمكنك ذكر مستخدم باسمه في رسالة الترحيب أو ذكره في عملية تصفية!
  يمكنك استخدام هذه البيانات لذكر مستخدم في الملاحظات أيضًا!
  <b>البيانات المدعومة:</b>
  - <code>{first}</code>: الاسم الأول للمستخدم.
  - <code>{last}</code>: الاسم الأخير للمستخدم.
  - <code>{fullname}</code>: الاسم الكامل للمستخدم.
  - <code>{username}</code>: اسم المستخدم للمستخدم. إذا لم يكن لديه اسم مستخدم، يتم الإشارة إلى المستخدم بدلاً من ذلك.
  - <code>{mention}</code>: إشارة إلى المستخدم باستخدام اسمه الأول.
  - <code>{id}</code>: معرف المستخدم.
  - <code>{chatname}</code>: اسم المحادثة.

fun_help: |
  • /runs: الرد بسلسلة عشوائية من سلاسل الرد.
  • /pat: احتضان شخص، شيء جميل للأشياء اللطيفة :3
  • /slap: صفع شخص، أو تلقي صفعة إذا لم يكن هناك رد.
  • /shrug : الحصول على تعبير اليد XD.
  • /table : الحصول على فليب / عدم فليب :v.
  • /decide : الإجابة عشوائياً بنعم / لا / ربما
  • /toss : رمي عملة.
  • /roll : رمي النردة.
  • /rlg : انضمام الآذان والأنف والفم لإنشاء شخصية غميقة ؛-؛
  • /shout <كلمة مفتاحية>: كتابة أي شيء تريده بصوت عال.
  • /stickerid: الرد على ملصق للحصول على معرفه.
  • /getsticker: الرد على ملصق أو صورة للحصول على صورة PNG الخام.
  • /steal: الرد على ملصق أو صورة لإضافتها إلى مجموعتك.


antispam_help: |
  *المسؤولون فقط:*
  • `/antispam <on/off/yes/no>`*:* سيقوم بتبديل تقنيتنا لمكافحة البريد العشوائي أو إرجاع إعداداتك الحالية.

  مكافحة البريد العشوائي، تُستخدم من قبل مطوري البوت لحظر مرسلي البريد العشوائي في جميع المجموعات. هذا يساعد في حمايتك وحماية مجموعاتك من مرسلي البريد العشوائي بأسرع ما يمكن.
  *ملحوظة:* يمكن للمستخدمين الاستئناف من حظر جميع المجموعات أو الإبلاغ عن مرسلي البريد العشوائي في @YorkTownEagleUnion

  يتم دمج Cutie أيضًا مع واجهة برمجة التطبيقات @Spamwatch لإزالة مرسلي البريد العشوائي بقدر الإمكان من دردشتك!
  *ما هو SpamWatch؟*
  يحتفظ SpamWatch بقائمة حظر كبيرة تحدث باستمرار من روبوتات البريد العشوائي والمثيرين للشغب ومرسلي البيتكوين والشخصيات غير المرغوب فيها.
  يساعد باستمرار في حظر مرسلي البريد العشوائي من مجموعتك تلقائيًا. لذا، لن تضطر إلى القلق بشأن البريد العشوائي الذي يجتاح مجموعتك.
  *ملحوظة:* يمكن للمستخدمين الاستئناف من حظر Spamwatch على @SpamwatchSupport


locks_help: |
  هل تزعجك الملصقات؟ أو تريد تجنب مشاركة الروابط؟ أو الصور؟
  أنت في المكان الصحيح!
  يتيح لك وحدة القفل قفل بعض العناصر الشائعة في
  عالم التيليجرام؛ سيقوم البوت تلقائيًا بحذفها!

   • `/locktypes`*:* يسرد جميع أنواع القفل الممكنة

   *المسؤولون فقط:*
   • `/lock <النوع>`*:* قفل عناصر من نوع معين (غير متاح في الدردشة الخاصة)
   • `/unlock <النوع>`*:* فتح عناصر من نوع معين (غير متاح في الدردشة الخاصة)
   • `/locks`*:* قائمة الأقفال الحالية في هذه الدردشة.

  يمكن استخدام الأقفال لتقييد مستخدمي المجموعة.
  مثلا:
  إذا تم قفل الروابط، ستقوم بتلقائيًا بحذف جميع الرسائل التي تحتوي على روابط. إذا تم قفل الملصقات، سيتم منع جميع المستخدمين غير الإداريين من إرسال ملصقات، وما إلى ذلك.
  إذا تم قفل البوتات، سيتم منع غير الإداريين من إضافة بوتات إلى المجموعة.

  *ملاحظة:*
   • فتح إذن *معلومات* سيسمح للأعضاء (غير الإداريين) بتغيير معلومات المجموعة، مثل الوصف أو اسم المجموعة
   • فتح إذن *تثبيت* سيسمح للأعضاء (غير الإداريين) بتثبيت رسالة في المجموعة


log_help: |
  *المسؤولون فقط:*
  ➥ /logchannel*:* الحصول على معلومات قناة السجل
  ➥ /setlog*:* تعيين قناة السجل.
  ➥ /unsetlog*:* إلغاء تعيين قناة السجل.
  ➥ /announce*:* تبديل الإعلان عن الأنشطة الإدارية في غرفة الدردشة.

  تعيين قناة السجل يتم عن طريق:
  • إضافة البوت إلى القناة المرغوبة (كمسؤول!)
  • إرسال `/setlog` في القناة
  • إعادة توجيه `/setlog` إلى المجموعة


markdown_help_text: |
      التنسيق بواسطة Markdown هو أداة قوية جدًا مدعومة بواسطة تيليجرام. يحتوي Cutie على بعض التحسينات للتأكد من أن الرسائل المحفوظة تتم معالجتها بشكل صحيح وللسماح لك بإنشاء أزرار.

      - <code>_نص مائل_</code>: لف النص بين '_' سينتج نصًا مائلًا
      - <code>*نص عريض*</code>: لف النص بين '*' سينتج نصًا عريضًا
      - <code>`نص`</code>: لف النص بين '`' سينتج نصًا ثابتًا، والمعروف أيضًا باسم 'كود'
      - <code>[نص](رابط)</code>: سيقوم هذا بإنشاء ارتباط - ستظهر الرسالة فقط بشكل <code>نص</code>،
      والنقر فوقها سيفتح الصفحة في <code>رابط</code>.
      مثال: <code>[اختبار](example.com)</code>

      - <code>[نص الزر](زررابط:رابط)</code>: هذا هو تحسين خاص يسمح للمستخدمين بوجود أزرار تيليجرام في تنسيق Markdown الخاص بهم. <code>نص الزر</code> سيكون ما يتم عرضه على الزر، و<code>رابط</code> سيكون الرابط الذي يتم فتحه.
      مثال: <code>[هذا زر](زررابط:example.com)</code>

      إذا كنت ترغب في وجود أزرار متعددة على نفس السطر، استخدم :same ، على النحو التالي:
      <code>[واحد](زررابط://example.com)
      [اثنان](زررابط://google.com:same)</code>
      سيتم إنشاء زرين على نفس الخط، بدلاً من زر واحد لكل سطر.

      تذكر أن يجب أن تحتوي رسالتك <b>على نص آخر</b> بخلاف زر!


muting_help: |
       *للمسؤولين فقط:*
       • `/mute <معرف المستخدم>`*:* يسكت المستخدم. يمكن أيضًا استخدامه كرد على المستخدم المشار إليه.
       • `/tmute <معرف المستخدم> x(د/س/م)`*:* يسكت المستخدم لمدة x. (عبر المعرف أو الرد). `د` = `دقائق`، `س` = `ساعات`، `م` = `أيام`.
       • `/unmute <معرف المستخدم>`*:* يلغي الصمت عن المستخدم. يمكن أيضًا استخدامه كرد على المستخدم المشار إليه.


moderators_help: |
       في بعض الأحيان، قد لا تثق في المستخدم بشكل كافي لتجعله مديرًا في مجموعتك ولكن قد تكون موافقًا على منعه من البان، الكتم، والتحذير. هذا ما تستخدمه الوسائط لتعيين مشرفين من بين المستخدمين الموثوق بهم للسماح لهم بإدارة مجموعتك.

       *الأوامر*
       ➥ /addmod *:* مشرف للمستخدم.
       ➥ /rmmod *:* إزالة مشرف من المستخدم.
       ➥ /modcheck *:* فحص الإشراف للمستخدم.
       ➥ /modlist *:* قائمة المستخدمين المشرفين.


nightmode_help: |
       *للمسؤولين فقط*
       ➥ /nightmode: يضيف المجموعة إلى الدردشات الليلية.
       ➥ /rmnight: يزيل المجموعة من الدردشات الليلية.

       *ملاحظة:* يتم إغلاق الدردشات الليلية تلقائيًا في الساعة 12 صباحًا (IST) ويتم فتحها تلقائيًا في الساعة 6 صباحًا (IST) لمنع الرسائل الليلية المزعجة.


notes_help: |
       • `/get <اسم المذكرة>`*:* الحصول على المذكرة بهذا الاسم
       • `#<اسم المذكرة>`*:* نفس /get
       • `/notes` أو `/saved`*:* قائمة بجميع المذكرات المحفوظة في هذه الدردشة
       • `/number` *:* سيقوم بسحب المذكرة بذلك الرقم في القائمة.
        إذا كنت ترغب في استرداد محتوى المذكرة دون أي تنسيق، استخدم `/get <اسم المذكرة> noformat`. قد يكون ذلك مفيدًا عند تحديث مذكرة حالية.

        *للمسؤولين فقط:*
       • `/save <اسم المذكرة> <بيانات المذكرة>`*:* يحفظ بيانات المذكرة بالاسم المذكور
        يمكن إضافة زر إلى مذكرة باستخدام تنسيق الوصلة العادي للتأشير - يجب أن تكون الوصلة مسبوقة فقط بقسم "buttonurl:"، على النحو التالي: `[بعض الوصلة](buttonurl:example.com)`. تحقق من `/markdownhelp` لمزيد من المعلومات.
       • `/save <اسم المذكرة>`*:* حفظ الرسالة المُرد عليها كمذكرة بالاسم المذكور
       • `/clear <اسم المذكرة>`*:* مسح المذكرة بهذا الاسم
       • `/removeallnotes`*:* إزالة جميع المذكرات من المجموعة
       *ملاحظة:* أسماء المذكرات غير حساسة للحالة، ويتم تحويلها تلقائيًا إلى حروف صغيرة قبل الحفظ.

purge_help: |
       *للمسؤولين فقط:*
        • /del: يحذف الرسالة التي قمت بالرد عليها
        • /purge: يحذف جميع الرسائل بين هذه الرسالة والرسالة التي تم الرد عليها.
        • /purge <العدد X>: يحذف الرسالة التي تم الرد عليها، والرسائل X التالية إذا تم الرد على رسالة.

reports_help: |
        • `/report <سبب>`*:* ردًا على رسالة للإبلاغ عنها للمشرفين.
        • `@admin`*:* ردًا على رسالة للإبلاغ عنها للمشرفين.
         *ملاحظة:* لن يتم تنشيط أي من هذه الأوامر إذا تم استخدامها بواسطة مشرفين.

         *للمسؤولين فقط:*
          • `/reports <تشغيل/إيقاف>`*:* تغيير إعداد الإبلاغ أو عرض الحالة الحالية.
          • إذا تم القيام بذلك في الرسائل الخاصة، سيتم تبديل حالتك.
          • إذا تم القيام بذلك في المجموعة، سيتم تبديل حالة تلك المجموعة.

rules_help: |
      ➥ /rules*:* الحصول على قواعد هذه الدردشة.
       *للمسؤولين فقط:*
      ➥ /setrules <القواعد الخاصة بك هنا>*:* تعيين القواعد لهذه الدردشة.
      ➥ /clearrules*:* مسح القواعد لهذه الدردشة.

userinfo_help: |
      - /setbio <نص>: أثناء الرد، سيتم حفظ سيرة المستخدم الأخرى.
      - /bio: سيحصل على سيرتك الذاتية أو سيرة مستخدم آخر. لا يمكن تعيينها بنفسك.
      - /setme <نص>: سيعين معلوماتك.
      - /me: سيحصل على معلوماتك الشخصية أو معلومات مستخدم آخر.

warns_help: |
      ➥ /warns <معرف المستخدم>*:* الحصول على عدد وسبب التحذيرات للمستخدم.
      ➥ /warnlist*:* قائمة بجميع عوامل التحذير الحالية

      *للمسؤولين فقط:*
      ➥ /warn <معرف المستخدم>*:* تحذير مستخدم. بعد 3 تحذيرات، سيتم حظر المستخدم من المجموعة. يمكن أيضًا استخدامه كرد.
      ➥ /resetwarn <معرف المستخدم>*:* إعادة تعيين التحذيرات لمستخدم. يمكن أيضًا استخدامه كرد.
      ➥ /addwarn <كلمة مفتاحية> <رسالة الرد>*:* تعيين عامل تحذير على كلمة مفتاحية معينة. إذا كنت ترغب في أن تكون كلمة المفتاح الخاصة بك جملة، فقم بتضمينها بين علامات اقتباس، على النحو التالي: `/addwarn "غاضب جدًا" هذا مستخدم غاضب`.


greetings_help: |
       *فقط للمشرفين:*
       ➥ /welcome <تشغيل/إيقاف>*:* تمكين/تعطيل رسائل الترحيب.
       ➥ /welcome*:* عرض إعدادات الترحيب الحالية.
       ➥ /welcome noformat*:* عرض إعدادات الترحيب الحالية بدون التنسيق - مفيد لإعادة استخدام رسائل الترحيب!
       ➥ /goodbye*:* نفس الاستخدام والمعطيات كما في `/welcome`.
       ➥ /setwelcome <نص>*:* تعيين رسالة ترحيب مخصصة. إذا تم استخدامها بالرد على وسائط، سيتم استخدام تلك الوسائط.
       ➥ /setgoodbye <نص>*:* تعيين رسالة وداع مخصصة. إذا تم استخدامها بالرد على وسائط، سيتم استخدام تلك الوسائط.
       ➥ /resetwelcome*:* إعادة تعيين رسالة الترحيب الافتراضية.
       ➥ /resetgoodbye*:* إعادة تعيين رسالة الوداع الافتراضية.
       ➥ /cleanwelcome <تشغيل/إيقاف>*:* عند انضمام عضو جديد، حاول حذف الرسالة الترحيبية السابقة لتجنب الرسائل المزعجة في الدردشة.
       ➥ /welcomemutehelp*:* تقديم معلومات حول كيفية إعداد تصميم الصمت لرسائل الترحيب.
       ➥ /cleanservice <تشغيل/إيقاف*:* حذف رسائل خدمة الترحيب/المغادرة من تليجرام.
       *مثال:*
       انضم المستخدم إلى الدردشة، غادر المستخدم الدردشة.

       *تنسيق الترحيب:*
       ➥ `/welcomehelp*:* عرض مزيد من المعلومات حول التنسيق لرسائل الترحيب/الوداع المخصصة.

nation_help: |
      - /eagle - يعرض قائمة جميع أعضاء اتحاد النسر.
      - /royals - يعرض قائمة جميع الأمم الملكية.
      - /sakuras - يعرض قائمة جميع الأمم الساكورا.
      - /sardegnas - يعرض قائمة جميع الأمم السردينيا.
      - /neptunians - يعرض قائمة جميع الأمم النيبتونية.
      ملاحظة: هذه الأوامر تعرض مستخدمين لديهم امتيازات خاصة بالبوت ويمكن استخدامها فقط من قبلهم.
      يمكنك زيارة @YorktownEagleUnion للمزيد من المعلومات حول هذه الأمور.


sticker_blacklist_help: |
       **فقط للمشرفين:**
         ➥ /addblsticker <رابط ملصق>**:* إضافة ملصق إلى قائمة الحظر. يمكن إضافته عبر الرد على ملصق.
         ➥ /unblsticker <رابط ملصق>**:* إزالة ملصقات من قائمة الحظر. نفس منطق الأسطر الجديدة ينطبق هنا، لذا يمكنك حذف ملصقات متعددة في وقت واحد.
         ➥ /rmblsticker <رابط ملصق>**:* نفس الأمر أعلاه.
         ➥ /blstickermode <حذف/حظر/تحظير/كتم/تصميم تحظير/تصميم كتم>**:* تعيين إجراء افتراضي على ما يجب القيام به إذا استخدم المستخدمون ملصقات محظورة.
       ملاحظة:
         ➥ `<رابط ملصق>` يمكن أن يكون `https://t.me/addstickers/<ملصق>` أو مجرد `<ملصق>` أو الرد على رسالة الملصق.


stickers_help: |
         ➥ /stickerid*:* ارد على ملصق لأخبرك بمعرف ملفه.
         ➥ /getsticker*:* ارد على ملصق لأرفع ملفه الخام بصيغة PNG.
         ➥ /delstcker*:* ارد على ملصق لحذفه من الحزمة، يمكنني حذف ما صنعته فقط.
         ➥ /kang*:* ارد على ملصق (متحرك/ثابت/فيديو) أو صورة أو ملف GIF لنقله إلى حزمتك الخاصة.
         ➥ /stickers*:* البحث عن ملصقات بمصطلح معين في كتالوج ملصقات combot.


raid_help: |
  هل تعرضت لهجوم من قبل مزعجين أو روبوتات في مجموعتك؟
  يتيح لك هذا الوحدة إيقاف المهاجمين بسرعة
  عن طريق تمكين *وضع الهجوم*، سأقوم تلقائيًا بطرد كل مستخدم يحاول الانضمام
  عند انتهاء الهجوم، يمكنك التبديل مرة أخرى إلى قفل المجموعة وسيعود كل شيء إلى وضعه الطبيعي.
  
   *فقط للمشرفين!* 

  • /raid `(إيقاف/الزمن اختياري)` : تبديل وضع الهجوم (تشغيل/إيقاف)
  إذا لم يتم تحديد وقت، سيتم تعيينه افتراضيًا إلى 2 ساعة ثم سيتم إيقافه تلقائيًا
  من خلال تمكين *وضع الهجوم*، سأقوم بطرد كل مستخدم يحاول الانضمام إلى المجموعة.

  • /raidtime `(الزمن اختياري)` : عرض أو تعيين المدة الافتراضية لوضع الهجوم، بعد هذا الوقت سيتم إيقاف وضع الهجوم تلقائيًا
  الافتراضي هو 6 ساعات

  • /raidactiontime `(الزمن اختياري)` : عرض أو تعيين المدة الافتراضية التي سيتم فيها حظر وضع الهجوم مؤقتًا
  الافتراضي هو 1 ساعة


tagalert_help: |
  العديد من الإشارات.. هل يمكنك إدارتها جميعًا بمفردك..
  هذا هو الحلا
  إذا تم ذكر/إشارتك في مجموعة توجد بها TotalSecurity
  ستقوم TotalSecurity بإعلامك بذلك عبر رسالة خاصة بعد تمكين تنبيهات الإشارة
  **الأوامر**
  - /tagalert `on` : تشغيل تنبيهات الإشارة
  - /tagalert `off` : إيقاف تنبيهات الإشارة
  **مثال:**
  إذا تمت إشارتك في مجموعة، ستخبرك TotalSecurity من قام بذكرك،
  وستعرض الرسالة التي تم فيها الإشارة إليك، وأي مجموعة هي ذلك.


topics_help: |
  قدم تليجرام طريقة جديدة لإدارة محادثاتك تُعرف بـ المنتديات (المواضيع)

  كبوت إدارة المجموعات، لدي بعض الأوامر المفيدة لمساعدتك
  في إنشاء، حذف، إغلاق وإعادة فتح المواضيع في محادثتك.
  ➥ /topicnew*:* إنشاء موضوع جديد، يتطلب اسم الموضوع لإنشاءه.
  ➥ /topicdel*:* حذف موضوع موجود، يتطلب معرف الموضوع للحذف.  
  ➥ /topicclose*:* إغلاق موضوع موجود، يتطلب معرف الموضوع للإغلاق.
  ➥ /topicopen*:* فتح موضوع مغلق بالفعل، يتطلب معرف الموضوع للفتح.
  ➥ /setactiontopic*:* تعيين موضوع الإصدار لرسائل الإجراءات مثل الترحيب، والوداع، والتحذيرات، والحظر،..الخ
  ➥ /delactiontopic*:* حذف موضوع الافتراضي لرسائل الإجراءات.

tools_help: |
  *البلد*
  ➥ /country <اسم البلد>*:* جمع معلومات عن البلد المعطى

  *محول العملات:*
  ➥ /cash*:* محول العملات
  *مثال:*
  ➥ /cash 1 USD INR
  ➥ /cash 1 usd inr
  *النتيجة:* 1.0 دولار أمريكي = 75.505 روبية هندية

  *أدوات اللغة الإنجليزية*
  ➥ /define <نص>*:* اكتب الكلمة أو التعبير الذي تريد البحث عنه\nعلى سبيل المثال /define قتل
  ➥ /spell*:* عند الرد على رسالة، سيتم الرد بنسخة مصححة للقواعد اللغوية
  ➥ /synonyms <كلمة>*:* البحث عن مرادفات كلمة
  ➥ /antonyms <كلمة>*:* البحث عن عكس كلمة

  *التشفير وفك التشفير*
  ➥ /encrypt *:* يشفر النص المعطى
  ➥ /decrypt *:* يفك تشفير النص المشفر مسبقًا
 
  *GitHub*
  ➥ /github <اسم المستخدم>*:* الحصول على معلومات حول مستخدم GitHub.

  *GPS والموقع*
  ➥ /gps <الموقع>*:* الحصول على الموقع الجغرافي.

  *لصق*
  ➥ /paste *:* يحفظ المحتوى الذي تم الرد عليه إلى nekobin.com ويقوم بالرد برابط URL
 
  *أداة PDF*
  /pdf *:* إنشاء ملف PDF من الصورة التي تم الرد عليها

  *رمز الاستجابة السريعة (QR)*
  ➥ /getqr *:* الحصول على محتوى رمز الاستجابة السريعة من الصورة التي تم الرد عليها.
  ➥ /makeqr <نص> *:* إنشاء رمز استجابة سريعة يحتوي على النص المعطى.

  ➥ /time <استعلام>*:* يقدم معلومات حول منطقة زمنية.
  *استعلامات متاحة:* رمز البلد/اسم البلد/اسم المنطقة الزمنية 🕐 [قائمة المناطق الزمنية](https://en.wikipedia.org/wiki/List_of_tz_database_time_zones)

  *المعجم الحضري:*
  ➥ /ud <كلمة>*:* اكتب الكلمة أو التعبير الذي تريد البحث عنه
 
  *ويكيبيديا:*
  ➥ /wiki <استعلام>*:* بحث في ويكيبيديا بخصوص استعلامك

  *خلفية*
  ➥ /wall <استعلام>*:* الحصول على خلفية من wall.alphacoders.com
  
  *الطقس*
  ➥ /weather <مدينة>*:* وحدة الطقس المتقدمة، الاستخدام نفس /weather
  ➥ /weather moon*:* الحصول على الحالة الحالية للقمر
  
  *لقطة شاشة الموقع*
  ➥ /webss <رابط URL>*;* إرسال لقطة شاشة للرابط المعطى.
  
  *أداة الكتابة*
  ➥ /write <نص>*:* يكتب النص المعطى.
  
  *ضغط الملفات*
  ➥ /zip *:* الرد على ملف تليجرام لضغطه في تنسيق .zip
  ➥ /unzip *:* الرد على ملف تليجرام لفك ضغطه من تنسيق .zip


# Music Help

ADMIN_MUSIC: |
   *أوامر المسؤول:*
   
   قم فقط بإضافة 'c' في بداية الأوامر لاستخدامها في القناة.
   
   /pause : إيقاف تشغيل البث الحالي مؤقتًا.
   /resume : استئناف البث بعد التوقف المؤقت.
   /skip : تخطي البث الحالي وبدء بث المقطع التالي في الطابور.
   /end أو /stop : مسح الطابور وإنهاء البث الحالي.
   /player : الحصول على لوحة تفاعلية للمشغل.
   /queue : عرض قائمة المقاطع الموجودة في الطابور.


AUTH_MUSIC: |
   *المستخدمون المرخص لهم:*
   
   يمكن للمستخدمين المرخص لهم استخدام صلاحيات المسؤول في الروبوت دون أن يكون لديهم صلاحيات المسؤول في المحادثة.
   
   /auth [اسم المستخدم/معرف المستخدم] : إضافة مستخدم إلى قائمة المستخدمين المرخص لهم في الروبوت.
   /unauth [اسم المستخدم/معرف المستخدم] : إزالة مستخدم من قائمة المستخدمين المرخص لهم.
   /authusers : عرض قائمة المستخدمين المرخص لهم في المجموعة.


BROADCAST_MUSIC: |
   *ميزة البث [فقط للمشرفين العامين]:*
   
   /broadcast [رسالة أو الرد على رسالة] : بث رسالة إلى المحادثات التي تخدمها الروبوت.
   
   *وضع البث:*
   -pin : تثبيت رسائلك المبثوثة في المحادثات التي تخدمها.
   -pinloud : تثبيت رسائلك المبثوثة في المحادثات التي تخدمها وإرسال إشعار للأعضاء.
   -user : بث الرسالة للمستخدمين الذين بدأوا استخدام روبوتك.
   -assistant : بث رسالتك من حساب المساعد في الروبوت.
   -nobot : إجبار الروبوت على عدم بث الرسالة.
    
   *مثال:* /broadcast -user -assistant -pin اختبار البث


BLACKCHAT_MUSIC: |
   *ميزة قائمة المحادثات السوداء [فقط للمشرفين العامين]:*
   
   قيد محادثات غير مرغوب فيها في استخدام روبوتنا الثمين.
   
   /blacklistchat [معرف المحادثة] : إضافة محادثة إلى قائمة المحادثات السوداء للروبوت.
   /whitelistchat [معرف المحادثة] : إزالة المحادثة من قائمة المحادثات السوداء.
   /blacklistedchat : عرض قائمة المحادثات السوداء.


BLACKUSER_MUSIC: |
   *حظر المستخدمين [فقط للمشرفين العامين]:*
   
   ابدأ في تجاهل المستخدمين المدرجين في القائمة السوداء، حتى لا يتمكنوا من استخدام أوامر الروبوت.
   
   /block [اسم المستخدم أو الرد على مستخدم] : حظر المستخدم من روبوتنا.
   /unblock [اسم المستخدم أو الرد على مستخدم] : إلغاء حظر المستخدمين المحظورين.
   /blockedusers : عرض قائمة المستخدمين المحظورين.


CPLAY_MUSIC: |
   *أوامر التشغيل في القناة:*
   
   يمكنك بث الصوت/الفيديو في القناة.
   
   /cplay : بدء بث المقطع الصوتي المطلوب على دردشة الفيديو الخاصة بالقناة.
   /cvplay : بدء بث المقطع الفيديو المطلوب على دردشة الفيديو الخاصة بالقناة.
   /cplayforce أو /cvplayforce : إيقاف البث الجاري وبدء بث المقطع المطلوب.
   /channelplay [اسم المستخدم أو معرف المستخدم للدردشة] أو [تعطيل] : ربط القناة بمجموعة وبدء بث المقاطع باستخدام الأوامر المرسلة في المجموعة.


GBAN_MUSIC: |
   *ميزة الحظر العام [فقط للمشرفين العامين]:*
   
   /gban [اسم المستخدم أو الرد على مستخدم] : حظر الشخص الكاذب من جميع المحادثات التي تخدمها الروبوت ووضعه في قائمة المستخدمين المحظورين من استخدام الروبوت.
   /ungban [اسم المستخدم أو الرد على مستخدم] : إلغاء حظر المستخدمين المحظورين على الصعيدين العام والمحلي.
   /gbannedusers : عرض قائمة المستخدمين المحظورين على الصعيدين العام والمحلي.


LOOP_MUSIC: |
   *تكرار البث:*
   
   بدء بث البث الجاري بشكل متكرر
   
   /loop [تمكين/تعطيل] : تمكين/تعطيل التكرار للبث الجاري.
   /loop [1، 2، 3، ...] : تمكين التكرار للقيمة المعطاة.


MAINTAINANCE_MUSIC: |
   *وضع الصيانة [فقط للمشرفين العامين]:*
   
   /logs : الحصول على سجلات الروبوت.
   
   /logger [تمكين/تعطيل] : سيبدأ الروبوت في تسجيل الأنشطة التي حدثت على الروبوت.
   
   /maintenance [تمكين/تعطيل] : تمكين أو تعطيل وضع الصيانة للروبوت الخاص بك.


PING_MUSIC: |
   *Ping & Stats:*
   
   /mstart : بدء روبوت الموسيقى.
   /musichelp : الحصول على قائمة المساعدة مع شرح للأوامر.
   
   /ping : عرض معلومات الوقت والإحصائيات للروبوت.
   
   /stats : عرض الإحصائيات العامة للروبوت.


PLAY_MUSIC: |
   *أوامر التشغيل:*
   
   v تعني تشغيل الفيديو.
   force تعني تشغيل قوي.
    
   /play أو /vplay : بدء بث المقطع المطلوب على دردشة الفيديو.
   /playforce أو /vplayforce : إيقاف البث الجاري وبدء بث المقطع المطلوب.


SHUFFLE_MUSIC: |
   *خلط الطابور:*
   
   /shuffle : خلط الطابور.
   /queue : عرض الطابور المختلط.


SEEK_MUSIC: |
   *البحث في البث:*
   
   /seek [المدة بالثواني] : البحث في البث إلى المدة المعطاة.
   /seekback [المدة بالثواني] : البحث العكسي في البث إلى المدة المعطاة.


SONG_MUSIC: |
   *تنزيل الأغاني:*
   
   /song [اسم الأغنية/رابط YouTube] : تنزيل أي مقطع صوتي من YouTube بتنسيق MP3 أو MP4.
   

SPEED_MUSIC: |
   *أوامر السرعة:*
   
   يمكنك التحكم في سرعة التشغيل للبث الجاري. [للمسؤولين فقط]
   
   /speed أو /playback : لضبط سرعة التشغيل الصوتي في المجموعة.
   /cspeed أو /cplayback : لضبط سرعة التشغيل الصوتي في القناة.

