stickers_help: |
         ➥ /stickerid*:* reply to a sticker to me to tell you its file ID.
         ➥ /getsticker*:* reply to a sticker to me to upload its raw PNG file.
         ➥ /delstcker*:* reply to a sticker to delete it from the pack, I can delete what I made only.
         ➥ /kang*:* reply to sticker (animated/static/video) or image or gif to kang into your own pack.
         ➥ /stickers*:* Find stickers for given term on combot sticker catalogue


raid_help: |
  Ever had your group raided by spammers or bots?
  This module allows you to quickly stop the raiders
  By enabling *raid mode* I will automatically kick every user that tries to join
  When the raid is done you can toggle back lockgroup and everything will be back to normal.
  
   *Admins only!* 

  • /raid `(off/time optional)` : toggle the raid mode (on/off)
  if no time is given it will default to 2 hours then turn off automatically
  By enabling *raid mode* I will kick every user on joining the group.

  • /raidtime `(time optional)` : view or set the default duration for raid mode, after that time from toggling the raid mode will turn off automatically
  Default is 6 hours

  • /raidactiontime `(time optional)` : view or set the default duration that the raid mode will tempban
  Default is 1 hour


tagalert_help: |
  Too many mentions.. Cant you manage them all alone..
  Here is the solution
  If you are tagged/mentioned in a group where TotalSecurity is present
  TotalSecurity will notify it to you via private message after enabling tag alerts
  **Commands**
  - /tagalert `on` : Turn tag alerts on
  - /tagalert `off` : Turn tag alert off
  **Example:**
  If you are mentioned in a group TotalSecurity will tell you who mentioned you, 
  message that you are tagged in and which group is that.




topics_help: |
  Telegram introuduced new way of managing your chat called Forums(Topics)

  As a group management bot I have some useful commands to help you
  create, delete, close and reopen topics in your chat.
  ➥ /topicnew*:* Create new topic, requires topic name to create.
  ➥ /topicdel*:* Delete an existing topic, requires topic ID to delete.  
  ➥ /topicclose*:* Close an existing topic, requires topic ID to close.
  ➥ /topicopen*:* Open an already closed topic, requires topic ID to open.
  ➥ /setactiontopic*:* Set issuing topic for action messages such as welcome, goodbye, warns, bans,..etc
  ➥ /delactiontopic*:* Delete default topic for actions messages.



tools_help: |
