MUSIC_TEXT: |
   हेलो {},

   अधिक जानकारी के लिए नीचे बटन पर क्लिक करें। यदि आप किसी कमांड में कोई समस्या का सामना कर रहे हैं तो आप मेरे बॉट मालिक से संपर्क कर सकते हैं या समर्थन चैट में पूछ सकते हैं।

   *नोट ➨* संगीत बॉट और मॉड्यूलर समूह मैनेजमेंट बॉट समय-समय पर समय-समय पर एक ही सर्वर पर चलने के कारण कभी-कभी संगीत बॉट धीमा हो सकता है। चिंता न करें, यह एक अस्थायी समस्या है और हमारे डेवलपर्स और सर्वर प्रबंधकों द्वारा जल्द ही ठीक किया जाएगा।

   के साथ आनंद लें {}

   सभी कमांड्स का उपयोग किया जा सकता है: /

admin_help: |
   *कोई भी उपयोगकर्ता*
   ➥ /admins*:* चैट में व्यवस्थापकों की सूची

   *केवल व्यवस्थापक*
   ➥ /pin*:* संदेश को चुपचाप पिन करता है - 'लाउड' या 'नोटिफ़ाई' जोड़ने के लिए 'लाउड' या 'नोटिफ़ाई' जोड़ें
   ➥ /unpin*:* मौजूदा पिन किए गए संदेश को अनपिन करता है
   ➥ /unpinall*:* सभी पिन किए गए संदेश को अनपिन करता है, टॉपिक्स में भी काम करता है (केवल मालिक कर सकता है.)
   ➥ /del*:* वह संदेश हटा देता है जिसे आपने उत्तर दिया है
   ➥ /purge*:* उत्तर दिए गए संदेश और मौजूदा संदेश के बीच के सभी संदेशों को हटा देता है।
   ➥ /purge <integer X>*:* उत्तर दिए गए संदेश को हटा देता है, और उसके बाद X संदेशों को भी जोड़ता है, यदि किसी संदेश का उत्तर दिया गया है।
   ➥ /invitelink*:* इंवाइट लिंक प्राप्त करता है
   ➥ /promote*:* उत्तरदायिता को पदोन्नत करता है
   ➥ /demote*:* उत्तरदायिता को नीचे करता है
   ➥ /title <शीर्षक यहाँ> *:* एक व्यवस्थापक के लिए एक कस्टम शीर्षक सेट करता है जिसे बॉट ने पदोन्नत किया है
   ➥ /admincache*:* व्यवस्थापकों की सूची को फोर्स रिफ़्रेश करता है

   *समूह जुड़ने की अनुरोध*
   ➥ /approveall सभी लंबित शामिल हों *(अब नहीं)*
   ➥ /joinrequest `<हां|ऑन|सही/नहीं|बंद|गलत>` इसका सक्षम करने के लिए समूह जुड़ने का अनुरोध स्वीकृत करें
   ➥ /autoapprove `<हां|ऑन|सही/नहीं|बंद|गलत>` बॉट द्वारा स्वत: समूह जुड़ने का अनुरोध सक्षम करने के लिए
   *मास क्रिया उपकरण*
   ➥ /unbanall*:* समूह में प्रतिबंधित सभी सदस्यों को अनबैन करता है
   ➥ /unmuteall*:* समूह में प्रतिबंधित सभी सदस्यों को अनम्यूट करता है
   ➥ /banall*:* समूह में सभी सदस्यों को बैन करता है *(केवल समूह के मालिक इस कमांड का उपयोग करें)*
   ➥ /zombies*:* समूह में हटाए गए खातों की खोज शुरू करता है
   ➥ /zombies clean*:* समूह से हटाए गए खातों को हटा देता है
   ➥ /users*:* समूह के उपयोगकर्ताओं की सूची प्राप्त करता है

afk_help: |
   - /afk <कारण>: अपने आप को AFK (कीबोर्ड से दूर) मार्क करें।
   - brb <कारण>: यह एफकी कमांड के समान है - लेकिन यह कमांड नहीं है।
   एफकी के रूप में मार्क किए जाने पर किसी भी स्थानिक संदेश का उत्तर एक संदेश के साथ आता है कि आप उपलब्ध नहीं हैं!

anilist_help: |
    *एनीलिस्ट*
    इस मॉड्यूल की मदद से एनीमे, मैंगा या कैरेक्टर के बारे में जानकारी प्राप्त करें! सभी डेटा [एनीलिस्ट](anilist.co) से प्राप्त किया जाता है।
    *उपलब्ध कमांड:*
     - /anime <एनीमे>: एनीमे के बारे में जानकारी प्राप्त करता है।
     - /character <कैरेक्टर>: कैरेक्टर के बारे में जानकारी प्राप्त करता है।
     - /manga <मैंगा>: मैंगा के बारे में जानकारी प्राप्त करता है।

antiflood_help: |
     एंटीफ्लड आपको उन उपयोगकर्ताओं पर कार्रवाई करने की अनुमति देता है जो एक साथ x संदेशों को भेजते हैं। सेट फ्लड को अधिक करने पर उनको प्रतिबंधित कर दिया जाएगा।
     यह यूजर्स को 10 संदेशों से अधिक भेजने पर म्यूट करेगा, बॉट्स को अनदेखा करता है।
      ➥ /flood*:* मौजूदा फ्लड नियंत्रण सेटिंग प्राप्त करता है
     • *केवल व्यवस्थापक:*
     ➥ /setflood <int/'no'/'off'>*:* फ्लड नियंत्रण को सक्षम या अक्षम करता है
     *उदाहरण:* `/setflood 10`
     ➥ /setfloodmode <बैन/किक/म्यूट/टीबैन/टीम्यूट> <मूल्य>*:* जब उपयोगकर्ता ने फ्लड सीमा को पार किया है, तो क्रिया का प्रदर्शन करता है। बैन/किक/म्यूट/टीबैन/टीम्यूट
     • *नोट:*
     • टीबैन और टीम्यूट के लिए मूल्य भरना आवश्यक है!!
     यह हो सकता है:
     `5m` = 5 मिनट
     `6h` = 6 घंटे
     `3d` = 3 दिन
     `1w` = 1 सप्ताह

approve_help: |
     कभी-कभी, आपको एक उपयोगकर्ता पर अनचाहे सामग्री नहीं भेजने की आपकी भरोसा हो सकती है।
     शायद वो पर्याप्त है कि उन्हें व्यवस्थापक नहीं बनाया जाए, लेकिन आप उन्हें लॉक, ब्लैकलिस्ट और एंटीफ्लड लागू नहीं करने के लिए ठीक हो सकते हैं।
     इसके लिए मंजूरियां हैं - विश्वसनीय उपयोगकर्ताओं को अनुमति दें कि वे भेज सकते हैं
     *व्यवस्थापक कमांड:*
     ➥ /approval*:* वर्तमान चैट में एक उपयोगकर्ता की मंजूरी की स्थिति की जाँच करता है
     ➥ /approve*:* एक उपयोगकर्ता की मंजूरी देता है। अब उन पर लॉक, ब्लैकलिस्ट और एंटीफ्लड लागू नहीं होगा।
     ➥ /unapprove*:* एक उपयोगकर्ता की मंजूरी वापस लेता है। अब उन पर लॉक, ब्लैकलिस्ट और एंटीफ्लड होगा।
     ➥ /approved*:* सभी मंजूर उपयोगकर्ताओं की सूची
     ➥ /unapproveall*:* चैट में *सभी* उपयोगकर्ताओं को अनमंजूर करें। इसे पुनः सक्षम नहीं किया जा सकता है।

backup_help: |
    *केवल व्यवस्थापक:*
     ➥ /import: एक समूह बटलर बैकअप फ़ाइल का उत्तर दें और जितना हो सके उतना आयात करें, ट्रांसफर को सुपर सिंपल बनाने के लिए! ध्यान दें कि फ़ाइलों/फ़ोटो को टेलीग्राम की प्रतिबंधनों के कारण आयात नहीं किया जा सकता है।
     ➥ /export: समूह डेटा निर्यात करता है, जिसमें शामिल हैं: नियम, नोट (दस्तावेज, छवियाँ, संगीत, वीडियो, ऑडियो, वॉयस, पाठ, पाठ बटन)

bans_help: |
   *कोई भी उपयोगकर्ता*
    ➥ /kickme: उपयोगकर्ता को किक करता है जिन्होंने कमांड जारी किया है

   *केवल व्यवस्थापक:*
    ➥ /ban <उपयोगकर्ता हैंडल>: एक उपयोगकर्ता को प्रतिबंधित करता है। (हैंडल के माध्यम से, या उत्तर दें)
    ➥ /tban <उपयोगकर्ता हैंडल> x(m/h/d): x समय के लिए एक उपयोगकर्ता को प्रतिबंधित करता है। (हैंडल के माध्यम से, या उत्तर दें). m = मिनट, h = घंटा, d = दिन.
    ➥ /unban <उपयोगकर्ता हैंडल>: एक उपयोगकर्ता को अनबैन करता है। (हैंडल के माध्यम से, या उत्तर दें)
    ➥ /kick <उपयोगकर्ता हैंडल>: समूह से उपयोगकर्ता को किक करता है, (हैंडल के माध्यम से, या उत्तर दें)

blacklist_help: |
    ब्लैकलिस्ट का उपयोग समूह में कुछ ट्रिगर्स को कहने से रोकने के लिए किया जाता है। किसी भी समय जब ट्रिगर का उल्लेख किया जाता है, संदेश तुरंत हटा दिया जाएगा। इसे कई बार वार्न फ़िल्टर्स के साथ जोड़ने के लिए अच्छा होता है!

    *ध्यान दें*: ब्लैकलिस्ट समूह के व्यवस्थापकों को प्रभावित नहीं करती है।

     ➥ /blacklist*:* वर्तमान ब्लैकलिस्ट शब्दों को दिखाता है।

    केवल व्यवस्थापक:
     ➥ /addblacklist <ट्रिगर्स>*:* ब्लैकलिस्ट में एक ट्रिगर जोड़ता है। हर पंक्ति को एक ट्रिगर माना जाता है, इसलिए विभिन्न पंक्तियों का उपयोग करके आप एक साथ कई ट्रिगर जोड़ सकते हैं।
     ➥ /unblacklist <ट्रिगर्स>*:* ब्लैकलिस्ट से ट्रिगर को हटाता है। यहां भी समान न्यूलाइन लॉजिक लागू होता है, इसलिए आप एक साथ कई ट्रिगर हटा सकते हैं।
     ➥ /blacklistmode <off/del/warn/ban/kick/mute/tban/tmute>*:* किसी के द्वारा ब्लैकलिस्ट शब्दों को भेजने पर क्रिया का प्रदर्शन करता है।

cleaner_help: |
    ➥ /cleanbluetext <on/off/yes/no> - कमांड भेजने के बाद को साफ़ करता है
    ➥ /ignorecleanbluetext <शब्द> - कमांड को स्वचालित रूप से साफ़ करने से रोकता है
    ➥ /unignorecleanbluetext <शब्द> - कमांड को स्वचालित रूप से साफ़ करने की प्रतिबंध हटाता है
    ➥ /listcleanbluetext - वर्तमान में सफेद लिस्ट किए गए कमांड की सूची दिखाता है

connections_help: |
    ➥ /connect: एक चैट को कनेक्ट करें (एक समूह में /connect या पीएम में /connect <चैट आईडी> करके किया जा सकता है)
    ➥ /connection: कनेक्टेड चैट की सूची
    ➥ /disconnect: एक चैट से डिस्कनेक्ट करें
    ➥ /helpconnect: दूरस्थ रूप से किए जा सकने वाले उपलब्ध कमांडों की सूची दिखाता है

     *केवल व्यवस्थापक:*
    ➥ /allowconnect <हाँ/नहीं>: एक उपयोगकर्ता को एक चैट से कनेक्ट करने की अनुमति देता है

cust_filters_help: |
    ➥ /filters*:* चैट में उपयोग किए जाने वाले सभी सक्रिय फ़िल्टर की सूची।

     *केवल व्यवस्थापक:*
    ➥ /filter <कीवर्ड> <उत्तर संदेश>*:* इस चैट में एक फ़िल्टर जोड़ता है। अब जब 'कीवर्ड' का उल्लेख किया जाता है, बॉट तुरंत उस संदेश के साथ उत्तर देगा। यदि आप किसी स्टिकर का कीवर्ड के साथ उत्तर देते हैं, तो बॉट उस स्टिकर के साथ उत्तर देगा। ध्यान दें: सभी फ़िल्टर कीवर्ड होल्डर के रूप में हैं। यदि आप चाहें कि आपका कीवर्ड एक वाक्य हो, तो उद्धरण का उपयोग करें। उदाहरण: /filter "है वहाँ" कैसे हैं आप?
    ➥ /stop <फ़िल्टर कीवर्ड>*:* उस फ़िल्टर को रोक देता है।

     *चैट निर्माता केवल:*
    ➥ /removeallfilters*:* सभी चैट फ़िल्टर को एक साथ हटा देता है।

      *नोट*: फ़िल्टर्स मार्कडाउन फॉर्मेटर्स का समर्थन करते हैं, जैसे: {पहला}, {आखिरी} आदि.. और बटन्स।
        अधिक जानकारी के लिए /markdownhelp की जाँच करें!

disable_help: |
    हर किसी को बॉट के प्रस्तावित सभी विशेषताओं की आवश्यकता नहीं है। कुछ कमांड को अवपयोगणीय समझा जाता है, ताकि कोई उन्हें उपयोग न कर सके।
    यह आपको कुछ सामान्य उपयोग किए जाने वाले कमांडों को अक्षम करने की अनुमति देता है, ताकि कोई उन्हें उपयोग न कर सके। यह लोगों को ब्लूटेक्स्टिंग से रोकने के लिए भी उन्हें स्वचालित रूप से हटाने की अनुमति देता है।

     ➥ /cmds: अक्षम किए गए कमांडों की वर्तमान स्थिति की जाँच करें

     *केवल व्यवस्थापक:*
     ➥ /enable <कमांड नाम>: उस कमांड को सक्षम करें
     ➥ /disable <कमांड नाम>: उस कमांड को अक्षम करें
     ➥ /enablemodule <मॉड्यूल नाम>*:* उस मॉड्यूल में सभी कमांडों को सक्षम करें
     ➥ /disablemodule <मॉड्यूल नाम>*:* उस मॉड्यूल में सभी कमांडों को अक्षम करें
     ➥ /listcmds: सभी विशेष करने के योग्य कमांडों की सूची बनाता है



download_help: |
     अधिकांश साइटों से फ़ाइलें डाउनलोड करना आसान बनाएं!
     
     *उपयोग:*
     ➥ /download [url] - URL से फ़ाइल डाउनलोड करें (केवल सुडो)
     ➥ /download [reply_to_TG_File] - TG फ़ाइल डाउनलोड करें
     ➥ /telegraph [reply_to_TG_File] - TG फ़ाइल डाउनलोड करें
     ➥ /tiktokdl [link] - TikTok वीडियो डाउनलोड करें, त्रुटि होने पर ytdown कमांड का प्रयास करें।
     ➥ /fbdl [link] - Facebook वीडियो डाउनलोड करें
     ➥ /anon [link] - फ़ाइलें Anonfiles पर अपलोड करें
     ➥ /ytdl [YT-DLP समर्थित URL] - YT-DLP समर्थित वीडियो और ऑडियो डाउनलोड करें
     ➥ /song [URL या क्वेरी] - YouTube से गाना डाउनलोड करें
     ➥ /video [URL या क्वेरी] - YouTube से वीडियो डाउनलोड करें


extra_help: |
    *Carbon*
    /carbon *:* दिए गए या उत्तरदायित पाठ को कार्बन बनाएं

    *जोड़दार*
    ➥ /couples *:* 2 उपयोगकर्ताओं को चुनें और उनका नाम अपने चैट में जोड़दार के रूप में भेजें।

    *गुंजा*
    ➥ /echo *:* एक पाठ का उत्तर दें

    *इमोजी खेल*
    *इमोजी के साथ खेलें:*
    ➥ /dice या /dice 1 से 6 कोई भी मूल्य - कुछ भी मैजिक हो जाएगा
    ➥ /ball या /ball 1 से 5 कोई भी मूल्य - कुछ भी मैजिक हो जाएगा
    ➥ /dart या /dart 1 से 6 कोई भी मूल्य - कुछ भी मैजिक हो जाएगा
     *उपयोग:* हहहह, सिर्फ जादू है।
     *चेतावनी:* आपको उल्लिखित मूल्य के अलावा कुछ अन्य मूल्य दर्ज करने पर समस्या हो सकती है।

    *मार्कडाउन:*
    ➥ /markdownhelp*:* टेलीग्राम में मार्कडाउन कैसे काम करता है का त्वरित सारांश - केवल निजी चैट में कहा जा सकता है

    *Mamefy*
    ➥ /mmf <पाठ>*:* उत्तरदायित स्टिकर में पाठ जोड़ें

    *मजाक:*
    ➥ /horny *:* अपनी वर्तमान यौन इच्छाओं की जाँच करें
    ➥ /gay *:* अपनी वर्तमान गेनडर की जाँच करें
    ➥ /lezbian *:* अपनी वर्तमान लेस्बियन इच्छाओं की जाँच करें
    ➥ /boob *:* अपनी वर्तमान स्तन का आकार जाँचें
    ➥ /cute *:* अपनी वर्तमान मीठापन की जाँच करें

    *प्रतिक्रिया:*
    ➥ /react*:* एक यादृच्छिक प्रतिक्रिया के साथ प्रतिक्रिया करता है

    *सभी को टैग/उल्लिखित करें*
    ➥ /tagall या @all '(एक संदेश का उत्तर दें या एक और संदेश जोड़ें) - अपने समूह में सभी सदस्यों को बिना छोड़े उल्लिखित करने के लिए।

    *QuoteLy*
    ➥ /q - संदेश को उद्धृत करने के लिए।
    ➥ /q [पूर्णांक] - 1 से अधिक संदेशों को उद्धृत करने के लिए।
    ➥ /q r - उसके उत्तर के साथ एक संदेश को उद्धृत करने के लिए
    ➥ /q r [पूर्णांक] - 1 से अधिक उत्तर संदेशों को उद्धृत करने के लिए

feds_help: |
    सब कुछ मजेदार होता है, जब एक स्पैमर आपके समूह में प्रवेश करने लगता है, और आपको उसे ब्लॉक करना होता है। फिर आपको और भी बहुत सारे समूहों में और बहुत सारे बैन करने का काम शुरू करना पड़ता है, और यह दर्द होता है। लेकिन फिर आपके पास कई समूह होते हैं, और आप नहीं चाहते कि यह स्पैमर आपके किसी भी समूह में हो - आप कैसे निपटेंगे? क्या आपको अपने सभी समूहों में उसे मैन्युअल रूप से ब्लॉक करना होगा?
    *अब नहीं!* फेडरेशन के साथ, आप एक चैट में किए गए बैन को सभी अन्य चैटों में ओवरलैप करा सकते हैं।
    आप यहां तक कि फेडरेशन व्यवस्थापकों को भी निर्धारित कर सकते हैं, ताकि आपके विश्वसनीय व्यवस्थापक स्पैमरों को सभी चैटों से बैन कर सकें।
    
    *कमांड:*
    फेड्स अब आपकी सुविधा के लिए 3 खंडों में बाँटे गए हैं।
    ➥ /fedownerhelp*:* फेडरेशन बनाने और मालिक केवल कमांड्स के लिए सहायता प्रदान करता है
    ➥ /fedadminhelp*:* फेड्रेशन प्रशासन कमांड्स के लिए सहायता प्रदान करता है
    ➥ /feduserhelp*:* किसी भी व्यक्ति के द्वारा प्रयोग किए जाने वाले कमांड्स के लिए सहायता प्रदान करता है

FED_OWNER_HELP: | 
    *केवल फेडरेशन मालिक:*
    ➥ /newfed <fed_name>*:* एक फेडरेशन बनाएं, प्रति उपयोगकर्ता केवल एक अनुमति है
    ➥ /renamefed <fed_id> <new_fed_name>*:* फेड आईडी को एक नए नाम पर बदलें
    ➥ /delfed <fed_id>*:* एक फेडरेशन को हटाएं, और इससे संबंधित किसी भी जानकारी को हटाने का निर्णय लें। ब्लॉक किए गए उपयोगकर्ताओं को रद्द नहीं किया जाएगा
    ➥ /fpromote <user>*:* उपयोगकर्ता को फेडरेशन व्यवस्थापक के रूप में नियुक्त करें। उपयोगकर्ता के लिए `फेड एडमिन्स` के तहत सभी कमांड्स सक्षम हो जाएंगे
    ➥ /fdemote <user>*:* उपयोगकर्ता को एक सामान्य उपयोगकर्ता से एक फेडरेशन व्यवस्थापक के रूप में ड्रॉप करें
    ➥ /subfed <fed_id>*:* दिए गए फेड आईडी की सदस्यता लें, उस सदस्यता लेंे वाली फेड से बैन होने के साथ होगा
    ➥ /unsubfed <fed_id>*:* दिए गए फेड आईडी की सदस्यता न लें
    ➥ /setfedlog <fed_id>*:* समूह को फेडरेशन के लिए एक फेड लॉग रिपोर्ट बेस के रूप में सेट करें
    ➥ /unsetfedlog <fed_id>*:* समूह को फेडरेशन के लिए एक फेड लॉग रिपोर्ट बेस से हटा दें
    ➥ /fbroadcast <message>*:* सभी समूहों को एक संदेश प्रसारित करें जिन्होंने आपके फेडरेशन में शामिल हो गए हैं
    ➥ /fedsubs*:* आपके समूह की ग्रंथियों के लिए दिखाता है कि वे किस फेड में सदस्यता लेंगी `(अभी तोड़ा हुआ है)`

FED_ADMIN_HELP: |
    *फेडरेशन व्यवस्थापक:*
    ➥ /fban <user> <reason>*:* फेडरेशन बैन उपयोगकर्ता
    ➥ /unfban <user> <reason>*:* फेडरेशन बैन से उपयोगकर्ता को हटाएं
    ➥ /fedinfo <fed_id>*:* निर्दिष्ट फेडरेशन के बारे में जानकारी
    ➥ /joinfed <fed_id>*:* मौजूदा चैट को फेडरेशन में शामिल करें। केवल चैट के मालिक ही इसे कर सकते हैं। हर चैट केवल एक फेडरेशन में हो सकता है
    ➥ /leavefed <fed_id>*:* दिए गए फेडरेशन से बाहर निकलें। केवल चैट के मालिक ही इसे कर सकते हैं
    ➥ /setfrules <rules>*:* फेडरेशन नियम तैयार करें
    ➥ /fedadmins*:* फेडरेशन व्यवस्थापक दिखाएं
    ➥ /fbanlist*:* वे सभी उपयोगकर्ता दिखाता है जिन्होंने फेडरेशन को इस समय शिकार किया है
    ➥ /fedchats *:* मौजूदा चैट्स को जानें जो फेडरेशन में जुड़े हुए हैं

FED_USER_HELP: | 
    *कोई भी उपयोगकर्ता:*
    ➥ /fbanstat*:* दिखाता है कि क्या आप/आप जिसे उत्तर दे रहे हैं या उनका उपयोगकर्ता नाम कहीं कुछ है या नहीं
    ➥ /fednotif <on/off>*:* फेडरेशन सेटिंग्स प्राइवेट में नहीं जब उपयोगकर्ता जो फेड बैन हैं/अनफेड बैन होते हैं
    ➥ /frules*:* फेडरेशन विधियाँ देखें


formt_help_bse: |
     क्यूटी आपके संदेशों को अधिक अभिव्यंजक बनाने के लिए बड़ी संख्या में फ़ॉर्मेटिंग विकल्पों का समर्थन करता है। नज़र रखना!



force_subscribe: |
     - @MissCutieRobot उन सदस्यों को तब तक म्यूट कर सकता है, जिन्होंने आपके चैनल की सदस्यता नहीं ली है, जब तक कि वे सदस्यता न ले लें।
     - सक्षम होने पर, मैं सदस्यता समाप्त करने वाले सदस्यों को म्यूट कर दूंगा और उन्हें एक अनम्यूट बटन दिखाऊंगा। जब वे बटन दबाएंगे, तो मैं उन्हें अनम्यूट कर दूंगा।

     *स्थापित करना*
     1) सबसे पहले, मुझे बैन यूजर्स की अनुमति के साथ ग्रुप में एडमिन के रूप में जोड़ें और चैनल में भी एडमिन के रूप में जोड़ें।
     ध्यान दें: केवल समूह का निर्माता ही मुझे सेट कर सकता है, और यदि ऐसा नहीं किया गया तो मैं दोबारा सदस्यता लेने की अनुमति नहीं दूंगा।

     *आदेश*
     ➥ /forcesubscribe: वर्तमान सेटिंग्स प्राप्त करें।
     ➥ /forcesubscribe <no/off/disable>: ForceSubscribe बंद करें।
     ➥ /forcesubscribe <चैनल उपयोगकर्ता नाम>: चैनल चालू करें और सेट करें।
     ➥ /forcesubscribe clear: उन सभी सदस्यों को अनम्यूट करें जिन्हें मैंने म्यूट किया है।

     नोट /forcesub /forcesubscribe का उपनाम है।


google_search: |
     *गूगल खोज*
     ➥ /google <text>*:* Google पर खोज करें
     ➥ /img <text>*:* छवियों के लिए Google खोजें और उन्हें लौटाएं\nअधिक संख्या के लिए। परिणामों में लिम निर्दिष्ट करें, उदाहरण के लिए: `/img हैलो lim=10`
     ➥ /app <ऐपनाम>*:* प्ले स्टोर में एक ऐप खोजता है और उसका विवरण देता है।
     ➥ /reverse |पीपी |जीआरएस: जिस मीडिया को इसका उत्तर दिया गया था, उसकी रिवर्स इमेज सर्च करता है।

     *गूगल ट्रांसलेट*
     ➥ किसी लंबे संदेश के उत्तर के रूप में `/tr` या `/tl` (भाषा कोड)।
     *उदाहरण:*
     ➥ `/tr en`*:* किसी चीज़ का अंग्रेजी में अनुवाद करता है
     ➥ `/tr hi-en`*:* हिंदी से अंग्रेजी में अनुवाद करता है



md_help: |
     <b>मार्कडाउन फ़ॉर्मेटिंग</b>
       आप *बोल्ड*, _इटैलिक_, -अंडरलाइन-, और भी बहुत कुछ का उपयोग करके अपने संदेश को प्रारूपित कर सकते हैं। आगे बढ़ें और प्रयोग करें!
       <b>समर्थित मार्कडाउन</b>:
       - <कोड>`कोड शब्द`</कोड>: बैकटिक्स का उपयोग मोनोस्पेस फ़ॉन्ट के लिए किया जाता है। इस प्रकार दिखाता है: <कोड>कोड शब्द</कोड>।
       - <कोड>_इटैलिक शब्द_</कोड>: इटैलिक फ़ॉन्ट के लिए अंडरस्कोर का उपयोग किया जाता है। इस प्रकार दिखाता है: <i>इटैलिक शब्द</i>।
       - <कोड>*बोल्ड शब्द*</कोड>: तारांकन का उपयोग बोल्ड फ़ॉन्ट के लिए किया जाता है। इस प्रकार दिखाता है: <b>बोल्ड शब्द</b>।
       - <कोड>~स्ट्राइकथ्रू~</कोड>: स्ट्राइकथ्रू के लिए टिल्ड का उपयोग किया जाता है। इस प्रकार दिखाता है: <स्ट्राइक>स्ट्राइकथ्रू</स्ट्राइक>।
       - <कोड>[हाइपरलिंक](example.com)</code>: यह हाइपरलिंक के लिए उपयोग किया जाने वाला फ़ॉर्मेटिंग है। इस प्रकार दिखाता है: <a href='https://example.com/'>हाइपरलिंक</a>।
       - <code>[My Button](buttonurl://example.com)</code>: यह बटन बनाने के लिए उपयोग किया जाने वाला फ़ॉर्मेटिंग है। यह उदाहरण "माई बटन" नामक एक बटन बनाएगा जो क्लिक करने पर <code>example.com</code> खुलता है।
       यदि आप एक ही पंक्ति पर बटन भेजना चाहते हैं, तो <code>:same</code> फ़ॉर्मेटिंग का उपयोग करें।
       <b>उदाहरण:</b>
       <कोड>[बटन 1](बटनurl://example.com)</कोड>
       <कोड>[बटन 2](बटनurl://example.com:वही)</कोड>
       <कोड>[बटन 3](बटनurl://example.com)</कोड>
       यह बटन 1 और 2 को एक ही पंक्ति में दिखाएगा, जिसके नीचे 3 होगा।
filling_help: |
       <b>भराव</b>
       आप प्रासंगिक डेटा के साथ अपने संदेश की सामग्री को भी अनुकूलित कर सकते हैं। उदाहरण के लिए, आप स्वागत संदेश में किसी उपयोगकर्ता का नाम लेकर उल्लेख कर सकते हैं, या फ़िल्टर में उनका उल्लेख कर सकते हैं!
       आप नोट्स में किसी उपयोगकर्ता का उल्लेख करने के लिए भी इनका उपयोग कर सकते हैं!
       <b>समर्थित भरण:</b>
       - <कोड>{पहला}</कोड>: उपयोगकर्ता का पहला नाम।
       - <कोड>{अंतिम}</कोड>: उपयोगकर्ता का अंतिम नाम।
       - <कोड>{पूर्णनाम}</कोड>: उपयोगकर्ता का पूरा नाम।
       - <कोड>{उपयोगकर्ता नाम}</कोड>: उपयोगकर्ता का उपयोगकर्ता नाम. यदि उनके पास कोई नहीं है, तो इसके बजाय उपयोगकर्ता का उल्लेख करें।
       - <कोड>{उल्लेख}</कोड>: उपयोगकर्ता का उनके प्रथम नाम के साथ उल्लेख करता है।
       - <कोड>{आईडी}</कोड>: उपयोगकर्ता की आईडी।
       - <कोड>{चैटनाम}</कोड>: चैट का नाम.

fun_help: |
      ➥ /runs: उत्तरों की एक श्रृंखला से एक यादृच्छिक स्ट्रिंग का उत्तर दें।
      ➥ /pat: किसी व्यक्ति को थपथपाएं, प्यारे लोगों के लिए अच्छी चीज़:3
      ➥ /slap: किसी उपयोगकर्ता को थप्पड़ मारना, या जवाब न मिलने पर थप्पड़ खाना।
      ➥ /shrug उचकाना : कंधे उचकाना XD.
      ➥ /table : फ्लिप/अनफ्लिप करें :v.
      ➥ /decide : बेतरतीब ढंग से हां/नहीं/शायद उत्तर दें
      ➥ /toss : एक सिक्का उछालता है
      ➥ /roll : एक पासा पलटें।
      ➥ /rlg : कान, नाक, मुंह को जोड़ें और एक इमो बनाएं ;-;
      ➥ /shot <कीवर्ड>: कुछ भी लिखें जिसे आप ज़ोर से चिल्लाना चाहते हैं।
      ➥ /stickerid: स्टिकर की आईडी प्राप्त करने के लिए उसका उत्तर दें।
      ➥ /getsticker: कच्ची पीएनजी छवि प्राप्त करने के लिए स्टिकर का उत्तर दें।
      ➥ /steal: किसी स्टिकर या छवि को अपने पैक में जोड़ने के लिए उसका उत्तर दें।

antispam_help: |
     *केवल व्यवस्थापक:*
      • `/antispam <on/off/yes/no>`*:* हमारे एंटीस्पैम तकनीक को टॉगल करेगा या आपकी वर्तमान सेटिंग्स दिखाएगा।

     एंटी-स्पैम, बॉट डेवलपर्स द्वारा इस्तेमाल किया जाता है ताकि सभी समूहों में स्पैमर्स को बैन किया जा सके। यह आपकी सुरक्षा करने में मदद करता है
     और स्पैम फ्लडर्स को जितनी जल्दी हो सके हटाता है।
     *नोट:* उपयोगकर्ताएँ जीबैंड करने या स्पैमर्स की शिकायत करने के लिए @YorkTownEagleUnion पर अपील कर सकती हैं।

     क्यूटी आपके चैटरूम से संवादित करने के लिए @Spamwatch API को भी शामिल करती है, ताकि संवादों से स्पैमर्स को हटाया जा सके!
     *स्पैमवॉच क्या है?*
     स्पैमवॉच एक बड़े और निरंतर अपडेट होते बैन-सूची का पालन करता है, जिसमें स्पैमबॉट्स, ट्रोल्स, बिटकॉइन स्पैमर्स और अयशस्वी व्यक्तियों को शामिल किया जाता है।
     स्पैमर्स को आपके समूह से स्वच्छ करने में सहायक रूप से मदद करता है।
     *नोट:* उपयोगकर्ताएँ @SpamwatchSupport पर स्पैमवॉच बैन की अपील कर सकती हैं।

locks_help: |
     क्या स्टिकर्स आपको परेशान करते हैं? या लोगों को लिंक या चित्र साझा करने से बचना चाहते हैं? 
     आप सही जगह पर हैं!
     लॉक्स मॉड्यूल आपको टेलीग्राम दुनिया में कुछ सामान्य आइटम्स को लॉक करने की अनुमति देता है,
     बॉट स्वच्छता क्रियाएँ वे आपके लिए स्वच्छता से हटा देंगे!

      • `/locktypes`*:* सभी संभावित लॉक प्रकारों की सूची देता है

      *केवल व्यवस्थापक:*
      • `/lock <type>`*:* किसी प्रकार की आइटम को लॉक करें (व्यक्तिगत में उपलब्ध नहीं है)
      • `/unlock <type>`*:* किसी प्रकार को अनलॉक करें (व्यक्तिगत में उपलब्ध नहीं है)
      • `/locks`*:* इस चैट में मौजूद लॉक की वर्तमान सूची।

     लॉक्स का उपयोग एक समूह के उपयोगकर्ताओं को प्रतिबंधित करने के लिए किया जा सकता है।
     उदाहरण:
     URL को लॉक करने से सभी URL वाले संदेश स्वच्छता से हटा दिए जाएंगे, स्टिकर्स को लॉक करने से सभी
     गैर-व्यवस्थापक उपयोगकर्ताएँ स्टिकर भेजने से रोकी जाएगी, आदि।
     बॉट्स को लॉक करने से गैर-व्यवस्थापक उपयोगकर्ताएँ चैट में बॉट जोड़ने से रुकी जाएगी।

     *नोट:*
      • अनलॉक अनुमति *जानकारी* देगा कि सदस्य (गैर-व्यवस्थापक) ग्रुप जानकारी, जैसे विवरण या समूह का नाम, बदल सकते हैं
      • अनलॉक अनुमति *पिन* देगा कि सदस्य (गैर-व्यवस्थापक) एक समूह में एक संदेश को पिन कर सकते हैं

log_help: |
      *केवल व्यवस्थापक:*
      ➥ /logchannel*:* लॉग चैनल की जानकारी प्राप्त करें
      ➥ /setlog*:* लॉग चैनल को सेट करें।
      ➥ /unsetlog*:* लॉग चैनल को अनसेट करें।
      ➥ /announce*:* चैटरूम में प्रशासक क्रियाओं की घोषणा करने के लिए सेटिंग टॉगल करें।

      लॉग चैनल सेट करने के लिए:
      • बॉट को वांछित चैनल में जोड़ें (एक व्यवस्थापक के रूप में!)
      • चैनल में `/setlog` भेजें
      • ग्रुप में `/setlog` को फॉरवर्ड करें

markdown_help_text: |
      मार्कडाउन एक बहुत ही शक्तिशाली फॉर्मेटिंग टूल है जिसे टेलीग्राम समर्थित करता है। क्यूटी में कुछ एन्हांसमेंट्स हैं, ताकि सुनिश्चित किया जा सके कि
      सहेजे गए संदेश सही रूप से पार्स होते हैं, और आपको बटन बनाने की अनुमति देता है।

      - <code>_italic_</code>: '_' के साथ टेक्स्ट लपेटने से इटैलिक टेक्स्ट बनेगा
      - <code>*bold*</code>: '*' के साथ टेक्स्ट लपेटने से बोल्ड टेक्स्ट बनेगा
      - <code>`code`</code>: '`' के साथ टेक्स्ट लपेटने से मोनोस्पेस्ड टेक्स्ट, जिसे 'कोड' भी कहा जाता है, बनेगा
      - <code>[sometext](someURL)</code>: इससे एक लिंक बनेगा - संदेश में केवल <code>sometext</code> दिखाई देगा,
      और उस पर टैप करने पर <code>someURL</code> का पृष्ठ खुलेगा।
      उदाहरण: <code>[test](example.com)</code>

      - <code>[buttontext](buttonurl:someURL)</code>: यह एक खास एन्हांसमेंट है जो उपयोगकर्ताओं को उनके मार्कडाउन में टेलीग्राम बटन बनाने की अनुमति देता है। <code>buttontext</code> वह होगा जो बटन पर दिखाई देता है, और <code>someurl</code>
      वह URL होगा जो खुलता है।
      उदाहरण: <code>[This is a button](buttonurl:example.com)</code>

      यदि आप एक ही पंक्ति पर कई बटन चाहते हैं, तो :same का उपयोग करें, इस प्रकार:
      <code>[one](buttonurl://example.com)
      [two](buttonurl://google.com:same)</code>
      इससे एक ही पंक्ति पर दो बटन बनेंगे, बजाय एक पंक्ति प्रति बटन की।

      ध्यान दें कि आपका संदेश केवल एक बटन के अलावा कुछ पाठ होना चाहिए!

muting_help: |
       *केवल व्यवस्थापक:*
       • `/mute <userhandle>`*:* एक उपयोगकर्ता को चुप कर देता है। उपयोगकर्ता के उपयोगकर्ता के रूप में या उपयोगकर्ता के जवाब में भी इस्तेमाल किया जा सकता है।
       • `/tmute <userhandle> x(m/h/d)`*:* एक उपयोगकर्ता को x समय के लिए चुप कर देता है। (हैंडल के माध्यम से या उत्तर देने के रूप में)। `m` = `मिनट्स`, `h` = `घंटे`, `d` = `दिन`।
       • `/unmute <userhandle>`*:* एक उपयोगकर्ता को चुपी से बाहर करता है। उपयोगकर्ता के उपयोगकर्ता के रूप में या उपयोगकर्ता के जवाब में भी इस्तेमाल किया जा सकता है।



moderators_help: |
       कभी-कभी, आप विश्वास नहीं करते हैं, लेकिन अपने समूह के प्रबंधक को बनाना चाहते हैं, तो आप उसे मॉडरेटर बना सकते हैं।
       शायद उन्हें व्यवस्थापक बनाने के लिए पर्याप्त नहीं हो सकता है, लेकिन आप उन्हें प्रतिबंध, म्यूट, और चेतावनी करने की अनुमति देने के साथ संतुष्ट हो सकते हैं।
       यही हैं मॉडचेक - विश्वसनीय उपयोगकर्ताओं के मॉडरेटर को समूह को प्रबंधन करने की अनुमति देने के लिए।

       *कमांड्स*
       ➥ /addmod *:* एक उपयोगकर्ता के मॉडरेटर का चयन करें। 
       ➥ /rmmod *:* एक उपयोगकर्ता के मॉडरेटर को हटाएं।
       ➥ /modcheck *:* एक उपयोगकर्ता की मॉडरेशन जाँच करें।
       ➥ /modlist *:* मॉडरेशन उपयोगकर्ता सूची।

nightmode_help: |
       *केवल व्यवस्थापकों के लिए*
       ➥ /nightmode: समूह को नाइट मोड चैट में जोड़ता है।
       ➥ /rmnight: समूह को नाइट मोड चैट से हटाता है।

       *नोट:* नाइट मोड चैट आवाज स्पैम से बचाने के लिए स्वचालित रूप से रात 12 बजे (IST) को बंद हो जाते हैं और स्वचालित रूप से सुबह 6 बजे (IST) को खुल जाते हैं।

notes_help: |
       • `/get <notename>`*:* इस notename के साथ नोट प्राप्त करें
       • `#<notename>`*:* /get के समान
       • `/notes` या `/saved`*:* इस चैट में सभी सहेजे गए नोटों की सूची
       • `/number` *:* सूची में उस संख्या का नोट निकालें। यदि आप किसी नोट की सामग्री को किसी भी स्वरूप में प्राप्त करना चाहते हैं, तो `/get <notename> noformat` का उपयोग करें। यह जब किसी मौजूदा नोट को अपडेट करते समय उपयोगी हो सकता है।

        *केवल व्यवस्थापकों के लिए:*
       • `/save <notename> <notedata>`*:* notename के नाम से नोटडेटा को नोट के रूप में सहेजता है
        एक बटन को सामान्य मार्कडाउन लिंक विधि का उपयोग करके नोट में जोड़ा जा सकता है - लिंक को बस `buttonurl:` खण्ड के साथ पूर्व रूप से जोड़ा जाना चाहिए, जैसे: `[somelink](buttonurl:example.com)`। अधिक जानकारी के लिए `/markdownhelp` की जाँच करें।
       • `/save <notename>`*:* जवाब दिए गए संदेश को एक नोट के रूप में सहेजता है
       • `/clear <notename>`*:* इस नाम के नोट को साफ करें
       • `/removeallnotes`*:* समूह से सभी नोट हटा देता है
       *नोट:* नोट नामों का अक्षर-मूढ़ नहीं होता है, और उन्हें सहेजने से पहले स्वचालित रूप से छोटे अक्षर में बदल दिया जाता है।

purge_help: |
       *केवल व्यवस्थापक:*
        • /del: आपके द्वारा जवाब दिए गए संदेश को हटाता है
        • /purge: इस और जवाब दिए गए संदेश के बीच के सभी संदेशों को हटाता है।
        • /purge <integer X>: जवाब दिए गए संदेश को हटाता है, और उसके बाद के X संदेशों को भी हटाता है, अगर किसी संदेश का जवाब दिया गया है।

reports_help: |
        • `/report <reason>`*:* इसे व्यवस्थापकों को रिपोर्ट करने के लिए एक संदेश के जवाब में उपयोग करें।
        • `@admin`*:* इसे व्यवस्थापकों को रिपोर्ट करने के लिए एक संदेश के जवाब में उपयोग करें।
         *ध्यान दें:* इनमें से कोई भी व्यवस्थापकों द्वारा उपयोग किया जाए, तो ये क्रिया क्रियान्वित नहीं होगी।

         *केवल व्यवस्थापकों के लिए:*
          • `/reports <on/off>`*:* रिपोर्ट सेटिंग बदलें, या वर्तमान स्थिति देखें।
          • यदि इसे व्यक्तिगत संदेश में किया गया है, तो आपकी स्थिति को टॉगल करें।
          • यदि समूह में है, तो उस समूह की स्थिति को टॉगल करें।

rules_help: |
      ➥ /rules*:* इस चैट के नियम प्राप्त करें।
       *केवल व्यवस्थापकों के लिए:*
      ➥ /setrules <your rules here>*:* इस चैट के नियम सेट करें।
      ➥ /clearrules*:* इस चैट के नियमों को साफ करें।

userinfo_help: |
      - /setbio <text>: जवाब देते समय, एक दूसरे उपयोगकर्ता का बायो सहेजेंगे
      - /bio: आपका या दूसरे उपयोगकर्ता का बायो प्राप्त करें। यह खुद द्वारा सेट नहीं किया जा सकता।
      - /setme <text>: अपनी जानकारी सेट करें
      - /me: आपका या दूसरे उपयोगकर्ता की जानकारी प्राप्त करें

warns_help: |
      ➥ /warns <userhandle>*:* एक उपयोगकर्ता की चेतावनियों की संख्या और कारण प्राप्त करें।
      ➥ /warnlist*:* सभी मौजूदा चेतावनी फ़िल्टरों की सूची

      *केवल व्यवस्थापकों के लिए:*
      ➥ /warn <userhandle>*:* एक उपयोगकर्ता को चेतावनी दें। 3 चेतावनियों के बाद, उपयोगकर्ता को समूह से निष्क्रिय कर दिया जाएगा। यह एक उत्तर देने के रूप में भी उपयोग किया जा सकता है।
      ➥ /resetwarn <userhandle>*:* एक उपयोगकर्ता की चेतावनियों को रीसेट करें। यह एक उत्तर देने के रूप में भी उपयोग किया जा सकता है।
      ➥ /addwarn <keyword> <reply message>*:* किसी विशिष्ट कीवर्ड पर एक चेतावनी फ़िल्टर सेट करें। यदि आप अपने कीवर्ड को एक वाक्य में बनाना चाहते हैं, तो इसे उद्धरण के साथ घेर दें, जैसे: `/addwarn "बहुत गुस्सा" यह एक गुस्से वाले उपयोगकर्ता है`।
      ➥ /nowarn <keyword>*:* चेतावनी फ़िल्टर को बंद करें
      ➥ /warnlimit <num>*:* चेतावनी सीमा सेट करें
      ➥ /strongwarn <on/yes/off/no>*:* यदि इसे चालित किया जाता है, तो चेतावनी सीमा को पार करने पर उपयोगकर्ता को निष्क्रिय कर दिया जाएगा। अन्यथा, केवल किक किया जाएगा।

greetings_help: |
       *केवल एडमिन:*
       ➥ /welcome <चालू/बंद>*:* स्वागत संदेश को सक्षम/अक्षम करें।
       ➥ /welcome*:* वर्तमान स्वागत सेटिंग्स दिखाता है।
       ➥ /welcome noformat*:* वर्तमान स्वागत सेटिंग्स दिखाता है, स्वरूपण के बिना - आपके स्वागत संदेश को पुनः प्रयोग करने के लिए उपयोगी!
       ➥ /goodbye*:* `/welcome` के तरीके और तथा उनके उपयोग के समान उपयोग और तथा तार्किक विवादों के बारे में जानकारी देता है।
       ➥ /setwelcome <कुछ_टेक्स्ट>*:* कस्टम स्वागत संदेश सेट करें। यदि मीडिया को जवाब देने के रूप में प्रयोग किया जाता है, तो उस मीडिया का उपयोग करता है।
       ➥ /setgoodbye <कुछ_टेक्स्ट>*:* कस्टम विदाई संदेश सेट करें। यदि मीडिया को जवाब देने के रूप में प्रयोग किया जाता है, तो उस मीडिया का उपयोग करता है।
       ➥ /resetwelcome*:* डिफ़ॉल्ट स्वागत संदेश पर रीसेट करें।
       ➥ /resetgoodbye*:* डिफ़ॉल्ट विदाई संदेश पर रीसेट करें।
       ➥ /cleanwelcome <चालू/बंद>*:* नए सदस्य पर, चैट को स्पैम करने से बचाने के लिए पिछले स्वागत संदेश को हटाने का प्रयास करें।
       ➥ /welcomemutehelp*:* स्वागत म्यूट्स के बारे में जानकारी प्रदान करता है।
       ➥ /cleanservice <चालू/बंद*:* टेलीग्राम के स्वागत/विदाई सेवा संदेशों को हटा देता है।
       *उदाहरण:*
       उपयोगकर्ता चैट में शामिल हुआ, उपयोगकर्ता चैट से बाहर गया।

       *स्वागत मार्कडाउन:*
       ➥ `/welcomehelp*:* कस्टम स्वागत/विदाई संदेशों के लिए और ज्यादा स्वरूपण जानकारी देखें।

nation_help: |
      - /eagle - सभी ईगल संघ के सदस्यों की सूची।
      - /royals - सभी रॉयल नेशंस की सूची।
      - /sakuras - सभी सकुरा नेशंस की सूची।
      - /sardegnas - सभी सार्डिनिया नेशंस की सूची।
      - /neptunians - सभी नेपटूनिया नेशंस की सूची।
      नोट: ये कमांड्स विशेष बॉट विशेषाधिकारों वाले उपयोगकर्ताओं द्वारा ही प्रयोग किए जा सकते हैं।
      आप @YorktownEagleUnion पर इनके बारे में और जानकारी प्राप्त कर सकते हैं।

sticker_blacklist_help: |
       **केवल एडमिन:**
         ➥ /addblsticker <स्टिकर लिंक>**:** ब्लैकलिस्ट स्टिकर ट्रिगर को जोड़ें। स्टिकर का उत्तरदायी हो सकता है
         ➥ /unblsticker <स्टिकर लिंक>**:** ब्लैकलिस्ट से ट्रिगर हटाएं। यहां समान न्यूलाइन लॉजिक लागू होता है, तो आप एक साथ कई ट्रिगर हटा सकते हैं
         ➥ /rmblsticker <स्टिकर लिंक>**:** ऊपर जैसा है
         ➥ /blstickermode <हटाना/प्रतिबंध/टेम्पबैन/म्यूट/टेम्पम्यूट>**:** कालिक कार्रवाई को कैसे करना है, यदि उपयोगकर्ता ब्लैकलिस्ट स्टिकर्स का उपयोग करते हैं
       नोट:
         ➥ `<स्टिकर लिंक>` `https://t.me/addstickers/<स्टिकर>` या केवल `<स्टिकर>` हो सकता है या स्टिकर संदेश को जवाब दें

stickers_help: |
         ➥ /stickerid*:* मुझे उसकी फ़ाइल ID के रूप में कहने के लिए एक स्टिकर का जवाब दें।
         ➥ /getsticker*:* मुझे उसकी रॉ पीएनजी फ़ाइल अपलोड करने के लिए एक स्टिकर का जवाब दें।
         ➥ /delstcker*:* स्टिकर का जवाब दें और उसे पैक से हटा दें, मैं केवल जो मैंने बनाया है, वही हटा सकता है।
         ➥ /kang*:* स्टिकर (एनिमेटेड/स्टैटिक/वीडियो) या छवि या जीआईएफ का उत्तरदायी बनाने के लिए स्टिकर का जवाब दें।
         ➥ /stickers*:* combot स्टिकर कैटलॉग पर दिए गए शब्द के लिए स्टिकर खोजें

raid_help: |
  क्या कभी आपके समूह को स्पैमर या बॉट्स द्वारा आक्रमणित किया गया है?
  इस मॉड्यूल से आप रेडर्स को त्वरित रूप से रोक सकते हैं
  *रेड मोड* को सक्षम करके मैं स्वचालित रूप से हर उपयोगकर्ता को निकाल दूंगा
  जब रेड समाप्त हो जाता है, तो आप वापस लॉकग्रुप को टॉगल कर सकते हैं और सब कुछ सामान्य हो जाएगा।
  
   *केवल एडमिन:* 

  • /raid `(बंद/समय वैकल्पिक)`: रेड मोड को टॉगल करें (चालू/बंद)
  यदि कोई समय नहीं दिया जाता है, तो यह स्वचालित रूप से 2 घंटे के लिए हो जाएगा और फिर स्वचालित रूप से बंद हो जाएगा
  *रेड मोड* को सक्षम करके मैं समूह में शामिल होने पर हर उपयोगकर्ता को निकाल दूंगा।

  • /raidtime `(समय वैकल्पिक)`: डिफ़ॉल्ट रूप से रेड मोड की अवधि देखें या सेट करें, उसके बाद से रेड मोड स्वचालित रूप से बंद हो जाएगा
  डिफ़ॉल्ट 6 घंटे है

  • /raidactiontime `(समय वैकल्पिक)`: रेड मोड की डिफ़ॉल्ट अवधि को देखें या सेट करें, उसके बाद रेड मोड से टेम्पबैन हो जाएगा
  डिफ़ॉल्ट 1 घंटा है

tagalert_help: |
  बहुत सारे उल्लेख.. क्या आप सभी को अकेले प्रबंधित कर सकते हैं..
  यहां समाधान है
  यदि आपके समूह में आपका उल्लेख किया जाता है जहां TotalSecurity मौजूद है
  TotalSecurity आपको टैग अलर्ट्स को सक्षम करने के बाद निजी संदेश के माध्यम से आपको सूचित करेगा
  **कमांड्स**
  - /tagalert `on`: टैग अलर्ट्स को चालू करें
  - /tagalert `off`: टैग अलर्ट को बंद करें
  **उदाहरण:**
  यदि आपको किसी समूह में उल्लेख किया जाता है, 
  TotalSecurity आपको बताएगा कि किसने आपका उल्लेख किया, 
  आपको उस संदेश को जिसमें आपका उल्लेख किया गया है और वह समूह कौन सा है।

topics_help: |
  टेलीग्राम ने चैट को प्रबंधित करने के लिए एक नई तरीके से प्रस्तुत किया है, जिसे विषय (टॉपिक्स) कहा जाता है

  एक समूह प्रबंधन बॉट के रूप में मेरे पास कुछ उपयोगी कमांड्स हैं जो आपको मदद कर सकते हैं
  अपने चैट में विषय बनाने, हटाने, बंद करने और फिर से खोलने के लिए।
  ➥ /topicnew*:* नई विषय बनाएं, विषय का नाम बनाने के लिए आवश्यक है।
  ➥ /topicdel*:* मौजूदा विषय को हटाएं, हटाने के लिए विषय ID की आवश्यकता होती है।  
  ➥ /topicclose*:* मौजूदा विषय को बंद करें, बंद करने के लिए विषय ID की आवश्यकता होती है।
  ➥ /topicopen*:* पहले से बंद किए गए विषय को खोलें, विषय ID की आवश्यकता होती है।
  ➥ /setactiontopic*:* क्रिया संदेशों के लिए जारी विषय सेट करें, जैसे स्वागत, विदाई, चेतावनियां, प्रतिबंध,..आदि
  ➥ /delactiontopic*:* क्रिया संदेशों के लिए डिफ़ॉल्ट विषय को हटाएं।

tools_help: |
  *देश*
  ➥ /country <देश का नाम>*:* दिए गए देश के बारे में जानकारी जमा करें

  *मुद्रा परिवर्तक:*
  ➥ /cash*:* मुद्रा परिवर्तक
  *उदाहरण:*
  ➥ /cash 1 USD INR
  ➥ /cash 1 usd inr
  *आउटपुट:* 1.0 USD = 75.505 INR

  *अंग्रेजी उपकरण*
  ➥ /define <टेक्स्ट>*:* वह शब्द या व्यक्ति जिसे आप खोजना चाहते हैं टाइप करें\nउदाहरण के लिए /define किल
  ➥ /spell*:* मैसेज को जवाब देता है, ग्रामर सुधारा हुआ संस्करण के साथ
  ➥ /synonyms <शब्द>*:* एक शब्द के पर्याय को खोजें
  ➥ /antonyms <शब्द>*:* एक शब्द के विपरीतार्थकों को खोजें

  *एन्क्रिप्शन और डिक्रिप्शन*
  ➥ /encrypt *:* दिए गए पाठ को एन्क्रिप्ट करता है
  ➥ /decrypt *:* पहले से एन्क्रिप्ट किया गया पाठ डिक्रिप्ट करता है
 
  *GitHub*
  ➥ /github <उपयोगकर्ता नाम>*:* एक गिटहब उपयोगकर्ता के बारे में जानकारी प्राप्त करें.

  *जीपीएस और स्थान*
  ➥ /gps <स्थान>*:* जीपीएस स्थान प्राप्त करें.

  *पेस्ट*
  ➥ /paste *:* जवाब दिए गए सामग्री को nekobin.com पर सहेजता है और एक URL के साथ जवाब देता है
 
  *PDF टूल*
  /pdf *:* जवाब दिए गए छवि को .zip प्रारूप में संक्षेपित करने के लिए एक टेलीग्राम फ़ाइल को जवाब दें
  /unzip *:* टेलीग्राम फ़ाइल को .zip प्रारूप से अनसंक्षेपित करने के लिए एक टेलीग्राम फ़ाइल को जवाब दें


# Song Help

ADMIN_MUSIC: |
   *एडमिन कमांड:*
   
   केवल कमांड का आरंभ में 'c' जोड़ें ताकि उन्हें चैनल के लिए उपयोग किया जा सके।
   
   /pause : वर्तमान में चल रहे स्ट्रीम को रोकें।
   /resume : वर्तमान में रोकी हुई स्ट्रीम को फिर से चालाएं।
   /skip : वर्तमान में चल रहे स्ट्रीम को छोड़ें और कतार में अगला ट्रैक स्ट्रीम करें।
   /end या /stop : कतार को साफ़ करें और वर्तमान में चल रहे स्ट्रीम को समाप्त करें।
   /player : एक इंटरएक्टिव प्लेयर पैनल प्राप्त करें।
   /queue : कतार में जुड़े ट्रैक्स की सूची दिखाएं।

AUTH_MUSIC: |
   *अधिकृत उपयोगकर्ता:*
   
   अधिकृत उपयोगकर्ता बिना चैट में एडमिन अधिकारों के उपयोग कर सकते हैं।
   
   /auth [उपयोगकर्ता नाम/उपयोगकर्ता ID] : बॉट की अधिकृत सूची में एक उपयोगकर्ता जोड़ें।
   /unauth [उपयोगकर्ता नाम/उपयोगकर्ता ID] : अधिकृत उपयोगकर्ताओं की सूची से एक उपयोगकर्ता हटाएं।
   /authusers : समूह के अधिकृत उपयोगकर्ताओं की सूची दिखाएं।

BROADCAST_MUSIC: |
   *प्रसारण सुविधा [केवल सुडोअर्थी]:*
   
   /broadcast [संदेश या संदेश का उत्तर दें] : बॉट के सेवित चैट्स को संदेश प्रसारित करें।
   
   *प्रसारण मोड:*
   -pin : आपके प्रसारित संदेशों को सेवित चैट्स में पिन करता है।
   -pinloud : आपके प्रसारित संदेशों को सेवित चैट्स में पिन करता है और सदस्यों को सूचना भेजता है।
   -user : उन उपयोगकर्ताओं के लिए संदेश प्रसारित करता है जिन्होंने आपके बॉट को शुरू किया है।
   -assistant : अपने बॉट के सहायक खाते से अपना संदेश प्रसारित करें।
   -nobot : बॉट को संदेश प्रसारित न करने के लिए बल प्रयोग करें।
    
   *उदाहरण:* /broadcast -user -assistant -pin प्रसारण का परीक्षण करना

BLACKCHAT_MUSIC: |
   *चैट ब्लैकलिस्ट सुविधा [केवल सुडोअर्थी]:*
   
   हमारे मूल्यवान बॉट का उपयोग न करने के लिए बकवास चैट्स को प्रतिबंधित करें।
   
   /blacklistchat [चैट ID] : बॉट का उपयोग करने वाली चैट को ब्लैकलिस्ट करें।
   /whitelistchat [चैट ID] : ब्लैकलिस्ट किए गए चैट को व्हाइटलिस्ट करें।
   /blacklistedchat : ब्लैकलिस्ट किए गए चैट्स की सूची दिखाएं।

BLACKUSER_MUSIC: |
   *उपयोगकर्ता ब्लॉक [केवल सुडोअर्थी]:*
   
   ब्लैकलिस्ट किए गए उपयोगकर्ता को इग्नोर करना शुरू करें, ताकि वह बॉट के कमांड का उपयोग न कर सकें।
   
   /block [उपयोगकर्ता नाम या उपयोगकर्ता को जवाब दें] : उपयोगकर्ता को हमारे बॉट से ब्लॉक करें।
   /unblock [उपयोगकर्ता नाम या उपयोगकर्ता को जवाब दें] : ब्लॉक किए गए उपयोगकर्ताओं को अनब्लॉक करें।
   /blockedusers : ब्लॉक किए गए उपयोगकर्ताओं की सूची दिखाएं।

CPLAY_MUSIC: |
   *चैनल प्ले कमांड:*
   
   आप चैनल में ऑडियो/वीडियो स्ट्रीम कर सकते हैं।
   
   /cplay : चैनल के वीडियो चैट पर अनुरोधित ऑडियो ट्रैक को स्ट्रीम करना शुरू करें।
   /cvplay : चैनल के वीडियो चैट पर अनुरोधित वीडियो ट्रैक को स्ट्रीम करना शुरू करें।
   /cplayforce या /cvplayforce : चल रहे स्ट्रीम को रोक दें और अनुरोधित ट्रैक को स्ट्रीम करना शुरू करें।
   /channelplay [चैट उपयोगकर्ता नाम या ID] या [अक्षम] : चैनल को एक समूह से जोड़ें और समूह में भेजे गए कमांडों की मदद से ट्रैक्स को स्ट्रीम करें।

GBAN_MUSIC: |
   *ग्लोबल बैन सुविधा [केवल सुडोअर्थी]:*
   
   /gban [उपयोगकर्ता नाम या उपयोगकर्ता को जवाब दें] : सभी सेवित चैट्स से चुटिया को ग्लोबल रूप से बैन करें और उसका बॉट का उपयोग करने पर प्रतिबंध लगा दें।
   /ungban [उपयोगकर्ता नाम या उपयोगकर्ता को जवाब दें] : ग्लोबल रूप से बैन किए गए उपयोगकर्ता को ग्लोबल रूप से अनबैन करें।
   /gbannedusers : ग्लोबल रूप से बैन किए गए उपयोगकर्ताओं की सूची दिखाएं।

LOOP_MUSIC: |
   *लूप स्ट्रीम:*
   
   चल रहे स्ट्रीम को लूप में चलाना शुरू करें
   
   /loop [सक्षम/अक्षम] : चल रहे स्ट्रीम के लिए लूप सक्षम/अक्षम करें।
   /loop [1, 2, 3, ...] : दिए गए मूल्य के लिए लूप सक्षम करें।

MAINTAINANCE_MUSIC: |
   *रखरखाव मोड [केवल सुडोअर्थी]:*
   
   /logs : बॉट के लॉग प्राप्त करें।
   
   /logger [सक्षम/अक्षम] : बॉट गतिविधियों को लॉग करना शुरू करेगा।
   
   /maintenance [सक्षम/अक्षम] : अपने बॉट के रखरखाव मोड को सक्षम या अक्षम करें।

PING_MUSIC: |
   *पिंग और आँकड़े:*
   
   /mstart : संगीत बॉट को प्रारंभ करें।
   /musichelp : कमांडों की व्याख्या के साथ मदद मेनू प्राप्त करें।
   
   /ping : बॉट के पिंग और सिस्टम आँकड़े दिखाएं।
   
   /stats : बॉट के अवलोकन आँकड़े दिखाएं।

PLAY_MUSIC: |
   *प्ले कमांड:*
   
   v वीडियो प्ले करने के लिए है।
   force फ़ोर्स प्ले करने के लिए है।
    
   /play या /vplay : अनुरोधित ट्रैक को वीडियो चैट पर स्ट्रीम करना शुरू करें।
   /playforce या /vplayforce : चल रहे स्ट्रीम को रोकें और अनुरोधित ट्रैक को स्ट्रीम करना शुरू करें।

SHUFFLE_MUSIC: |
   *कतार को शफल करें:*
   
   /shuffle : कतार को शफल करें।
   /queue : शफल की गई कतार दिखाएं।

SEEK_MUSIC: |
   *स्ट्रीम को खोजें:*
   
   /seek [सेकंड में अवधि] : स्ट्रीम को दिए गए अवधि पर खोजें।
   /seekback [सेकंड में अवधि] : स्ट्रीम को पीछे की दिए गए अवधि पर खोजें।

SONG_MUSIC: |
   *गाना डाउनलोड:*
   
   /song [गाने का नाम/yt url] : YouTube से किसी भी ट्रैक को mp3 या mp4 प्रारूप में डाउनलोड करें।

SPEED_MUSIC: |
   *गति कमांड:*
   
   आप चल रहे स्ट्रीम की प्लेबैक गति को नियंत्रित कर सकते हैं। [एडमिन केवल]
   
   /speed या /playback : समूह में ऑडियो प्लेबैक गति को समायोजित करने के लिए।
   /cspeed या /cplayback : चैनल में ऑडियो प्लेबैक गति को समायोजित करने के लिए।
