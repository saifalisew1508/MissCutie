curr_chat_lang: "आपकी वर्तमान भाषा {} है, नीचे दिए गए बटनों में से जो भाषा आप चाहते हैं उसे चुनें :)"
set_chat_lang: "बहुत बढ़िया, {} यह अब से आपकी भाषा है!"


PM_START_TEXT: |
   *हेलो* {} वहाँ! मेरा नाम है *{}* - मैं आपको अपने समूहों का प्रबंधन करने में मदद करने के लिए यहाँ हूँ! /help दबाएं और और जानने के लिए कि मुझे पूरी तरह से कैसे उपयोग करें।
   
   - /language: इस कमांड का उपयोग करके अपनी डिफ़ॉल्ट भाषा बदलें
   
   मेरे [अपडेट्स चैनल](http://t.me/BotXNews) में शामिल हों और सभी नवीनतम अपडेट्स की जानकारी प्राप्त करें।
   
   /donate कमांड का उपयोग करके हमारे डेवलपर्स को डोनेट करें

HELP_STRINGS: |
   हेलो! मेरा नाम है *{}*।
   मैं एक मॉड्यूलर समूह प्रबंधन बॉट हूँ और कुछ मजेदार अतिरिक्त फीचर्स भी हैं! निम्नलिखित कुछ चीजें देखें जो मैं आपकी मदद कर सकता हूँ।
   मुख्य कमांड्स जो उपलब्ध हैं:
    - /start: बॉट को शुरू करें
    - /help: यह संदेश आपको PM करेगा।
    - /help <मॉड्यूल नाम>: उस मॉड्यूल के बारे में जानकारी प्राप्त करें।
    - /donate: डोनेशन के बारे में जानकारी!
    - /language: अपनी डिफ़ॉल्ट भाषा बदलें
    - /settings:
      - PM में: आपके समर्थित मॉड्यूल्स के लिए आपकी सेटिंग्स आपको भेज देगा।
      - समूह में: आपको PM पर रीडायरेक्ट करेगा, उस चैट की सभी सेटिंग्स के साथ।
   {}
   और निम्नलिखित

