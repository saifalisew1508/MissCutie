   ඔබට {} හේතුවට අපට ඇත්තාව අපගේ සුමිත්ගේ ස්තූතිය ස්තූතියට හෝ නුතන ස්තූතියට සහ උපයෝගීයක් සාක්‍රීයයන්ට සහ ව්යාපෘතියට පූර්ණ වෙයි. එය තාක්ෂණයේ ජනතාවට සහ කුඩාරයට හෝ වෙයි. මේ ව්යාපෘතියට මාසයට හෝ පසු පත්වෙයි.
   
   *පෙරුවන සාක්‍රීයයන්ට එක්වන්ට:*
   
   ඔබට වෙසෙන ව්යාපෘතිකරණය පරික්ෂා කරන ස්ථාපනයක්, පැරණින් ස්තූතියට එක්වන්ට එකඟ වෙයි. විස්තරව, ස්තූතියට සහ එක්වන්ට පූර්ණ වෙයි, හා ලෝක ස්තූතියේ එක්වන්ට නොවීමට අපට කියාපනු ස්තූතියක් නොවේය. වෙසෙන් බුද්ධවන්ගේ සුමිත් හා ව්යාපෘතියට පූර්ණ වෙයි, සහ අපගේ ව්යාපෘතියට සාක්‍රීය කරනු ඇත. සුමිත්, ව්යාපෘතියට, හා සුමිත් හා අනිව්භාංවක් වෙනි ව්යාපෘතියන්ගේ ස්තූතියට සහ උපයෝගීයක් වෙයි. වෙයිවලදී, ඔබට මොතාවයේ මෙම {} හේතුවට ආරම්භකරන අපට ස්තූතියක් හෝ සාක්‍රීයයන්ට දැඩිමහාකරණයක් කියාපනු ස්තූතියක් නොවේය. එකක් අපට කුඩාරයට කුඩාරයට හෝ ප්‍රතිපත්තියට ස්තූතියක් නොවේය. මෙම ස්තූති හා ආයුර්වායානුගේ ස්තූතියට සහ අනිව්භාංවක් අපට වෙනස්, විශ්වාසයට, හා සුමිත් හා අනිව්භාංවක් වෙනි ව්යාපෘතියන්ගේ ස්තූතියට සහ උපයෝගීයක් වෙයි.
   
   *පෙරුවන ව්යාපෘතිකරණයට සම්පූර්ණයට:*
   
   ඔබට {} හේතුවට අපට ඇත්තාව අපගේ සුමිත්ගේ ස්තූතිය ස්තූතියට හෝ නුතන ස්තූතියට සහ උපයෝගීයක් සාක්‍රීයයන්ට සහ ව්යාපෘතියට පූර්ණ වෙයි. මොතාවයේ කුඩාරයට හෝ ව්යාපෘතියට ස්තූතියක් හෝ සැකසුම් වෙයි.
   
   *පෙරුවන ව්යාපෘතිකරණයට පූර්ණ:*
   
   ඔබට {} හේතුවට අපට ඇත්තාව අපගේ සුමිත්ගේ ස්තූතිය ස්තූතියට හෝ නුතන ස්තූතියට සහ උපයෝගීයක් සාක්‍රීයයන්ට සහ ව්යාපෘතියට පූර්ණ වෙයි. මොතාවයේ කුඩාරයට හෝ ව්යාපෘතියට සාක්‍රීය කරනු ඇත.
   
   *මෙම ව්යාපෘතිය ආරම්භක කිරීම නගරයේ 2022-23 @මිස්කියුටිබෙයික්, ඉංක් අයියාන්ටි*


admin_help: |
   *ඕනෑ පරිශීලක*
   - /admins*:* සම්බන්දයේ පරිශීලකයාන් ලැයිස්තුව

   *පරිශීලකයන් පමණක්*
   - /pin*:* පණිසා කෙලවරේ සම්බන්දයට අදාලව මොසේදැක්වේ - 'loud' හෝ 'notify' එකතු කිරීමට 'loud' හෝ 'notify' එකතු කරන්න
   - /unpin*:* සම්බන්දයේ සම්බන්දයට අදාලව මොසේදැක්වේ
   - /unpinall*:* සම්බන්දයේ සම්බන්දයට අදාලව සෑම පණිසාකාරකමෙන්ද (එක්ම OWNER කරන්න)
   - /del*:* සම්බන්දයේ සම්බන්දයට අදාලව මොසේදැක්වේ
   - /purge*:* මොසේදැක්වීමේ සහ සම්බන්දයේ සම්බන්දයට අදාලව සෑම පණිසාකාරකමෙන්ද
   - /purge <integer X>*:* මොසේදැක්වීමේ සහ සම්බන්දයේ සම්බන්දයට අදාලව මොසේදැක්වීමේ සහ X පණිසාකාරකමෙන්ද
   - /invitelink*:* මොසේදැක්වීමේ සහ අදාලව මොසේදැක්වීමේ සම්බන්දයට මානකරන්න
   - /promote*:* මොසේදැක්වීමේ සහ පිටපතකට සම්බන්දයට වරණක් සහාය කරන්න
   - /demote*:* මොසේදැක්වීමේ සහ පිටපතකට ස෸විතයක් සහාය කරන්න
   - /title <title here> *:* මොසේදැක්වීමේ සහ පරිපාලකයට අදාලව අභිරහසක් සකස් කරන්න
   - /admincache*:* පරිපාලක ලැයිස්තුව බලන්න

   *කණ්ඩායම එකමුද? සංක්ෂිතයේ ඉල්ලුම් ඉටුක්කා*
   - /approveall සෑම එකමුද? සංක්ෂිතයේ සාමාන්ඩියක් අයත් කරන්න *(දැක්කම අවසානයේ)*
   - /joinrequest `<yes|on|true/no|off|false>` එකමුද? සංක්ෂිතයේ එකමුද? සංක්ෂිතයට අනුයුක්කරන්න
   - /autoapprove `<yes|on|true/no|off|false>` එකමුද? සංක්ෂිතයේ එකමුද? සංක්ෂිතයට අනුයුක්කරන්න

   *මස්වාංශ ක්‍රියාව*
   - /unbanall*:* කණ්ඩායමේ සෑම නීතාලාභීලකමෙන්ද අයිතිකරයි
   - /unmuteall*:* කණ්ඩායමේ සෑම නීතාලාභීලකමෙන්ද අහිංසකයි
   - /banall*:* කණ්ඩායමේ සෑම නීතාලාභීලකමෙන්ද අයිතිකරයි *(පරිපාලක පමණක් මොරම් කරයි)*
   - /zombies*:* කණ්ඩායමේ මකරු ගිලක් සොයාගත හැක
   - /zombies clean*:* කණ්ඩායමේ මකරු ගිලක් ඉවත් කරයි
   - /users*:* කණ්ඩායමේ නීතාලාභීලකයාගේ ලැයිස්තුව

afk_help: |
